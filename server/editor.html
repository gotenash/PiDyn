<!DOCTYPE html>
<html>
<head>
    <title>Éditeur de Diaporama</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #2c3e50; color: white; }
        header { padding: 10px 20px; background: #1a252f; display: flex; justify-content: space-between; align-items: center; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Zone de Prévisualisation */
        .preview-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #34495e; padding: 20px; }
        .screen-mockup { 
            background: black; position: relative; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
            transition: all 0.3s ease;
            cursor: crosshair;
        }
        .screen-mockup.grid-active {
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 2% 2%; /* Correspond à GRID_SIZE */
        }
        .screen-mockup .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }
        
        .zone { 
            position: absolute; border: 1px dashed rgba(255,255,255,0.5); 
            background: rgba(52, 152, 219, 0.2); z-index: 5;
            display: flex; align-items: center; justify-content: center;
            cursor: move;
        }
        .resizer {
            width: 10px; height: 10px; background: #3498db;
            position: absolute; right: -5px; bottom: -5px;
            cursor: nwse-resize; z-index: 10;
        }
        .zone.selected { border: 2px solid #3498db; background: rgba(52, 152, 219, 0.4); }
        .zone img, .zone video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .zone-label { 
            position: absolute; top: -20px; left: 0; background: #3498db; 
            color: white; font-size: 10px; padding: 2px 5px;
        }

        /* Sidebar Propriétés */
        .sidebar { width: 300px; background: #1a252f; padding: 20px; border-left: 1px solid #34495e; overflow-y: auto; }
        .sidebar input, .sidebar select { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }

        /* Frise Chronologique */
        .timeline-area { height: 150px; background: #1a252f; border-top: 2px solid #3498db; display: flex; align-items: center; padding: 0 20px; overflow-x: auto; gap: 10px; }
        .timeline-item { 
            min-width: 120px; height: 80px; background: #34495e; border: 2px solid transparent;
            border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 12px; position: relative;
        }
        .timeline-item .delete-btn {
            position: absolute; top: 2px; right: 2px; background: #e74c3c;
            color: white; border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;
            line-height: 1;
        }
        .timeline-item:hover .delete-btn { display: flex; }
        .timeline-item .duplicate-btn {
            position: absolute; top: 2px; left: 2px; background: #27ae60;
            color: white; border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;
            line-height: 1;
        }
        .timeline-item:hover .duplicate-btn { display: flex; }
        .timeline-item.active { border-color: #3498db; background: #2980b9; }
        .timeline-item img { height: 40px; margin-bottom: 5px; }
        
        /* Indicateur visuel pour le drag & drop */
        .timeline-item.drag-over {
            border-left: 6px solid #2ecc71 !important;
            transition: border-left 0.1s;
        }
        /* Désactiver les événements sur les enfants pendant le drag pour éviter les clignotements */
        .timeline-area.dragging .timeline-item * {
            pointer-events: none;
        }

        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: #3498db; color: white; }
        button.danger { background: #e74c3c; }
    </style>
</head>
<body>
    <header>
        <a href="/" style="color: #bdc3c7; text-decoration: none;">&larr; Retour</a>
        <input type="text" id="pl-name" placeholder="Nom du diaporama" style="padding: 5px; border-radius: 4px; border: none; width: 250px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <label style="font-size:12px">Résolution :</label>
            <select id="screen-res" onchange="updateResolution()" style="padding:5px;">
                <option value="16/9">Paysage (16:9)</option>
                <option value="9/16">Portrait (9:16)</option>
                <option value="4/3">Classique (4:3)</option>
            </select>
            <label style="font-size:12px">Fond :</label>
            <select id="global-bg" onchange="updateGlobalBg()" style="padding:4px;"></select>
            <label style="font-size:12px">Couleur :</label>
            <input type="color" id="global-bg-color" oninput="updateGlobalBgColor()" style="padding:0; height:22px; width:40px; border:none; vertical-align: middle; cursor:pointer;">
        </div>
        <label style="font-size:12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
            <input type="checkbox" id="grid-toggle" checked onchange="toggleGrid()" style="width: auto; margin: 0;">
            Aimantation
        </label>
        <button class="secondary" onclick="previewPlaylist()">Aperçu</button>
        <button onclick="savePlaylist()">Enregistrer</button>
    </header>

    <div class="main-container">
        <div class="preview-area" id="drop-zone">
            <div class="screen-mockup" id="preview-screen" 
                 onmousedown="handleMouseDown(event)" 
                 onmousemove="handleMouseMove(event)" 
                 onmouseup="handleMouseUp(event)">
                <!-- Rendu dynamique ici -->
            </div>
            <p id="item-info" style="margin-top: 10px; color: #bdc3c7;">Dessinez un cadre sur l'écran pour ajouter une zone</p>
        </div>

        <div class="sidebar">
            <div id="page-editor" style="display: none; border-bottom: 1px solid #34495e; padding-bottom: 15px; margin-bottom: 15px;">
                <h3>Propriétés de la page</h3>
                <label>Durée de la page (ms)</label>
                <input type="number" id="page-duration" oninput="updatePageDuration()">
                
                <label>Couleur de fond de page</label>
                <input type="color" id="page-bg-color" oninput="updatePageBgColor()">

                <button class="danger" onclick="deleteCurrentItem()" style="width: 100%; margin-top: 10px;">Supprimer la page</button>
            </div>

            <h3>Propriétés de la zone</h3>
            <div id="zone-editor" style="display: none;">
                <label>Type de contenu</label>
                <select id="z-type" onchange="updateZone()">
                    <option value="image">Image</option>
                    <option value="video">Vidéo</option>
                    <option value="web">Web / Sozi (HTML)</option>
                    <option value="clock">Horloge</option>
                    <option value="text">Texte</option>
                </select>

                <label>Média / Texte</label>
                <div id="z-content-container">
                    <select id="z-url" onchange="updateZone()"></select>
                    <input type="text" id="z-text" oninput="updateZone()" style="display:none;" placeholder="Votre texte ici...">
                </div>

                <div class="text-properties" style="display: none;">
                    <label>Police</label>
                    <select id="z-font-family" onchange="updateZone()">
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="Verdana, sans-serif">Verdana</option>
                        <option value="Helvetica, sans-serif">Helvetica</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="Times New Roman, serif">Times New Roman</option>
                        <option value="Courier New, monospace">Courier New</option>
                        <option value="Impact, sans-serif">Impact</option>
                        <option value="sans-serif">Par défaut (sans-serif)</option>
                        <option value="serif">Par défaut (serif)</option>
                        <option value="monospace">Par défaut (monospace)</option>
                    </select>

                    <label>Taille de police (px)</label>
                    <input type="number" id="z-font-size" oninput="updateZone()" value="24">

                    <label>Couleur du texte</label>
                    <input type="color" id="z-color" oninput="updateZone()" value="#ffffff">

                    <label>Alignement du texte</label>
                    <select id="z-text-align" onchange="updateZone()">
                        <option value="left">Gauche</option>
                        <option value="center">Centre</option>
                        <option value="right">Droite</option>
                        <option value="justify">Justifié</option>
                    </select>

                    <label>Format de l'horloge (ex: HH:mm:ss, DD/MM/YYYY)</label>
                    <input type="text" id="z-clock-format" oninput="updateZone()" value="HH:mm:ss">
                </div>

                <label>Ordre des couches</label>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button onclick="moveZoneBackward()" style="flex: 1; background: #6c757d;" title="Reculer d'un plan">Reculer</button>
                    <button onclick="moveZoneForward()" style="flex: 1; background: #6c757d;" title="Avancer d'un plan">Avancer</button>
                </div>

                <button onclick="updateZone()" style="width: 100%; margin-top: 10px; background: #28a745; font-weight: bold;">Appliquer les modifications</button>

                <button class="danger" onclick="deleteZone()" style="width: 100%; margin-top: 20px;">Supprimer la zone</button>
            </div>
        </div>
    </div>

    <div class="timeline-area" id="timeline">
        <button onclick="addNewItem()" style="min-width: 100px; height: 80px; background: #27ae60;">+ Ajouter</button>
        <!-- Items de la frise -->
    </div>

    <script>
        const token = localStorage.getItem('pidyn_token');
        if (!token) window.location.href = '/';
        
        const PREVIEW_AUTH = '?apiKey=ma_cle_secrete_123';

        const urlParams = new URLSearchParams(window.location.search);
        let playlistId = urlParams.get('id');
        
        let playlistData = { name: '', backgroundUrl: '', backgroundColor: '#000000', resolution: '16/9', items: [] };
        let selectedIndex = -1;
        let selectedZoneIndex = -1; // Index de la zone dans la page
        let availableMedia = [];
        
        // Variables pour les interactions
        let mode = 'none'; // 'drawing', 'moving', 'resizing'
        let useGrid = true;
        const GRID_SIZE = 2; // Taille de la grille en %

        let startX, startY; // Position de la souris au clic (%)
        let initialX, initialY, initialW, initialH; // Géométrie initiale de la zone (%)
        let currentDrawingZone = null;

        async function init() {
            const headers = { 'x-access-token': token };
            
            // Charger la médiathèque
            const mediaRes = await fetch('/api/admin/media', { headers });
            availableMedia = await mediaRes.json();
            populateMediaSelects();

            if (playlistId) {
                const res = await fetch('/api/admin/data', { headers });
                const data = await res.json();
                if (data.playlists[playlistId]) {
                    playlistData = data.playlists[playlistId];
                    document.getElementById('pl-name').value = playlistData.name;
                    document.getElementById('global-bg').value = playlistData.backgroundUrl || '';
                    document.getElementById('screen-res').value = playlistData.resolution || '16/9';
                    document.getElementById('global-bg-color').value = playlistData.backgroundColor || '#000000';
                    toggleGrid();
                }
            }
            updateResolution();
            renderTimeline();
        }

        function populateMediaSelects() {
            // Pour le fond global, on ne garde que les images
            const images = availableMedia.filter(m => m.type === 'image');
            document.getElementById('global-bg').innerHTML = '<option value="">Aucun / Manuel</option>' + 
                images.map(m => `<option value="${m.url}">${m.filename}</option>`).join('');
            
            // Initialisation du select de zone (sera filtré dynamiquement par type)
            populateMediaSelectsForZone(null);
        }

        function populateMediaSelectsForZone(type) {
            let filtered = availableMedia;
            if (type === 'image') {
                filtered = availableMedia.filter(m => m.type === 'image');
            } else if (type === 'video') {
                filtered = availableMedia.filter(m => m.type === 'video');
            } else if (type === 'web') {
                // On ne propose que les fichiers HTML (extraits ou directs)
                filtered = availableMedia.filter(m => m.type === 'html');
            }

            const options = '<option value="">Sélectionner un média</option>' + 
                filtered.map(m => {
                    // On affiche le nom du ZIP d'origine pour aider à s'y retrouver
                    const label = m.originalZip ? `[${m.originalZip}] ${m.filename}` : m.filename;
                    return `<option value="${m.url}">${label}</option>`;
                }).join('');
            
            document.getElementById('z-url').innerHTML = options;
        }

        function toggleGrid() {
            useGrid = document.getElementById('grid-toggle').checked;
            document.getElementById('preview-screen').classList.toggle('grid-active', useGrid);
        }

        function applySnap(val) {
            if (!useGrid) return val;
            return Math.round(val / GRID_SIZE) * GRID_SIZE;
        }

        function updateResolution() {
            playlistData.resolution = document.getElementById('screen-res').value;
            const screen = document.getElementById('preview-screen');
            const ratio = playlistData.resolution.split('/');
            const baseHeight = 400; 
            screen.style.height = baseHeight + 'px';
            screen.style.width = (baseHeight * (ratio[0]/ratio[1])) + 'px';
        }

        function updateGlobalBg() {
            playlistData.backgroundUrl = document.getElementById('global-bg').value;
            renderPreview();
        }

        function updateGlobalBgColor() {
            playlistData.backgroundColor = document.getElementById('global-bg-color').value;
            renderPreview();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline');
            // Garder seulement le bouton ajouter
            const addBtn = container.querySelector('button');
            container.innerHTML = '';
            container.appendChild(addBtn);

            playlistData.items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `timeline-item ${selectedIndex === index ? 'active' : ''}`;
                div.draggable = true;
                div.onclick = () => selectItem(index);

                div.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', index);
                    div.style.opacity = '0.5';
                    container.classList.add('dragging');
                };
                div.ondragend = () => {
                    div.style.opacity = '1';
                    container.classList.remove('dragging');
                    document.querySelectorAll('.timeline-item').forEach(i => i.classList.remove('drag-over'));
                };
                div.ondragover = (e) => {
                    e.preventDefault();
                    div.classList.add('drag-over');
                };
                div.ondragleave = () => {
                    div.classList.remove('drag-over');
                };
                div.ondrop = (e) => {
                    e.preventDefault();
                    div.classList.remove('drag-over');
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    if (fromIndex !== index) {
                        const movedItem = playlistData.items.splice(fromIndex, 1)[0];
                        playlistData.items.splice(index, 0, movedItem);
                        
                        // Ajuster l'index sélectionné pour qu'il suive l'élément ou reste sur le bon
                        if (selectedIndex === fromIndex) {
                            selectedIndex = index;
                        } else if (selectedIndex > fromIndex && selectedIndex <= index) {
                            selectedIndex--;
                        } else if (selectedIndex < fromIndex && selectedIndex >= index) {
                            selectedIndex++;
                        }
                        renderTimeline();
                        renderPreview();
                    }
                };

                const thumb = (item.zones && item.zones.length > 0) ? item.zones[0].url : null;
                div.innerHTML = `
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteCurrentItemByIndex(${index})">×</button>
                    <button class="duplicate-btn" onclick="event.stopPropagation(); duplicateItemByIndex(${index})" title="Dupliquer">⧉</button>
                    ${thumb ? `<img src="${thumb}${PREVIEW_AUTH}">` : '<div style="height:40px"></div>'}
                    <span>${item.duration/1000}s</span>
                `;
                container.appendChild(div);
            });
        }

        function selectItem(index) {
            selectedIndex = index;
            selectedZoneIndex = -1;
            
            const item = playlistData.items[selectedIndex];
            document.getElementById('page-editor').style.display = 'block';
            document.getElementById('page-duration').value = item.duration;
            document.getElementById('page-bg-color').value = item.backgroundColor || '#000000';

            document.getElementById('zone-editor').style.display = 'none';
            renderPreview();
            renderTimeline();
        }

        function renderPreview() {
            const screen = document.getElementById('preview-screen');
            
            const item = selectedIndex !== -1 ? playlistData.items[selectedIndex] : null;
            const bgColor = (item && item.backgroundColor) ? item.backgroundColor : (playlistData.backgroundColor || 'black');
            screen.style.backgroundColor = bgColor;
            
            screen.innerHTML = playlistData.backgroundUrl ? `<img src="${playlistData.backgroundUrl}${PREVIEW_AUTH}" class="bg-layer">` : '';
            
            if (selectedIndex === -1) return;

            if (item.zones) {
                item.zones.forEach((zone, idx) => {
                    const zoneId = `zone-render-${idx}`;
                    let div = document.getElementById(zoneId);
                    
                    // Si la zone n'existe pas ou si on n'est pas en train de manipuler la souris, on crée/recréée
                    // On évite de recréer l'innerHTML des iframes/vidéos pendant le déplacement pour éviter le clignotement
                    const isInteracting = (mode === 'moving' || mode === 'resizing') && selectedZoneIndex === idx;

                    if (!div) {
                        div = document.createElement('div');
                        div.id = zoneId;
                        screen.appendChild(div);
                    }

                    div.className = `zone ${selectedZoneIndex === idx ? 'selected' : ''}`;
                    div.style.left = zone.x + '%';
                    div.style.top = zone.y + '%';
                    div.style.width = zone.w + '%';
                    div.style.height = zone.h + '%';
                    div.onmousedown = (e) => startMoving(e, idx);

                    // On ne met à jour le contenu interne que si on ne déplace pas la zone (performance + stabilité iframe)
                    if (!isInteracting || div.innerHTML === '') {
                        if (zone.type === 'text') div.innerHTML = `<div style="color:${zone.color || 'white'}; font-size:${zone.fontSize || 24}px; font-family:${zone.fontFamily || 'sans-serif'}; text-align:${zone.textAlign || 'center'}; width:100%; word-wrap: break-word;">${zone.text || ''}</div>`;
                        else if (zone.type === 'video' && zone.url) div.innerHTML = `<video src="${zone.url}${PREVIEW_AUTH}" muted loop autoplay style="width:100%;height:100%;object-fit:contain;"></video>`;
                        else if (zone.type === 'web' && zone.url) div.innerHTML = `<iframe src="${zone.url}${PREVIEW_AUTH}" style="width:100%;height:100%;border:none;pointer-events:none;background:white;"></iframe>`;
                        else if (zone.type === 'clock') {
                        const clockDiv = document.createElement('div');
                        clockDiv.style.cssText = `
                            color:${zone.color || 'white'}; 
                            font-size:${zone.fontSize || 24}px; 
                            font-family:${zone.fontFamily || 'sans-serif'}; 
                            text-align:${zone.textAlign || 'center'}; 
                            width:100%; 
                            word-wrap: break-word;
                        `;
                        clockDiv.style.color = zone.color || 'white';
                        clockDiv.style.fontSize = (zone.fontSize || 24) + 'px';
                        clockDiv.style.fontFamily = zone.fontFamily || 'sans-serif';
                        clockDiv.style.textAlign = zone.textAlign || 'center';
                        clockDiv.style.width = '100%';
                        clockDiv.innerText = formatClock(new Date(), zone.clockFormat || 'HH:mm:ss');
                        div.appendChild(clockDiv);
                    }
                    else if (zone.url) div.innerHTML = `<img src="${zone.url}${PREVIEW_AUTH}">`;
                    }
                    
                    if (selectedZoneIndex === idx) {
                        let resizer = div.querySelector('.resizer');
                        if (!resizer) {
                            resizer = document.createElement('div');
                            resizer.className = 'resizer';
                            div.appendChild(resizer);
                        }
                        resizer.onmousedown = (e) => startResizing(e);
                    }
                    
                    let label = div.querySelector('.zone-label');
                    if (!label) {
                        label = document.createElement('div');
                        label.className = 'zone-label';
                        div.appendChild(label);
                    }
                    label.innerText = `Zone ${idx+1} (${zone.type})`;
                });
            }
        }

        function handleMouseDown(e) {
            if (selectedIndex === -1) return;
            mode = 'drawing';
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            currentDrawingZone = document.createElement('div');
            currentDrawingZone.className = 'zone';
            document.getElementById('preview-screen').appendChild(currentDrawingZone);
        }

        function handleMouseMove(e) {
            if (mode === 'none') return;
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            let nowX = ((e.clientX - rect.left) / rect.width) * 100;
            let nowY = ((e.clientY - rect.top) / rect.height) * 100;

            if (mode === 'drawing') {
                const sX = applySnap(startX);
                const sY = applySnap(startY);
                const nX = applySnap(nowX);
                const nY = applySnap(nowY);

                currentDrawingZone.style.left = Math.min(sX, nX) + '%';
                currentDrawingZone.style.top = Math.min(sY, nY) + '%';
                currentDrawingZone.style.width = Math.abs(nX - sX) + '%';
                currentDrawingZone.style.height = Math.abs(nY - sY) + '%';
            } else if (mode === 'moving') {
                const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
                zone.x = applySnap(initialX + (nowX - startX));
                zone.y = applySnap(initialY + (nowY - startY));
                renderPreview();
            } else if (mode === 'resizing') {
                const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
                zone.w = applySnap(initialW + (nowX - startX));
                zone.h = applySnap(initialH + (nowY - startY));
                renderPreview();
            }
        }

        function handleMouseUp() {
            if (mode === 'drawing' && currentDrawingZone) {
                const zone = {
                    x: parseFloat(currentDrawingZone.style.left),
                    y: parseFloat(currentDrawingZone.style.top),
                    w: parseFloat(currentDrawingZone.style.width),
                    h: parseFloat(currentDrawingZone.style.height),
                    type: 'text', url: '', text: 'Nouveau Texte' // Default to text for new zones
                };
                if (zone.w > 2) {
                    playlistData.items[selectedIndex].zones = playlistData.items[selectedIndex].zones || [];
                    // Initialiser les propriétés de texte par défaut si c'est une zone de texte
                    if (zone.type === 'text') initializeNewTextZone(zone);
                    playlistData.items[selectedIndex].zones.push(zone);
                    selectZone(playlistData.items[selectedIndex].zones.length - 1);
                } else {
                    currentDrawingZone.remove();
                }
            }
            mode = 'none';
            currentDrawingZone = null;
        }

        function startMoving(e, idx) {
            e.stopPropagation();
            selectZone(idx);
            mode = 'moving';
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            initialX = playlistData.items[selectedIndex].zones[idx].x;
            initialY = playlistData.items[selectedIndex].zones[idx].y;
        }

        function startResizing(e) {
            e.stopPropagation();
            mode = 'resizing';
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            initialW = playlistData.items[selectedIndex].zones[selectedZoneIndex].w;
            initialH = playlistData.items[selectedIndex].zones[selectedZoneIndex].h;
        }

        function selectZone(idx) {
            selectedZoneIndex = idx;
            const zone = playlistData.items[selectedIndex].zones[idx];
            document.getElementById('zone-editor').style.display = 'block';
            document.getElementById('z-type').value = zone.type;
            // On met à jour la liste des médias selon le type actuel de la zone
            populateMediaSelectsForZone(zone.type)
            document.getElementById('z-url').value = zone.url || '';
            document.getElementById('z-text').value = zone.text || '';
            document.getElementById('z-font-family').value = zone.fontFamily || 'Arial, sans-serif';
            document.getElementById('z-font-size').value = zone.fontSize || 24;
            document.getElementById('z-color').value = zone.color || '#ffffff';
            document.getElementById('z-text-align').value = zone.textAlign || 'center';
            document.getElementById('z-clock-format').value = zone.clockFormat || 'HH:mm:ss';

            // Afficher le bon champ (Media ou Texte) selon le type
            document.getElementById('z-url').style.display = zone.type === 'text' ? 'none' : 'block';
            document.getElementById('z-text').style.display = zone.type === 'text' ? 'block' : 'none';
            document.querySelector('.text-properties').style.display = zone.type === 'text' ? 'block' : 'none';
            
            renderPreview();
        }

        function updateZone() {
            if (selectedZoneIndex === -1) return;
            const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
            const oldType = zone.type;
            const newType = document.getElementById('z-type').value;

            // Si le type a changé, on rafraîchit la liste des fichiers filtrés
            if (oldType !== newType) {
                populateMediaSelectsForZone(newType);
                zone.type = newType;
            }

            zone.url = document.getElementById('z-url').value;
            zone.text = document.getElementById('z-text').value;

            // Switch d'affichage dynamique
            document.getElementById('z-url').style.display = zone.type === 'text' ? 'none' : 'block';
            document.getElementById('z-text').style.display = zone.type === 'text' ? 'block' : 'none';
            document.querySelector('.text-properties').style.display = zone.type === 'text' ? 'block' : 'none';
            document.getElementById('z-clock-format').style.display = zone.type === 'clock' ? 'block' : 'none';

            // Mettre à jour les propriétés de texte si le type est "text"
            if (zone.type === 'text') {
                zone.fontFamily = document.getElementById('z-font-family').value;
                zone.fontSize = parseInt(document.getElementById('z-font-size').value);
                zone.color = document.getElementById('z-color').value;
                zone.textAlign = document.getElementById('z-text-align').value;
            } else if (oldType === 'text' && zone.type !== 'clock') { // Nettoyer si on quitte le texte pour autre chose que l'horloge
                // Si on passe d'un type texte à un autre, nettoyer les propriétés de texte
                delete zone.fontFamily;
                delete zone.fontSize;
                delete zone.color;
                delete zone.textAlign;
            } else if (zone.type === 'clock') {
                zone.fontFamily = document.getElementById('z-font-family').value;
                zone.fontSize = parseInt(document.getElementById('z-font-size').value);
                zone.color = document.getElementById('z-color').value;
                zone.textAlign = document.getElementById('z-text-align').value;
                zone.clockFormat = document.getElementById('z-clock-format').value;
            } else if (oldType === 'clock' && zone.type !== 'text') { // Nettoyer si on quitte l'horloge pour autre chose que le texte
                // Si on passe d'un type texte à un autre, nettoyer les propriétés de texte
                delete zone.fontFamily;
                delete zone.fontSize;
                delete zone.color;
                delete zone.textAlign;
            }
            
            renderPreview();
        }


        function updatePageDuration() {
            if (selectedIndex === -1) return;
            playlistData.items[selectedIndex].duration = parseInt(document.getElementById('page-duration').value) || 0;
            renderTimeline();
        }

        function updatePageBgColor() {
            if (selectedIndex === -1) return;
            playlistData.items[selectedIndex].backgroundColor = document.getElementById('page-bg-color').value;
            renderPreview();
        }

        function moveZoneForward() { moveZone(1); }
        function moveZoneBackward() { moveZone(-1); }

        function moveZone(delta) {
            if (selectedIndex === -1 || selectedZoneIndex === -1) return;
            const zones = playlistData.items[selectedIndex].zones;
            const newIndex = selectedZoneIndex + delta;
            if (newIndex >= 0 && newIndex < zones.length) {
                [zones[selectedZoneIndex], zones[newIndex]] = [zones[newIndex], zones[selectedZoneIndex]];
                selectedZoneIndex = newIndex;
                renderPreview();
            }
        }

        function addNewItem() {
            playlistData.items.push({ 
                duration: 5000, 
                zones: [] 
            });
            selectItem(playlistData.items.length - 1);
        }

        function deleteCurrentItem() {
            if (selectedIndex !== -1) deleteCurrentItemByIndex(selectedIndex);
        }

        function deleteCurrentItemByIndex(index) {
            if (!confirm('Voulez-vous vraiment supprimer cette vignette ?')) return;
            playlistData.items.splice(index, 1);
            if (selectedIndex === index) {
                selectedIndex = -1;
                selectedZoneIndex = -1;
                document.getElementById('page-editor').style.display = 'none';
                document.getElementById('zone-editor').style.display = 'none';
            } else if (selectedIndex > index) {
                selectedIndex--;
            }
            renderTimeline();
            renderPreview();
        }

        function duplicateItemByIndex(index) {
            const originalItem = playlistData.items[index];
            const newItem = JSON.parse(JSON.stringify(originalItem)); // Clone profond (zones incluses)
            playlistData.items.splice(index + 1, 0, newItem);
            selectItem(index + 1); // Sélectionne la nouvelle vignette
        }

        // Initialisation des propriétés de texte par défaut pour une nouvelle zone
        function initializeNewTextZone(zone) {
            zone.fontFamily = 'Arial, sans-serif';
            zone.fontSize = 24;
            zone.color = '#ffffff';
            zone.textAlign = 'center';
            zone.clockFormat = 'HH:mm:ss';
        }

        function deleteZone() {
            if (selectedZoneIndex === -1) return;
            playlistData.items[selectedIndex].zones.splice(selectedZoneIndex, 1);
            selectedZoneIndex = -1;
            document.getElementById('zone-editor').style.display = 'none';
            renderPreview();
        }

        function previewPlaylist() {
            if (!playlistId) return alert("Veuillez d'abord enregistrer le diaporama.");
            const url = `/player?id=${playlistId}&apiKey=ma_cle_secrete_123`;
            window.open(url, '_blank');
        }

        async function savePlaylist() {
            const name = document.getElementById('pl-name').value;
            if (!name) return alert("Veuillez donner un nom au diaporama");

            const isNewPlaylist = !playlistId;

            const res = await fetch('/api/admin/playlists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'x-access-token': token },
                body: JSON.stringify({ 
                    id: playlistId, // Garde le même ID si on modifie
                    name: name, 
                    items: playlistData.items,
                    backgroundUrl: playlistData.backgroundUrl,
                    backgroundColor: playlistData.backgroundColor,
                    resolution: playlistData.resolution
                })
            });
            if (res.ok) {
                const result = await res.json();
                alert('Enregistré !');
                if (isNewPlaylist) {
                    window.history.replaceState({}, '', `/editor?id=${result.playlistId}`);
                    playlistId = result.playlistId;
                }
                renderTimeline(); // Rafraîchir l'affichage pour s'assurer que tout est à jour
            } else {
                alert('Erreur lors de l\'enregistrement.');
            }
        }

        function formatClock(date, format) {
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Month is 0-indexed
            const year = date.getFullYear();

            return format
                .replace(/HH/g, hours)
                .replace(/mm/g, minutes)
                .replace(/ss/g, seconds)
                .replace(/DD/g, day)
                .replace(/MM/g, month)
                .replace(/YYYY/g, year);
        }

        // Gestion des touches Suppr / Backspace pour supprimer zones ou vignettes
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedZoneIndex !== -1) {
                    deleteZone();
                } else if (selectedIndex !== -1) {
                    deleteCurrentItem();
                }
            }
        });

        init();
    </script>
</body>
</html>
