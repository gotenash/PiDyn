<!DOCTYPE html>
<html>
<head>
    <title>PiDyn - Gestion Utilisateurs</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        section { background: #1a252f; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #34495e; }
        th, td { padding: 10px; border: 1px solid #1a252f; text-align: left; }
        th { background: #3498db; color: white; }
        input, select { padding: 8px; border: 1px solid #34495e; border-radius: 4px; background: #34495e; color: white; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.danger { background: #e74c3c; }
        button.secondary { background: #6c757d; }
        h1, h2 { color: #3498db; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>PiDyn - Gestion des Utilisateurs</h1>
        <button class="secondary" onclick="logout()">Déconnexion</button>
    </header>

    <nav style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="secondary" onclick="window.location.href='/'">📊 Accueil</button>
        <button class="secondary" onclick="window.location.href='/ecrans'">🖥 Écrans</button>
        <button class="secondary" onclick="window.location.href='/diaporamas'">🎞 Diaporamas</button>
        <button class="secondary" onclick="window.location.href='/canteen'">🍴 Cantine</button>
        <button class="secondary" onclick="window.location.href='/mediatheque'">📁 Médiathèque</button>
        <button onclick="window.location.href='/users'">👥 Utilisateurs</button>
        <button class="secondary" onclick="window.location.href='/systeme'">⚙️ Système</button>
    </nav>

    <section>
        <h2>Ajouter / Modifier un Utilisateur</h2>
        <div style="display: flex; gap: 10px; align-items: end;">
            <div>
                <label>Nom d'utilisateur</label><br>
                <input type="text" id="user-name">
            </div>
            <div>
                <label>Email</label><br>
                <input type="email" id="user-email" placeholder="exemple@domaine.com">
            </div>
            <div>
                <label>Mot de passe</label><br>
                <input type="password" id="user-pass">
            </div>
            <div>
                <label>Rôle</label><br>
                <select id="user-role">
                    <option value="author">Auteur</option>
                    <option value="editor">Editeur</option>
                    <option value="admin">Administrateur</option>
                    <option value="cook">Cuisinier</option>
                </select>
            </div>
            <button onclick="saveUser()">Enregistrer</button>
        </div>
    </section>

    <section>
        <h2>Liste des Utilisateurs</h2>
        <div id="users-list"></div>
    </section>

    <script>
        const token = localStorage.getItem('pidyn_token');
        const role = localStorage.getItem('pidyn_role');

        if (!token || role !== 'admin') {
            alert("Accès réservé aux administrateurs");
            window.location.href = '/';
        }

        function logout() { localStorage.removeItem('pidyn_token'); localStorage.removeItem('pidyn_role'); window.location.href = '/'; }

        async function loadUsers() {
            const res = await fetch('/api/admin/users', { //
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 403) window.location.href = '/';
            const users = await res.json();

            let html = '<table><tr><th>Utilisateur</th><th>Email</th><th>Rôle</th><th>Actions</th></tr>';
            users.forEach(u => {
                html += `<tr>
                    <td>${u.username}</td>
                    <td>${u.email || '<em style="color:#bdc3c7">Non renseigné</em>'}</td>
                    <td>${u.role}</td>
                    <td> 
                        <button class="secondary" title="Modifier" onclick="editUser('${u.username}', '${u.role}', '${u.email || ''}')">✏️</button>
                        ${u.username !== 'admin' ? `<button class="danger" title="Supprimer" onclick="deleteUser('${u.username}')">🗑️</button>` : ''}
                    </td>
                </tr>`;
            });
            document.getElementById('users-list').innerHTML = html + '</table>';
        }

        function editUser(username, role, email) {
            document.getElementById('user-name').value = username;
            document.getElementById('user-role').value = role;
            document.getElementById('user-email').value = email;
            document.getElementById('user-pass').value = ''; 
        }

        async function saveUser() {
            const username = document.getElementById('user-name').value;
            const email = document.getElementById('user-email').value;
            const password = document.getElementById('user-pass').value;
            const role = document.getElementById('user-role').value;

            if (!username || !password) return alert("Veuillez remplir tous les champs");

            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ username, email, password, role })
            });

            if (res.ok) {
                alert('Utilisateur enregistré !');
                document.getElementById('user-name').value = '';
                document.getElementById('user-email').value = '';
                document.getElementById('user-pass').value = '';
                loadUsers();
            } else {
                alert('Erreur lors de l\'enregistrement');
            }
        }

        async function deleteUser(username) {
            if (!confirm(`Supprimer l'utilisateur ${username} ?`)) return;
            const res = await fetch(`/api/admin/users/${username}`, {
                method: 'DELETE', //
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) loadUsers();
        }

        loadUsers();
    </script>
</body>
</html>
