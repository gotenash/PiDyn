<!DOCTYPE html>
<html>
<head>
    <title>OmniSign - Gestion des Écrans</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        section { background: #1a252f; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #34495e; }
        th, td { padding: 10px; border: 1px solid #1a252f; text-align: left; }
        th { background: #3498db; color: white; }
        input, select { padding: 8px; border: 1px solid #34495e; border-radius: 4px; background: #34495e; color: white; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.secondary { background: #6c757d; }
        button.danger { background: #e74c3c; }
        h1, h2 { color: #3498db; }
        .status-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }

        /* Styles de la grille de vignettes */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .player-card {
            background: #1a252f;
            border: 1px solid #34495e;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .player-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            border-color: #3498db;
        }
        .player-card-header {
            padding: 12px;
            background: #2c3e50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #34495e;
        }
        .player-card-title {
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ecf0f1;
            font-size: 14px;
        }
        .player-card-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }
        .screenshot-container {
            width: 100%;
            height: 160px;
            background: #000;
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #2c3e50;
        }
        .screenshot-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            cursor: pointer;
        }
        .screenshot-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #2c3e50 0%, #000 100%);
            padding: 10px;
            box-sizing: border-box;
        }
        .screenshot-placeholder .icon {
            font-size: 28px;
            margin-bottom: 6px;
        }
        .screenshot-placeholder .text {
            font-size: 11px;
            color: #bdc3c7;
            text-align: center;
            font-weight: normal;
        }
        .screenshot-hover-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(52, 152, 219, 0.9);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }
        .screenshot-container:hover .screenshot-hover-btn {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        .player-card-meta {
            font-size: 11px;
            color: #bdc3c7;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 4px 8px;
        }
        .player-card-meta span.label {
            color: #7f8c8d;
        }
        .player-card-actions {
            padding: 10px 12px;
            background: #2c3e50;
            border-top: 1px solid #34495e;
            display: flex;
            justify-content: flex-end;
            gap: 6px;
        }
        .player-card-actions button {
            padding: 6px;
            margin: 0;
        }
        .view-mode-toggle button {
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .view-mode-toggle button.active {
            background: #3498db !important;
        }
    </style>
</head>
<script src="/socket.io/socket.io.js"></script>
<body>
    <div id="screenshot-gallery" style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; max-height: 80vh; overflow-y: auto; pointer-events: none;"></div>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>OmniSign - Gestion des Écrans</h1>
        <button class="secondary" onclick="logout()">Déconnexion</button>
    </header>

    <nav style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="secondary" onclick="window.location.href='/'">📊 Accueil</button>
        <button onclick="window.location.href='/ecrans'">🖥 Écrans</button>
        <button class="secondary" onclick="window.location.href='/diaporamas'">🎞 Diaporamas</button>
        <button class="secondary" onclick="window.location.href='/canteen'">🍴 Cantine</button>
        <button class="secondary" onclick="window.location.href='/mediatheque'">📁 Médiathèque</button>
        <button class="secondary" onclick="window.location.href='/users'">👥 Utilisateurs</button>
        <button class="secondary" onclick="window.location.href='/sites'">🏢 Sites</button>
        <button class="secondary" onclick="window.location.href='/systeme'">⚙️ Système</button>
    </nav>

    <section id="players-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <h2 style="margin:0;">Écrans Connectés</h2>
            <div class="view-mode-toggle" style="display:flex; gap:5px; background:#1a252f; border:1px solid #34495e; padding:3px; border-radius:6px;">
                <button id="view-vignettes-btn" onclick="setViewMode('vignettes')" style="padding:6px 12px; font-size:13px; background:none;">🎴 Vignettes</button>
                <button id="view-table-btn" onclick="setViewMode('table')" style="padding:6px 12px; font-size:13px; background:none;">📋 Tableau</button>
            </div>
        </div>
        <div style="display:flex; gap:10px; margin-bottom:15px; align-items:center;">
            <label for="filter-group">Filtrer par groupe :</label>
            <select id="filter-group" onchange="filterPlayers()">
                <option value="">Tous les groupes</option>
            </select>
            <button class="secondary" onclick="load()">Actualiser</button>
        </div>
        <div id="players-list"></div>
    </section>

    <section id="groups-section">
        <h2>Gestion des Groupes</h2>
        <div style="background:#1a252f; padding:15px; border-radius:8px; margin-bottom:15px;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="group-name" placeholder="Nom du groupe (ex: Accueil, Cantine...)" style="flex:1">
                <button onclick="saveGroup()">+ Créer le groupe</button>
            </div>
        </div>
        <div id="groups-list"></div>
    </section>

    <section id="group-assign-section">
        <h2>Assignation Groupée</h2>
        <div style="background:#1a252f; padding:15px; border-radius:8px;">
            <div style="display:flex; gap:10px; align-items:center;">
                <label>Groupe :</label>
                <select id="assign-group-select" style="flex:1"></select>
                <label>Diaporama/Séquence :</label>
                <select id="assign-playlist-select" style="flex:2"></select>
                <button onclick="assignPlaylistToGroup()" style="background:#28a745">Assigner au groupe</button>
            </div>
        </div>
    </section>

    <section>
        <h2>Messages Flash / Alertes</h2>
        <div style="background:#1a252f; padding:15px; border-radius:8px; margin-bottom:15px;">
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <input type="text" id="alert-text" placeholder="Message à diffuser..." style="flex:3">
                <select id="alert-type" style="flex:1">
                    <option value="info">Information (Bleu)</option>
                    <option value="warning">Attention (Orange)</option>
                    <option value="danger">Urgence (Rouge)</option>
                </select>
                <select id="alert-target" style="flex:1"></select>
                <button onclick="sendAlert()" style="background:#28a745">Diffuser</button>
            </div>
        </div>
        <div id="alerts-list"></div>
    </section>

    <script>
        let token = localStorage.getItem('pidyn_token');
        let socket = null;
        let role = localStorage.getItem('pidyn_role');
        let viewMode = localStorage.getItem('pidyn_screens_view_mode') || 'vignettes';

        if (!token) window.location.href = '/';

        function logout() {
            localStorage.removeItem('pidyn_token');
            localStorage.removeItem('pidyn_role');
            localStorage.removeItem('pidyn_username');
            localStorage.removeItem('pidyn_siteId');
            window.location.href = '/';
        }

        if (role !== 'admin') {
            document.addEventListener('DOMContentLoaded', () => {
                document.querySelectorAll('nav button[onclick*="/users"], nav button[onclick*="/systeme"], nav button[onclick*="/sites"]').forEach(b => b.style.display = 'none');
            });
        }

        function setViewMode(mode) {
            viewMode = mode;
            localStorage.setItem('pidyn_screens_view_mode', mode);
            load();
        }

        function setupSocket() {
            socket = io({ auth: { token } });
            socket.on('admin-player-status', (data) => load());
            socket.on('screenshot-taken', (data) => {
                // Mettre à jour l'image de la vignette dans la grille en temps réel
                const card = document.querySelector(`.player-card[data-id="${data.deviceId}"]`);
                if (card) {
                    const img = card.querySelector('.screenshot-img');
                    const ph = card.querySelector('.screenshot-placeholder');
                    if (img && ph) {
                        img.src = data.image;
                        img.style.display = 'block';
                        ph.style.display = 'none';
                    }
                }
                
                if (window.playersData && window.playersData[data.deviceId]) {
                    window.playersData[data.deviceId].latestScreenshot = data.image;
                }

                const gallery = document.getElementById('screenshot-gallery');
                const galleryCard = document.createElement('div');
                galleryCard.style.cssText = "background:#34495e; padding:10px; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.5); pointer-events:auto; position:relative;";
                galleryCard.innerHTML = `
                    <button style="position:absolute; top:5px; right:5px; background:#e74c3c; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; font-size:14px; font-weight:bold;" onclick="this.parentElement.remove()">×</button>
                    <div style="font-size:10px; margin-bottom:5px;">${data.deviceId} - ${new Date().toLocaleTimeString()}</div>
                    <img src="${data.image}" style="max-width:250px; display:block; cursor:pointer;" onclick="window.open(this.src)">
                `;
                gallery.prepend(galleryCard);
                setTimeout(() => galleryCard.remove(), 60000);
            });
        }

        async function load() {
            const res = await fetch('/api/admin/data', { headers: { 'Authorization': `Bearer ${token}` } });
            const { players, playlists, sequences, groups } = await res.json();
            
            window.playersData = players;

            // Activer la classe active sur les boutons de mode
            const vBtn = document.getElementById('view-vignettes-btn');
            const tBtn = document.getElementById('view-table-btn');
            if (vBtn && tBtn) {
                vBtn.classList.toggle('active', viewMode === 'vignettes');
                tBtn.classList.toggle('active', viewMode === 'table');
            }

            const filterEl = document.getElementById('filter-group');
            const savedFilterValue = filterEl ? filterEl.value : '';

            let html = '';
            if (viewMode === 'table') {
                html = '<table><tr><th>Nom</th><th>ID</th><th>Groupe</th><th>Statut</th><th>Diaporama</th><th>WiFi</th><th>Volume</th><th>Dernière vue</th><th>Action</th></tr>';
                for (let id in players) {
                    const p = players[id];
                    if (!id || id === 'undefined' || id === 'null') continue;

                    const isOnline = p.lastSeen && (new Date() - new Date(p.lastSeen) < 60000);
                    const plName = p.currentPlaylistId ? (playlists[p.currentPlaylistId]?.name || 'Inconnue') : 'Aucune';
                    const lastSeen = p.lastSeen ? new Date(p.lastSeen).toLocaleString() : 'Jamais';

                    html += `<tr>
                        <td><span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>${p.name}</td>
                        <td style="font-family:monospace; font-size:11px;">${id}</td>
                        <td>
                            <select onchange="assignGroup('${id}', this.value)">
                                <option value="">Aucun</option>
                                ${groups.map(g => `<option value="${g.id}" ${p.groupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
                            </select>
                        </td>
                        <td>${p.status === 'pending' ? 'En attente' : 'Approuvé'}</td>
                        <td>
                            <strong>${plName}</strong>
                            ${p.status === 'approved' ? `
                                <br>
                                <select onchange="assign('${id}', this.value)" style="margin-top: 5px; font-size: 0.9em;">
                                    <option value="">Assigner...</option>
                                    <optgroup label="Diaporamas">
                                        ${Object.keys(playlists).map(pId => {
                                            const pl = playlists[pId];
                                            const statusLabel = pl.status && pl.status !== 'approved' ? ` (${pl.status === 'pending' ? 'En attente' : 'Brouillon'})` : '';
                                            return `<option value="p:${pId}" ${p.manualPlaylistId === pId ? 'selected' : ''}>${pl.name}${statusLabel}</option>`;
                                        }).join('')}
                                    </optgroup>
                                    <optgroup label="Séquences">
                                        ${Object.keys(sequences).map(sId => `<option value="s:${sId}" ${p.manualSequenceId === sId ? 'selected' : ''}>${sequences[sId].name}</option>`).join('')}
                                    </optgroup>
                                </select>` : ''}
                        </td>
                        <td>${p.wifiSSID || 'Ethernet'}<br><small>${p.ip || ''}</small></td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px; min-width: 120px;">
                                <input type="range" min="0" max="100" value="${p.volume !== undefined ? p.volume : 100}" 
                                       onchange="updateVolume('${id}', this.value)" 
                                       oninput="this.nextElementSibling.innerText = this.value + '%'"
                                       style="width: 80px; margin: 0; padding: 0; vertical-align: middle;">
                                <span style="font-size: 11px; width: 32px; display: inline-block;">${p.volume !== undefined ? p.volume : 100}%</span>
                            </div>
                        </td>
                        <td style="font-size:11px;">${lastSeen}</td>
                        <td>
                            ${p.status === 'pending' ? `<button onclick="approvePlayer('${id}')">Approuver</button>` : ''}
                            <button class="secondary" title="Prendre une capture" onclick="takeScreenshot('${id}')">📸</button>
                            <button class="secondary" title="Forcer Synchro" onclick="forceSync('${id}')">🔄</button>
                            <button class="secondary" title="Vider Cache" onclick="clearCache('${id}')">🧹</button>
                            <button class="secondary" title="Allumer l'écran" onclick="toggleScreen('${id}', 'on')">💡</button>
                            <button class="secondary" title="Éteindre l'écran (Veille)" onclick="toggleScreen('${id}', 'off')">🌙</button>
                            <button class="secondary" title="Redémarrer le service" onclick="restartScreen('${id}')">⚙️</button>
                            <button class="secondary" title="Redémarrer le système (Reboot)" onclick="rebootDevice('${id}')">🔌</button>
                            <button class="danger" title="Supprimer" onclick="removePlayer('${id}')">🗑️</button>
                        </td>
                    </tr>`;
                }
                html += '</table>';
            } else {
                html = '<div class="players-grid">';
                for (let id in players) {
                    const p = players[id];
                    if (!id || id === 'undefined' || id === 'null') continue;

                    const isOnline = p.lastSeen && (new Date() - new Date(p.lastSeen) < 60000);
                    const plName = p.currentPlaylistId ? (playlists[p.currentPlaylistId]?.name || 'Inconnue') : 'Aucune';
                    const lastSeen = p.lastSeen ? new Date(p.lastSeen).toLocaleString() : 'Jamais';
                    
                    const screenSrc = p.latestScreenshot || '';

                    html += `
                    <div class="player-card" data-id="${id}" data-group-id="${p.groupId || ''}">
                        <div class="player-card-header">
                            <div class="player-card-title">
                                <span class="status-dot ${isOnline ? 'online' : 'offline'}"></span>
                                <span>${p.name}</span>
                            </div>
                            <div class="player-card-group">
                                <select onchange="assignGroup('${id}', this.value)" style="padding: 4px; font-size: 12px; background: #34495e;">
                                    <option value="">Aucun groupe</option>
                                    ${groups.map(g => `<option value="${g.id}" ${p.groupId === g.id ? 'selected' : ''}>${g.name}</option>`).join('')}
                                </select>
                            </div>
                        </div>
                        <div class="player-card-body">
                            <div class="screenshot-container">
                                <img src="${screenSrc}" class="screenshot-img" style="display: ${screenSrc ? 'block' : 'none'};" onclick="window.open(this.src)">
                                <div class="screenshot-placeholder" style="display: ${screenSrc ? 'none' : 'flex'};">
                                    <span class="icon">🖥️</span>
                                    <span class="text">Aucune capture disponible</span>
                                </div>
                                <button class="screenshot-hover-btn" onclick="takeScreenshot('${id}')">📸 Capturer</button>
                            </div>
                            
                            <div class="player-card-meta">
                                <span class="label">ID :</span>
                                <span style="font-family:monospace; font-size:10px;">${id}</span>
                                
                                <span class="label">IP :</span>
                                <span>${p.ip || 'Inconnue'}</span>
                                
                                <span class="label">WiFi :</span>
                                <span>${p.wifiSSID || 'Ethernet'} ${p.wifiSignal ? `(${p.wifiSignal}%)` : ''}</span>
                                
                                <span class="label">Dernière vue :</span>
                                <span>${lastSeen}</span>
                                
                                <span class="label">Statut :</span>
                                <span>${p.status === 'pending' ? 'En attente' : 'Approuvé'}</span>
                            </div>

                            <div style="border-top: 1px solid #34495e; padding-top: 10px; margin-top: 5px;">
                                <div style="font-size:12px; margin-bottom: 5px; color:#bdc3c7;">Diaporama actif :</div>
                                <div style="font-weight:bold; font-size:14px; margin-bottom: 8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${plName}">${plName}</div>
                                ${p.status === 'approved' ? `
                                    <select onchange="assign('${id}', this.value)" style="width: 100%; font-size: 13px;">
                                        <option value="">Assigner...</option>
                                        <optgroup label="Diaporamas">
                                            ${Object.keys(playlists).map(pId => {
                                                const pl = playlists[pId];
                                                const statusLabel = pl.status && pl.status !== 'approved' ? ` (${pl.status === 'pending' ? 'En attente' : 'Brouillon'})` : '';
                                                return `<option value="p:${pId}" ${p.manualPlaylistId === pId ? 'selected' : ''}>${pl.name}${statusLabel}</option>`;
                                            }).join('')}
                                        </optgroup>
                                        <optgroup label="Séquences">
                                            ${Object.keys(sequences).map(sId => `<option value="s:${sId}" ${p.manualSequenceId === sId ? 'selected' : ''}>${sequences[sId].name}</option>`).join('')}
                                        </optgroup>
                                    </select>` : ''}
                            </div>

                            <div style="border-top: 1px solid #34495e; padding-top: 10px; display:flex; align-items:center; justify-content:space-between;">
                                <span style="font-size:12px; color:#bdc3c7;">Volume :</span>
                                <div style="display: flex; align-items: center; gap: 8px;">
                                    <input type="range" min="0" max="100" value="${p.volume !== undefined ? p.volume : 100}" 
                                           onchange="updateVolume('${id}', this.value)" 
                                           oninput="this.nextElementSibling.innerText = this.value + '%'"
                                           style="width: 80px; margin: 0; padding: 0; vertical-align: middle;">
                                    <span style="font-size: 11px; width: 32px; display: inline-block; text-align:right;">${p.volume !== undefined ? p.volume : 100}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="player-card-actions" style="flex-wrap: wrap; justify-content: flex-start; gap: 6px;">
                            ${p.status === 'pending' ? `<button onclick="approvePlayer('${id}')" style="background:#2ecc71;">Approuver</button>` : ''}
                            <button class="secondary" title="Prendre une capture" onclick="takeScreenshot('${id}')">📸 Capture</button>
                            <button class="secondary" title="Forcer Synchro" onclick="forceSync('${id}')">🔄 Synchro</button>
                            <button class="secondary" title="Vider Cache" onclick="clearCache('${id}')">🧹 Cache</button>
                            <button class="secondary" title="Allumer l'écran" onclick="toggleScreen('${id}', 'on')" style="background:#27ae60;">💡 Allumer</button>
                            <button class="secondary" title="Éteindre l'écran" onclick="toggleScreen('${id}', 'off')" style="background:#7f8c8d;">🌙 Veille</button>
                            <button class="secondary" title="Redémarrer le service" onclick="restartScreen('${id}')" style="background:#d35400;">⚙️ Relancer</button>
                            <button class="secondary" title="Redémarrer le système (Reboot)" onclick="rebootDevice('${id}')" style="background:#c0392b;">🔌 Reboot</button>
                            <button class="danger" title="Supprimer" onclick="removePlayer('${id}')">🗑️</button>
                        </div>
                    </div>`;
                }
                html += '</div>';
            }
            document.getElementById('players-list').innerHTML = html;

            const grpSelects = ['filter-group', 'assign-group-select'];
            grpSelects.forEach(sid => {
                const el = document.getElementById(sid);
                if (el) {
                    el.innerHTML = (sid === 'filter-group' ? '<option value="">Tous les groupes</option>' : '') + 
                                   groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
                }
            });

            if (filterEl) {
                filterEl.value = savedFilterValue;
                filterPlayers();
            }

            document.getElementById('assign-playlist-select').innerHTML = 
                Object.keys(playlists).map(id => {
                    const pl = playlists[id];
                    const statusLabel = pl.status && pl.status !== 'approved' ? ` (${pl.status === 'pending' ? 'En attente' : 'Brouillon'})` : '';
                    return `<option value="p:${id}">Diaporama: ${pl.name}${statusLabel}</option>`;
                }).join('') +
                Object.keys(sequences).map(id => `<option value="s:${id}">Séquence: ${sequences[id].name}</option>`).join('');

            document.getElementById('alert-target').innerHTML = '<option value="">Tous les écrans</option>' + 
                Object.keys(players).map(id => `<option value="${id}">${players[id].name}</option>`).join('');

            document.getElementById('groups-list').innerHTML = groups.map(g => `
                <div style="background:#34495e; padding:10px; margin-bottom:5px; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
                    <span><strong>${g.name}</strong></span>
                    <div style="display:flex; gap:5px;">
                        <button class="secondary" onclick="captureGroup('${g.id}')">📸 Capture</button>
                        <button class="danger" onclick="deleteGroup('${g.id}')">🗑️</button>
                    </div>
                </div>`).join('');
            
            loadAlerts();
        }

        async function approvePlayer(id) { 
            const res = await fetch(`/api/admin/players/approve/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); 
            if (res.ok) load(); 
            else alert("Échec de l'approbation");
        }
        async function removePlayer(id) { 
            if (confirm(`Supprimer l'écran ${id} ?`)) {
                const res = await fetch(`/api/admin/players/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); 
                if (res.ok) load();
                else alert("Erreur lors de la suppression");
            }
        }
        async function forceSync(id) { await fetch(`/api/admin/players/force-sync/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); }
        async function restartScreen(id) { await fetch(`/api/admin/players/restart-screen/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); }
        async function rebootDevice(id) { if (confirm("Redémarrer physiquement le Raspberry Pi ?")) { await fetch(`/api/admin/players/reboot/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); } }
        async function toggleScreen(id, action) { await fetch('/api/admin/players/screen', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ deviceId: id, action }) }); }
        async function clearCache(id) { await fetch(`/api/admin/players/clear-cache/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); }
        async function takeScreenshot(id) { await fetch(`/api/admin/players/screenshot/${id}`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); }
        async function updateVolume(deviceId, volume) {
            try {
                await fetch(`/api/admin/players/${deviceId}/volume`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ volume: parseInt(volume) })
                });
            } catch (err) {
                console.error("Error updating volume:", err);
            }
        }
        
        async function assign(deviceId, targetId) {
            await fetch('/api/admin/assign', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ deviceId, targetId })
            });
            load();
        }
        
        async function assignGroup(deviceId, groupId) {
            await fetch(`/api/admin/players/${deviceId}/group`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ groupId: groupId || null })
            });
            load();
        }

        async function saveGroup() {
            const name = document.getElementById('group-name').value;
            if (!name) return;
            await fetch('/api/admin/groups', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name })
            });
            document.getElementById('group-name').value = '';
            load();
        }

        async function deleteGroup(id) { if (confirm('Supprimer ce groupe ?')) { await fetch(`/api/admin/groups/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); load(); } }
        async function captureGroup(groupId) { await fetch(`/api/admin/groups/${groupId}/screenshot`, { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } }); }

        async function assignPlaylistToGroup() {
            const groupId = document.getElementById('assign-group-select').value;
            const targetId = document.getElementById('assign-playlist-select').value;
            await fetch(`/api/admin/groups/${groupId}/assign`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ targetId })
            });
            load();
        }

        function getAlertIcon(type) {
            if (type === 'danger') return '🚨';
            if (type === 'warning') return '⚠️';
            return 'ℹ️';
        }

        async function loadAlerts() {
            const res = await fetch('/api/admin/alerts', { headers: { 'Authorization': `Bearer ${token}` } });
            const alerts = await res.json();
            document.getElementById('alerts-list').innerHTML = alerts.map(a => `
                <div style="background:#34495e; padding:10px; margin-bottom:5px; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
                    <span><strong>[${a.targetDeviceId || 'TOUS'}]</strong> ${getAlertIcon(a.type)} ${a.text}</span>
                    <button class="danger" onclick="deleteAlert(${a.id})">Arrêter</button>
                </div>`).join('');
        }

        async function sendAlert() {
            const text = document.getElementById('alert-text').value;
            const type = document.getElementById('alert-type').value;
            const targetDeviceId = document.getElementById('alert-target').value;
            if (!text) return;
            await fetch('/api/admin/alerts', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ text, type, targetDeviceId })
            });
            document.getElementById('alert-text').value = '';
            loadAlerts();
        }

        async function deleteAlert(id) { await fetch(`/api/admin/alerts/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } }); loadAlerts(); }

        function filterPlayers() {
            const gid = document.getElementById('filter-group').value;
            if (viewMode === 'table') {
                document.querySelectorAll('#players-list table tr').forEach((row, i) => {
                    if (i === 0) return;
                    const selectEl = row.querySelector('select');
                    if (selectEl) {
                        const pgid = selectEl.value;
                        row.style.display = (gid === '' || pgid === gid) ? '' : 'none';
                    }
                });
            } else {
                document.querySelectorAll('#players-list .player-card').forEach((card) => {
                    const pgid = card.dataset.groupId || '';
                    card.style.display = (gid === '' || pgid === gid) ? '' : 'none';
                });
            }
        }

        setupSocket();
        load();
    </script>
