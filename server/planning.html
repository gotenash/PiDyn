<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSign - Planning & Agenda de Diffusion</title>
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.secondary { background: #6c757d; }
        button.danger { background: #e74c3c; }

        .planning-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .schedule-card {
            background: var(--card-bg, #24303f) !important;
            border: 1px solid var(--border-color, rgba(255, 255, 255, 0.1)) !important;
            border-radius: 12px;
            padding: 18px;
            position: relative;
            box-shadow: 0 8px 20px var(--shadow-color, rgba(0, 0, 0, 0.3));
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .schedule-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px var(--shadow-color, rgba(0, 0, 0, 0.4));
        }
        .schedule-card.inactive {
            opacity: 0.55;
            border-color: var(--border-color, rgba(255, 255, 255, 0.05));
        }
        .schedule-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }
        .schedule-title {
            font-size: 1.1em;
            font-weight: bold;
            color: var(--text-primary, #ffffff);
            margin: 0;
        }
        .schedule-badge {
            font-size: 0.75em;
            padding: 3px 8px;
            border-radius: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .badge-recurring { background: rgba(46, 204, 113, 0.2); color: #2ecc71; border: 1px solid #2ecc71; }
        .badge-event { background: rgba(155, 89, 182, 0.2); color: #9b59b6; border: 1px solid #9b59b6; }
        .badge-priority { background: rgba(231, 76, 60, 0.2); color: #e74c3c; border: 1px solid #e74c3c; }

        .schedule-meta {
            font-size: 0.9em;
            color: var(--text-secondary, #bdc3c7);
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 15px;
        }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .days-bar {
            display: flex;
            gap: 4px;
            margin-top: 6px;
        }
        .day-chip {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75em;
            font-weight: bold;
            background: var(--nav-btn-bg, rgba(255, 255, 255, 0.1));
            color: var(--text-secondary, #7f8c8d);
        }
        .day-chip.active {
            background: #3498db;
            color: #ffffff;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.5);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #7f8c8d; transition: .3s; border-radius: 24px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* Modal Styles */
        .modal {
            display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7); backdrop-filter: blur(5px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--bg-secondary, #2c3e50); padding: 25px; border-radius: 12px; width: 90%; max-width: 550px;
            box-shadow: 0 10px 30px var(--shadow-color, rgba(0,0,0,0.5)); color: var(--text-primary, white); max-height: 90vh; overflow-y: auto;
            border: 1px solid var(--border-color, #34495e);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block; font-weight: bold; font-size: 0.9em; margin-bottom: 6px; color: var(--text-primary, white);
        }
        .form-group input, .form-group select {
            width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid var(--border-color, #34495e);
            background: var(--input-bg, #1e2a38); color: var(--text-primary, white); font-size: 0.95em; box-sizing: border-box;
        }
        .days-checkboxes {
            display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px;
        }
        .days-checkboxes label {
            display: flex; align-items: center; gap: 4px; font-weight: normal; cursor: pointer;
            background: var(--input-bg, #1e2a38); padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-color, #34495e); color: var(--text-primary, white);
        }
    </style>
</head>
<body>
    <div id="login-overlay" style="display: none;">
        <div id="login-box">
            <h2 style="margin: 0;">Connexion OmniSign</h2>
            <input type="text" id="username" placeholder="Utilisateur" style="width: 200px;">
            <input type="password" id="password" placeholder="Mot de passe" style="width: 200px;">
            <button onclick="login()" style="width: 220px; font-weight: bold;">Se connecter</button>
        </div>
    </div>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
        <h1 style="margin: 0; color: #3498db;">OmniSign - Planning & Agenda de Diffusion</h1>
        <button class="secondary" onclick="logout()">Déconnexion</button>
    </header>

    <nav style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button class="secondary" onclick="window.location.href='/'">📊 Accueil</button>
        <button class="secondary" onclick="window.location.href='/ecrans'">🖥 Écrans</button>
        <button class="secondary" onclick="window.location.href='/diaporamas'">🎞 Diaporamas</button>
        <button onclick="window.location.href='/planning'">📅 Planning</button>
        <button class="secondary" onclick="window.location.href='/canteen'">🍴 Cantine</button>
        <button class="secondary" onclick="window.location.href='/mediatheque'">📁 Médiathèque</button>
        <button class="secondary" onclick="window.location.href='/users'">👥 Utilisateurs</button>
        <button class="secondary" onclick="window.location.href='/sites'">🏢 Sites</button>
        <button class="secondary" onclick="window.location.href='/systeme'">⚙️ Système</button>
    </nav>

    <section id="planning-section">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0;">Règles de Planification Définies</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <select id="filter-target" onchange="loadSchedules()" style="padding: 6px 10px;">
                    <option value="">Toutes les cibles</option>
                    <option value="global">Global (Tous les écrans)</option>
                    <optgroup label="Groupes" id="filter-groups-optgroup"></optgroup>
                    <optgroup label="Écrans" id="filter-players-optgroup"></optgroup>
                </select>
                <button onclick="openScheduleModal()" style="font-weight: bold; background: #2ecc71;">➕ Nouveau Planning</button>
            </div>
        </div>

        <div id="planning-list" class="planning-grid">
            <p>Chargement du planning...</p>
        </div>
    </section>

    <!-- Modal de Création / Édition de Règle de Planning -->
    <div id="schedule-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top: 0;">Nouveau Planning de Diffusion</h3>
            <form id="schedule-form" onsubmit="saveSchedule(event)">
                <input type="hidden" id="schedule-id">

                <div class="form-group">
                    <label>Nom de la règle :</label>
                    <input type="text" id="sched-name" placeholder="Ex: Diffusion Matin, Menu Cantine Midi" required>
                </div>

                <div class="form-group">
                    <label>Cible de la règle :</label>
                    <select id="sched-target-type" onchange="onTargetTypeChange()">
                        <option value="global">Tous les écrans (Global)</option>
                        <option value="group">Groupe d'écrans</option>
                        <option value="player">Écran spécifique</option>
                    </select>
                </div>

                <div class="form-group" id="target-id-group" style="display: none;">
                    <label id="target-id-label">Sélectionner la cible :</label>
                    <select id="sched-target-id"></select>
                </div>

                <div class="form-group">
                    <label>Contenu à diffuser :</label>
                    <select id="sched-content-id" required>
                        <optgroup label="Diaporamas" id="sched-playlists-optgroup"></optgroup>
                        <optgroup label="Séquences" id="sched-sequences-optgroup"></optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Type de planification :</label>
                    <select id="sched-type" onchange="onScheduleTypeChange()">
                        <option value="recurring">Récurrent (Jours & Horaires de la semaine)</option>
                        <option value="date_range">Événementiel (Période / Dates précises)</option>
                    </select>
                </div>

                <div id="recurring-fields">
                    <div class="form-group">
                        <label>Jours de la semaine :</label>
                        <div class="days-checkboxes">
                            <label><input type="checkbox" class="day-cb" value="1" checked> Lun</label>
                            <label><input type="checkbox" class="day-cb" value="2" checked> Mar</label>
                            <label><input type="checkbox" class="day-cb" value="3" checked> Mer</label>
                            <label><input type="checkbox" class="day-cb" value="4" checked> Jeu</label>
                            <label><input type="checkbox" class="day-cb" value="5" checked> Ven</label>
                            <label><input type="checkbox" class="day-cb" value="6"> Sam</label>
                            <label><input type="checkbox" class="day-cb" value="7"> Dim</label>
                        </div>
                    </div>
                </div>

                <div id="date-range-fields" style="display: none;">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Date de début :</label>
                            <input type="date" id="sched-start-date">
                        </div>
                        <div class="form-group" style="flex: 1;">
                            <label>Date de fin :</label>
                            <input type="date" id="sched-end-date">
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Heure de début :</label>
                        <input type="time" id="sched-time-start" value="08:00" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Heure de fin :</label>
                        <input type="time" id="sched-time-end" value="18:00" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Priorité :</label>
                    <select id="sched-priority">
                        <option value="10">Normale (10)</option>
                        <option value="50">Élevée (50)</option>
                        <option value="100">Priorité Absolue / Événement (100)</option>
                    </select>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
                    <button type="button" class="secondary" onclick="closeScheduleModal()">Annuler</button>
                    <button type="submit" style="background: #2ecc71; font-weight: bold;">Enregistrer le Planning</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('pidyn_token');
        let role = localStorage.getItem('pidyn_role');
        let allPlayersData = {};
        let allGroupsData = [];
        let allPlaylistsData = {};
        let allSequencesData = {};
        let allSchedulesData = [];

        async function init() {
            if (!token) {
                document.getElementById('login-overlay').style.display = 'flex';
                return;
            }
            await loadData();
            await loadSchedules();
        }

        async function loadData() {
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                const res = await fetch('/api/admin/data', { headers });
                if (res.status === 403) return logout();
                const data = await res.json();
                allPlayersData = data.players || {};
                allGroupsData = data.groups || [];
                allPlaylistsData = data.playlists || {};
                allSequencesData = data.sequences || {};

                populateFiltersAndDropdowns();
            } catch (e) {
                console.error("Erreur chargement données de base:", e);
            }
        }

        function populateFiltersAndDropdowns() {
            // Remplir les optgroups du filtre
            const groupsOpt = document.getElementById('filter-groups-optgroup');
            const playersOpt = document.getElementById('filter-players-optgroup');
            
            let groupsHtml = '';
            allGroupsData.forEach(g => {
                groupsHtml += `<option value="group:${g.id}">Groupe: ${escapeHtml(g.name)}</option>`;
            });
            groupsOpt.innerHTML = groupsHtml;

            let playersHtml = '';
            for (let id in allPlayersData) {
                const p = allPlayersData[id];
                playersHtml += `<option value="player:${id}">${escapeHtml(p.name || id)}</option>`;
            }
            playersOpt.innerHTML = playersHtml;

            // Remplir les optgroups du modal de création
            const plOpt = document.getElementById('sched-playlists-optgroup');
            const seqOpt = document.getElementById('sched-sequences-optgroup');

            let plHtml = '';
            for (let id in allPlaylistsData) {
                plHtml += `<option value="p:${id}">${escapeHtml(allPlaylistsData[id].name)}</option>`;
            }
            plOpt.innerHTML = plHtml;

            let seqHtml = '';
            for (let id in allSequencesData) {
                seqHtml += `<option value="s:${id}">${escapeHtml(allSequencesData[id].name)}</option>`;
            }
            seqOpt.innerHTML = seqHtml;
        }

        async function loadSchedules() {
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                const res = await fetch('/api/admin/schedules', { headers });
                allSchedulesData = await res.json();
                renderSchedules();
            } catch (e) {
                console.error("Erreur chargement schedules:", e);
            }
        }

        function renderSchedules() {
            const container = document.getElementById('planning-list');
            const filterVal = document.getElementById('filter-target').value;

            let filtered = allSchedulesData;
            if (filterVal) {
                if (filterVal === 'global') {
                    filtered = allSchedulesData.filter(s => s.targetType === 'global' || !s.targetType);
                } else if (filterVal.startsWith('group:')) {
                    const gId = filterVal.replace('group:', '');
                    filtered = allSchedulesData.filter(s => s.targetType === 'group' && s.targetId === gId);
                } else if (filterVal.startsWith('player:')) {
                    const pId = filterVal.replace('player:', '');
                    filtered = allSchedulesData.filter(s => (s.targetType === 'player' && (s.targetId === pId || s.deviceId === pId)));
                }
            }

            if (!filtered || filtered.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #bdc3c7;">Aucune règle de planification définie pour ces critères.</div>';
                return;
            }

            const dayNames = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];

            let html = '';
            filtered.forEach(s => {
                const isActive = s.active !== 0 && s.active !== false && s.active !== 'false';
                
                // Déterminer le nom du contenu
                let contentName = 'Inconnu';
                let contentIcon = '🎞️';
                if (s.playlistId) {
                    contentName = allPlaylistsData[s.playlistId]?.name || `Diaporama (${s.playlistId})`;
                } else if (s.sequenceId) {
                    contentName = allSequencesData[s.sequenceId]?.name || `Séquence (${s.sequenceId})`;
                    contentIcon = '🔄';
                }

                // Déterminer le nom de la cible
                let targetLabel = 'Tous les écrans (Global)';
                if (s.targetType === 'group') {
                    const grp = allGroupsData.find(g => g.id === s.targetId);
                    targetLabel = grp ? `Groupe: ${grp.name}` : `Groupe (${s.targetId})`;
                } else if (s.targetType === 'player' || s.deviceId) {
                    const devId = s.targetId || s.deviceId;
                    const pl = allPlayersData[devId];
                    targetLabel = pl ? `Écran: ${pl.name}` : `Écran (${devId})`;
                }

                // Parser les jours de la semaine
                let days = [1, 2, 3, 4, 5];
                try {
                    days = typeof s.daysOfWeek === 'string' ? JSON.parse(s.daysOfWeek) : (s.daysOfWeek || [1, 2, 3, 4, 5]);
                } catch (e) {}

                const isEvent = s.scheduleType === 'date_range' || !!s.startDate;

                html += `
                <div class="schedule-card ${isActive ? '' : 'inactive'}">
                    <div class="schedule-card-header">
                        <h4 class="schedule-title">${escapeHtml(s.name || 'Règle de diffusion')}</h4>
                        <div style="display: flex; gap: 5px; align-items: center;">
                            <span class="schedule-badge ${isEvent ? 'badge-event' : 'badge-recurring'}">
                                ${isEvent ? '📅 Événement' : '🔁 Récurrent'}
                            </span>
                            ${parseInt(s.priority) >= 50 ? `<span class="schedule-badge badge-priority">🔥 P${s.priority}</span>` : ''}
                        </div>
                    </div>

                    <div class="schedule-meta">
                        <div class="meta-row">
                            <span>🎯</span>
                            <strong>${escapeHtml(targetLabel)}</strong>
                        </div>
                        <div class="meta-row">
                            <span>${contentIcon}</span>
                            <span>${escapeHtml(contentName)}</span>
                        </div>
                        <div class="meta-row">
                            <span>⏰</span>
                            <span>${s.timeStart || '00:00'} - ${s.timeEnd || '23:59'}</span>
                        </div>
                        ${isEvent ? `
                        <div class="meta-row">
                            <span>📆</span>
                            <span>Du ${s.startDate || '?'} au ${s.endDate || '?'}</span>
                        </div>` : `
                        <div class="days-bar">
                            ${[1,2,3,4,5,6,7].map((d, i) => `
                                <div class="day-chip ${days.includes(d) ? 'active' : ''}">${dayNames[i]}</div>
                            `).join('')}
                        </div>`}
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 12px; margin-top: 10px;">
                        <label class="switch" title="Activer / Désactiver la règle">
                            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleSchedule('${s.id}')">
                            <span class="slider"></span>
                        </label>

                        <div style="display: flex; gap: 6px;">
                            <button class="secondary" style="padding: 4px 8px; font-size: 0.85em;" onclick="editSchedule('${s.id}')">✏️ Modifier</button>
                            <button class="danger" style="padding: 4px 8px; font-size: 0.85em;" onclick="deleteSchedule('${s.id}')">🗑️</button>
                        </div>
                    </div>
                </div>`;
            });

            container.innerHTML = html;
        }

        function onTargetTypeChange() {
            const targetType = document.getElementById('sched-target-type').value;
            const groupDiv = document.getElementById('target-id-group');
            const selectEl = document.getElementById('sched-target-id');
            const labelEl = document.getElementById('target-id-label');

            if (targetType === 'global') {
                groupDiv.style.display = 'none';
            } else if (targetType === 'group') {
                groupDiv.style.display = 'block';
                labelEl.innerText = 'Sélectionner le groupe d\'écrans :';
                let html = '';
                allGroupsData.forEach(g => {
                    html += `<option value="${g.id}">${escapeHtml(g.name)}</option>`;
                });
                selectEl.innerHTML = html;
            } else if (targetType === 'player') {
                groupDiv.style.display = 'block';
                labelEl.innerText = 'Sélectionner l\'écran :';
                let html = '';
                for (let id in allPlayersData) {
                    const p = allPlayersData[id];
                    html += `<option value="${id}">${escapeHtml(p.name || id)} (${id})</option>`;
                }
                selectEl.innerHTML = html;
            }
        }

        function onScheduleTypeChange() {
            const stype = document.getElementById('sched-type').value;
            document.getElementById('recurring-fields').style.display = stype === 'recurring' ? 'block' : 'none';
            document.getElementById('date-range-fields').style.display = stype === 'date_range' ? 'block' : 'none';
        }

        function openScheduleModal(sched = null) {
            document.getElementById('schedule-form').reset();
            if (sched) {
                document.getElementById('modal-title').innerText = 'Modifier la Règle de Planning';
                document.getElementById('schedule-id').value = sched.id;
                document.getElementById('sched-name').value = sched.name || '';
                document.getElementById('sched-target-type').value = sched.targetType || 'player';
                onTargetTypeChange();
                if (sched.targetId || sched.deviceId) {
                    document.getElementById('sched-target-id').value = sched.targetId || sched.deviceId;
                }
                
                const contentVal = sched.playlistId ? `p:${sched.playlistId}` : (sched.sequenceId ? `s:${sched.sequenceId}` : '');
                document.getElementById('sched-content-id').value = contentVal;

                document.getElementById('sched-type').value = sched.scheduleType || 'recurring';
                onScheduleTypeChange();

                document.getElementById('sched-time-start').value = sched.timeStart || '08:00';
                document.getElementById('sched-time-end').value = sched.timeEnd || '18:00';
                document.getElementById('sched-start-date').value = sched.startDate || '';
                document.getElementById('sched-end-date').value = sched.endDate || '';
                document.getElementById('sched-priority').value = sched.priority || '10';

                let days = [1,2,3,4,5];
                try {
                    days = typeof sched.daysOfWeek === 'string' ? JSON.parse(sched.daysOfWeek) : (sched.daysOfWeek || [1,2,3,4,5]);
                } catch(e) {}
                document.querySelectorAll('.day-cb').forEach(cb => {
                    cb.checked = days.includes(parseInt(cb.value));
                });
            } else {
                document.getElementById('modal-title').innerText = 'Nouveau Planning de Diffusion';
                document.getElementById('schedule-id').value = '';
                document.getElementById('sched-target-type').value = 'global';
                onTargetTypeChange();
                document.getElementById('sched-type').value = 'recurring';
                onScheduleTypeChange();
                document.querySelectorAll('.day-cb').forEach((cb, idx) => cb.checked = idx < 5);
            }
            document.getElementById('schedule-modal').style.display = 'flex';
        }

        function closeScheduleModal() {
            document.getElementById('schedule-modal').style.display = 'none';
        }

        async function saveSchedule(event) {
            event.preventDefault();
            const id = document.getElementById('schedule-id').value;
            const name = document.getElementById('sched-name').value;
            const targetType = document.getElementById('sched-target-type').value;
            const targetId = targetType !== 'global' ? document.getElementById('sched-target-id').value : null;
            
            const contentVal = document.getElementById('sched-content-id').value;
            let playlistId = null;
            let sequenceId = null;
            if (contentVal.startsWith('p:')) playlistId = contentVal.replace('p:', '');
            if (contentVal.startsWith('s:')) sequenceId = contentVal.replace('s:', '');

            const scheduleType = document.getElementById('sched-type').value;
            const timeStart = document.getElementById('sched-time-start').value;
            const timeEnd = document.getElementById('sched-time-end').value;
            const startDate = document.getElementById('sched-start-date').value;
            const endDate = document.getElementById('sched-end-date').value;
            const priority = document.getElementById('sched-priority').value;

            const daysOfWeek = Array.from(document.querySelectorAll('.day-cb:checked')).map(cb => parseInt(cb.value));

            const body = {
                id: id || undefined,
                name,
                targetType,
                targetId,
                playlistId,
                sequenceId,
                scheduleType,
                timeStart,
                timeEnd,
                startDate,
                endDate,
                priority,
                daysOfWeek
            };

            const headers = { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            };

            try {
                const res = await fetch('/api/admin/schedules', {
                    method: 'POST',
                    headers,
                    body: JSON.stringify(body)
                });
                if (res.ok) {
                    closeScheduleModal();
                    await loadSchedules();
                } else {
                    const err = await res.text();
                    alert('Erreur enregistrement : ' + err);
                }
            } catch (e) {
                alert('Erreur réseau : ' + e.message);
            }
        }

        function editSchedule(id) {
            const sched = allSchedulesData.find(s => s.id === id);
            if (sched) openScheduleModal(sched);
        }

        async function toggleSchedule(id) {
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                await fetch(`/api/admin/schedules/${id}/toggle`, { method: 'PUT', headers });
                await loadSchedules();
            } catch (e) {
                console.error("Erreur toggle schedule:", e);
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Supprimer cette règle de planification ?')) return;
            const headers = { 'Authorization': `Bearer ${token}` };
            try {
                const res = await fetch(`/api/admin/schedules/${id}`, { method: 'DELETE', headers });
                if (res.ok) await loadSchedules();
            } catch (e) {
                alert('Erreur suppression : ' + e.message);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function logout() {
            localStorage.removeItem('pidyn_token');
            location.reload();
        }

        init();
    </script>
</body>
</html>
