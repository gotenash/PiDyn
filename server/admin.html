<!DOCTYPE html>
<html>
<head>
    <title>OmniSign - Tableau de Bord</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #2c3e50; color: white; }
        section { background: #1a252f; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: #34495e; }
        th, td { padding: 10px; border: 1px solid #1a252f; text-align: left; }
        th { background: #3498db; color: white; }
        input, select { padding: 8px; border: 1px solid #34495e; border-radius: 4px; background: #34495e; color: white; }
        button { padding: 10px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button.secondary { background: #6c757d; }
        button.danger { background: #e74c3c; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('img/splashscreen.png') no-repeat center center; background-size: cover; z-index: 100; display: flex; align-items: center; justify-content: center; }
        #login-box { background: #1a252f; padding: 30px; border-radius: 15px; border: 2px solid #3498db; box-shadow: 0 10px 40px rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; gap: 15px; text-align: center; }
        h1, h2 { color: #3498db; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: #34495e; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.15); transition: transform 0.2s, box-shadow 0.2s; }
        .stat-card:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.25); }
        .stat-card h3 { margin: 0 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; color: #bdc3c7; }
        .stat-card p { margin: 0; font-size: 2.2em; font-weight: bold; color: #3498db; }
    </style>
    <link rel="stylesheet" href="/assets/theme.css">
    <script src="/assets/theme.js"></script>
</head>
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>
    <div id="screenshot-gallery" style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 2000; max-height: 80vh; overflow-y: auto; pointer-events: none;"></div>
 
    <div id="login-overlay">
        <div id="login-box">
            <h2 style="margin: 0;">Connexion OmniSign</h2>
            <input type="text" id="username" placeholder="Utilisateur" onkeydown="handleLoginKey(event)" style="width: 200px;">
            <input type="password" id="password" placeholder="Mot de passe" onkeydown="handleLoginKey(event)" style="width: 200px;">
            <button onclick="login()" style="width: 220px; font-weight: bold;">Se connecter</button>
        </div>
    </div>
 
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px;">
        <h1 style="margin: 0; color: #3498db;">OmniSign - Statistiques de Diffusion</h1>
        <button class="secondary" onclick="logout()">Déconnexion</button>
    </header>

    <nav style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button onclick="window.location.href='/'">📊 Accueil</button>
        <button class="secondary" onclick="window.location.href='/ecrans'">🖥 Écrans</button>
        <button class="secondary" onclick="window.location.href='/diaporamas'">🎞 Diaporamas</button>
        <button class="secondary" onclick="window.location.href='/planning'">📅 Planning</button>
        <button class="secondary" onclick="window.location.href='/canteen'">🍴 Cantine</button>
        <button class="secondary" onclick="window.location.href='/mediatheque'">📁 Médiathèque</button>
        <button class="secondary" onclick="window.location.href='/users'">👥 Utilisateurs</button>
        <button class="secondary" onclick="window.location.href='/sites'">🏢 Sites</button>
        <button class="secondary" onclick="window.location.href='/systeme'">⚙️ Système</button>
    </nav>

    <section id="analytics-section" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
            <h2 style="margin: 0;">Statistiques de Diffusion (Top 50)</h2>
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 0.9em; font-weight: bold;">Groupe :</label>
                    <select id="analytics-group-filter" onchange="onGroupFilterChange()" style="padding: 6px 10px;">
                        <option value="">Tous les groupes</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <label style="font-size: 0.9em; font-weight: bold;">Écran :</label>
                    <select id="analytics-screen-filter" onchange="loadAnalytics()" style="padding: 6px 10px;">
                        <option value="">Tous les écrans</option>
                    </select>
                </div>
                <button class="danger" onclick="resetAnalytics()">Réinitialiser les stats</button>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card" style="cursor: pointer;" onclick="window.location.href='/ecrans?status=online'">
                <h3>Écrans en ligne</h3>
                <p id="online-screens-count" style="color: #2ecc71;">0</p>
            </div>
            <div class="stat-card" style="cursor: pointer;" onclick="window.location.href='/ecrans?status=offline'">
                <h3>Écrans hors ligne</h3>
                <p id="offline-screens-count" style="color: #e74c3c;">0</p>
            </div>
            <div class="stat-card" style="cursor: pointer;" onclick="window.location.href='/diaporamas'">
                <h3>Diaporamas</h3>
                <p id="playlists-count">0</p>
            </div>
            <div class="stat-card" style="cursor: pointer;" onclick="window.location.href='/diaporamas'">
                <h3>Séquences</h3>
                <p id="sequences-count">0</p>
            </div>
            <div class="stat-card" style="cursor: pointer;" onclick="window.location.href='/mediatheque'">
                <h3>Médiathèque</h3>
                <p id="media-count">0</p>
            </div>
            <div class="stat-card" id="site-card" style="cursor: pointer;" onclick="window.location.href='/sites'">
                <h3>Site</h3>
                <p id="site-display" style="font-size: 1.5em; color: #f1c40f; padding-top: 8px;">Global</p>
            </div>
        </div>
        <div class="settings-box" style="padding: 15px; border-radius: 8px; margin-bottom: 15px;">
            <canvas id="analytics-chart" style="width: 100%; max-height: 250px;"></canvas>
        </div>
        <div id="analytics-list">
            <p>Chargement des statistiques...</p>
        </div>
    </section>

    <script>
        let token = localStorage.getItem('pidyn_token');
        let role = localStorage.getItem('pidyn_role');
        let socket = null;

        function handleLoginKey(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: u, password: p })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                role = data.role;
                localStorage.setItem('pidyn_token', token);
                localStorage.setItem('pidyn_role', role);
                localStorage.setItem('pidyn_username', data.username);
                localStorage.setItem('pidyn_siteId', data.siteId || '');
                checkAuth();
            } else alert('Identifiants incorrects');
        }

        function logout() {
            localStorage.removeItem('pidyn_token');
            localStorage.removeItem('pidyn_role');
            localStorage.removeItem('pidyn_username');
            localStorage.removeItem('pidyn_siteId');
            location.reload();
        }

        function setupSocket() {
            if (socket) return; // Prevent multiple socket connections
            socket = io({ auth: { token } });
            socket.on('admin-player-status', (data) => {
                // Reload only player counts, not all analytics
                loadPlayerCounts();
            });
            socket.on('admin-analytics-update', () => {
                // Rafraîchir les graphiques et le tableau en temps réel
                loadAnalytics();
            });
            socket.on('screenshot-taken', (data) => {
                const gallery = document.getElementById('screenshot-gallery');
                const card = document.createElement('div');
                card.style.cssText = "background:#34495e; padding:10px; border-radius:8px; box-shadow:0 5px 15px rgba(0,0,0,0.5); pointer-events:auto; position:relative;";
                card.innerHTML = `
                    <button style="position:absolute; top:5px; right:5px; background:#e74c3c; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; padding:0; line-height:1; font-size:14px; font-weight:bold;" onclick="this.parentElement.remove()">×</button>
                    <div style="font-size:10px; margin-bottom:5px;">${data.deviceId} - ${new Date().toLocaleTimeString()}</div>
                    <img src="${data.image}" style="max-width:250px; display:block; cursor:pointer;" onclick="window.open(this.src)">
                `;
                gallery.prepend(card);
                setTimeout(() => card.remove(), 60000);
            });
        }

        function checkAuth() {
            if (token) {
                document.getElementById('login-overlay').style.display = 'none';
                
                // Gestion de la visibilité du menu pour le cuisinier
                if (role === 'cook') {
                    document.querySelectorAll('nav button:not([onclick="/"]):not([onclick*="/canteen"])').forEach(b => b.style.display = 'none');
                }

                if (role !== 'admin') {
                    document.querySelectorAll('nav button[onclick*="/users"], nav button[onclick*="/systeme"], nav button[onclick*="/sites"]').forEach(b => b.style.display = 'none');
                }

                if (role === 'admin' || role === 'editor') {
                    document.getElementById('analytics-section').style.display = 'block';
                    setupSocket(); // Initialize socket for real-time updates
                    load();
                }
            }
        }

        async function load() {
            const headers = { 'Authorization': `Bearer ${token}` };
            const res = await fetch('/api/admin/data', { headers });
            if (res.status === 403) return logout();
            const { players, playlists, sequences } = await res.json();
            
            updatePlayerCounts(players);
            
            // Count playlists
            const plCount = Object.keys(playlists || {}).length;
            document.getElementById('playlists-count').innerText = plCount;
            
            // Count sequences
            const seqCount = Object.keys(sequences || {}).length;
            document.getElementById('sequences-count').innerText = seqCount;

            // Fetch media count
            try {
                const mediaRes = await fetch('/api/admin/media', { headers });
                const mediaItems = await mediaRes.json();
                document.getElementById('media-count').innerText = mediaItems.length;
            } catch (e) {
                console.error("Erreur comptage médias :", e);
            }

            // Display site info
            const currentSiteId = localStorage.getItem('pidyn_siteId');
            if (currentSiteId) {
                try {
                    const sitesRes = await fetch('/api/admin/sites', { headers });
                    if (sitesRes.ok) {
                        const sitesList = await sitesRes.json();
                        const siteObj = sitesList.find(s => s.id === currentSiteId);
                        document.getElementById('site-display').innerText = siteObj ? siteObj.name : currentSiteId;
                    } else {
                        document.getElementById('site-display').innerText = currentSiteId;
                    }
                } catch (e) {
                    document.getElementById('site-display').innerText = currentSiteId;
                }
            } else {
                document.getElementById('site-display').innerText = 'Global';
            }
            
            loadAnalytics();
        }

        let allPlayersData = {};

        function updatePlayerCounts(players) {
            allPlayersData = players || {};
            let onlineCount = 0;
            let offlineCount = 0;
            for (let id in players) {
                const p = players[id];
                if (!id || id === 'undefined' || id === 'null') continue; // Ignorer les entrées mal formées
                const isOnline = p.lastSeen && (new Date() - new Date(p.lastSeen) < 60000);
                if (isOnline) {
                    onlineCount++;
                } else {
                    offlineCount++;
                }
            }
            document.getElementById('online-screens-count').innerText = onlineCount;
            document.getElementById('offline-screens-count').innerText = offlineCount;
            populateAnalyticsFilters(players);
        }

        function populateAnalyticsFilters(players) {
            const groupSelect = document.getElementById('analytics-group-filter');
            const screenSelect = document.getElementById('analytics-screen-filter');
            if (!groupSelect || !screenSelect) return;

            const currentGroup = groupSelect.value;
            const currentScreen = screenSelect.value;

            // Extraire tous les groupes uniques
            const groupsSet = new Set();
            const screensList = [];

            for (let id in players) {
                const p = players[id];
                if (!id || id === 'undefined' || id === 'null') continue;
                if (p.group) groupsSet.add(p.group);
                screensList.push({ id: id, name: p.name || id, group: p.group || '' });
            }

            // Générer le menu déroulant des groupes
            let groupHtml = '<option value="">Tous les groupes</option>';
            Array.from(groupsSet).sort().forEach(g => {
                groupHtml += `<option value="${escapeHtml(g)}"${g === currentGroup ? ' selected' : ''}>${escapeHtml(g)}</option>`;
            });
            groupSelect.innerHTML = groupHtml;

            // Remplir le menu des écrans
            renderScreenOptions(screensList, groupSelect.value, currentScreen);
        }

        function renderScreenOptions(screensList, filterGroup, currentScreen) {
            const screenSelect = document.getElementById('analytics-screen-filter');
            if (!screenSelect) return;

            let screenHtml = '<option value="">Tous les écrans</option>';
            screensList.forEach(s => {
                if (!filterGroup || s.group === filterGroup) {
                    screenHtml += `<option value="${escapeHtml(s.id)}"${s.id === currentScreen ? ' selected' : ''}>${escapeHtml(s.name)} (${escapeHtml(s.id)})</option>`;
                }
            });
            screenSelect.innerHTML = screenHtml;
        }

        function onGroupFilterChange() {
            const selectedGroup = document.getElementById('analytics-group-filter').value;
            const screensList = [];
            for (let id in allPlayersData) {
                const p = allPlayersData[id];
                if (!id || id === 'undefined' || id === 'null') continue;
                screensList.push({ id: id, name: p.name || id, group: p.group || '' });
            }
            renderScreenOptions(screensList, selectedGroup, '');
            loadAnalytics();
        }

        function formatMediaName(url) {
            if (!url) return { title: 'Média inconnu', fullUrl: '', type: 'Inconnu', icon: '❓' };

            let decoded = url;
            try {
                decoded = decodeURIComponent(url);
            } catch (e) {}

            // Prise en charge explicite des pages composites (multi-zones)
            if (decoded.startsWith('Page composite') || decoded.startsWith('Composite') || decoded.includes('zones:')) {
                return {
                    title: decoded,
                    fullUrl: 'Layout Multi-Zones / Modèle de page',
                    type: 'Page Composite',
                    icon: '🧩'
                };
            }

            let filename = decoded.split('/').pop().split('?')[0];

            // Nettoyer les préfixes système générés lors des téléchargements
            filename = filename.replace(/^(yt|img|pptx|zip|pdf|media|file)_\d+_/i, '');
            filename = filename.replace(/^(yt|img|pptx|zip|pdf|media|file)_/i, '');

            let type = 'Fichier';
            let icon = '📁';

            const ext = filename.includes('.') ? filename.split('.').pop().toLowerCase() : '';

            if (['mp4', 'webm', 'mov', 'mkv', 'avi'].includes(ext)) {
                type = 'Vidéo';
                icon = '🎬';
            } else if (['jpg', 'jpeg', 'png', 'gif', 'webp', 'svg'].includes(ext)) {
                type = 'Image';
                icon = '🖼️';
            } else if (['mp3', 'wav', 'ogg', 'aac', 'm4a'].includes(ext)) {
                type = 'Audio';
                icon = '🎵';
            } else if (['pdf'].includes(ext)) {
                type = 'Document PDF';
                icon = '📄';
            } else if (['pptx', 'ppt'].includes(ext)) {
                type = 'Présentation PowerPoint';
                icon = '📊';
            } else if (url.startsWith('http://') || url.startsWith('https://')) {
                type = 'Site Web';
                icon = '🌐';
                try {
                    const u = new URL(url);
                    filename = u.hostname + (u.pathname !== '/' ? u.pathname : '');
                } catch (e) {}
            }

            return {
                title: filename || decoded,
                fullUrl: url,
                type: type,
                icon: icon
            };
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        async function loadPlayerCounts() {
            const res = await fetch('/api/admin/data', { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 403) return logout();
            const { players } = await res.json();
            updatePlayerCounts(players);
        }

        let analyticsChart = null;
        async function loadAnalytics() {
            const headers = { 'Authorization': `Bearer ${token}` };
            const groupId = document.getElementById('analytics-group-filter') ? document.getElementById('analytics-group-filter').value : '';
            const deviceId = document.getElementById('analytics-screen-filter') ? document.getElementById('analytics-screen-filter').value : '';

            const params = new URLSearchParams();
            if (groupId) params.append('groupId', groupId);
            if (deviceId) params.append('deviceId', deviceId);
            const queryString = params.toString() ? '?' + params.toString() : '';
            
            // Charger le tableau Top 50
            const res = await fetch(`/api/admin/analytics${queryString}`, { headers });
            const stats = await res.json();
            let html = '<table><tr><th style="width:140px;">Type</th><th>Média / Élément</th><th style="width:130px;">Nombre de vues</th><th style="width:180px;">Temps total affiché</th></tr>';
            if (!stats || stats.length === 0) {
                html += '<tr><td colspan="4" style="text-align:center; padding:20px; color:#bdc3c7;">Aucune donnée disponible pour les filtres sélectionnés.</td></tr>';
            } else {
                stats.forEach(s => {
                    const time = formatDuration(s.totalDuration);
                    const media = formatMediaName(s.itemUrl);
                    html += `<tr>
                        <td><span style="background: rgba(52, 152, 219, 0.2); border: 1px solid #3498db; padding: 3px 8px; border-radius: 12px; font-size: 0.85em; white-space: nowrap; font-weight: bold;">${media.icon} ${media.type}</span></td>
                        <td>
                            <div style="font-weight: bold; font-size: 0.95em; color: var(--text-color, #ffffff);">${escapeHtml(media.title)}</div>
                            <div style="font-size: 0.75em; opacity: 0.7; word-break: break-all; margin-top: 2px;">${escapeHtml(media.fullUrl)}</div>
                        </td>
                        <td style="font-weight: bold; font-size: 1.05em;">${s.count}</td>
                        <td style="font-weight: bold; font-size: 1.05em;">${time}</td>
                    </tr>`;
                });
            }
            document.getElementById('analytics-list').innerHTML = html + '</table>';

            // Charger les données du graphique horaire
            const resHourly = await fetch(`/api/admin/analytics/hourly${queryString}`, { headers });
            const hourlyData = await resHourly.json();
            renderAnalyticsChart(hourlyData);
        }

        function formatDuration(ms) {
            const seconds = Math.floor(ms / 1000);
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const remainingSeconds = seconds % 60;

            const pad = (num) => String(num).padStart(2, '0');

            return `${pad(hours)}:${pad(minutes)}:${pad(remainingSeconds)}`;
        }

        function renderAnalyticsChart(data) {
            const ctx = document.getElementById('analytics-chart').getContext('2d');
            if (analyticsChart) analyticsChart.destroy();
            
            const theme = localStorage.getItem('theme') || 'dark';
            const textColor = theme === 'light' ? '#2c3e50' : 'white';
            const gridColor = theme === 'light' ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';

            analyticsChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.hour),
                    datasets: [{
                        label: 'Nombre de diffusions (dernières 24h)',
                        data: data.map(d => d.count),
                        borderColor: '#3498db',
                        backgroundColor: 'rgba(52, 152, 219, 0.2)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: true, grid: { color: gridColor }, ticks: { color: textColor } },
                        x: { grid: { color: gridColor }, ticks: { color: textColor } }
                    },
                    plugins: { legend: { labels: { color: textColor } } }
                }
            });
        }

        // Écouter le changement de thème en direct pour mettre à jour les couleurs du graphique
        window.addEventListener('theme-changed', (e) => {
            if (analyticsChart) {
                const theme = e.detail.theme;
                const textColor = theme === 'light' ? '#2c3e50' : 'white';
                const gridColor = theme === 'light' ? 'rgba(0,0,0,0.1)' : 'rgba(255,255,255,0.1)';

                analyticsChart.options.scales.x.ticks.color = textColor;
                analyticsChart.options.scales.x.grid.color = gridColor;
                analyticsChart.options.scales.y.ticks.color = textColor;
                analyticsChart.options.scales.y.grid.color = gridColor;
                analyticsChart.options.plugins.legend.labels.color = textColor;
                analyticsChart.update();
            }
        });

        async function resetAnalytics() {
            if (!confirm("Voulez-vous vraiment effacer tout l'historique des statistiques ?")) return;
            const res = await fetch('/api/admin/analytics', {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                loadAnalytics();
            }
        }

        // Lancement de la vérification initiale
        checkAuth();
    </script>
    <footer style="text-align: center; margin-top: 40px; padding: 20px; font-size: 12px; color: #7f8c8d; border-top: 1px solid #34495e;">

    </footer>
</body>
</html>
