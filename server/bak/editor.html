<!DOCTYPE html>
<html>
<head>
    <title>Éditeur de Diaporama</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #2c3e50; color: white; }
        header { padding: 10px 20px; background: #1a252f; display: flex; justify-content: space-between; align-items: center; }
        
        .main-container { display: flex; flex: 1; overflow: hidden; }
        
        /* Zone de Prévisualisation */
        .preview-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #34495e; padding: 20px; }
        .screen-mockup { 
            background: black; position: relative; 
            box-shadow: 0 0 20px rgba(0,0,0,0.5); overflow: hidden;
            transition: all 0.3s ease;
            cursor: crosshair;
        }
        .screen-mockup.grid-active {
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 2% 2%; /* Correspond à GRID_SIZE */
        }
        .screen-mockup .bg-layer { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 1; }
        
        .zone { 
            position: absolute; border: 1px dashed rgba(255,255,255,0.5); 
            background: rgba(52, 152, 219, 0.2); z-index: 5;
            display: flex; align-items: center; justify-content: center;
            cursor: move;
        }
        .resizer {
            width: 10px; height: 10px; background: #3498db;
            position: absolute; right: -5px; bottom: -5px;
            cursor: nwse-resize; z-index: 10;
        }
        .zone.selected { border: 2px solid #3498db; background: rgba(52, 152, 219, 0.4); }
        .zone img, .zone video { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
        .zone-label { 
            position: absolute; top: -20px; left: 0; background: #3498db; 
            color: white; font-size: 10px; padding: 2px 5px;
        }

        /* Sidebar Propriétés */
        .sidebar { width: 300px; background: #1a252f; padding: 20px; border-left: 1px solid #34495e; overflow-y: auto; }
        .sidebar input, .sidebar select { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }

        /* Frise Chronologique */
        .timeline-area { height: 150px; background: #1a252f; border-top: 2px solid #3498db; display: flex; align-items: center; padding: 0 20px; overflow-x: auto; gap: 10px; }
        .timeline-item { 
            min-width: 120px; height: 80px; background: #34495e; border: 2px solid transparent;
            border-radius: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 12px; position: relative;
        }
        .timeline-item .delete-btn {
            position: absolute; top: 2px; right: 2px; background: #e74c3c;
            color: white; border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;
            line-height: 1;
        }
        .timeline-item:hover .delete-btn { display: flex; }
        .timeline-item .duplicate-btn {
            position: absolute; top: 2px; left: 2px; background: #27ae60;
            color: white; border: none; border-radius: 50%; width: 18px; height: 18px;
            font-size: 12px; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 10;
            line-height: 1;
        }
        .timeline-item:hover .duplicate-btn { display: flex; }
        .timeline-item.active { border-color: #3498db; background: #2980b9; }
        .timeline-item img { height: 40px; margin-bottom: 5px; }
        
        /* Indicateur visuel pour le drag & drop */
        .timeline-item.drag-over {
            border-left: 6px solid #2ecc71 !important;
            transition: border-left 0.1s;
        }
        /* Désactiver les événements sur les enfants pendant le drag pour éviter les clignotements */
        .timeline-area.dragging .timeline-item * {
            pointer-events: none;
        }

        button { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; background: #3498db; color: white; }
        button.danger { background: #e74c3c; }
    </style>
</head>
<body>
    <header>
        <a href="/" style="color: #bdc3c7; text-decoration: none;">&larr; Retour</a>
        <input type="text" id="pl-name" placeholder="Nom du diaporama" style="padding: 5px; border-radius: 4px; border: none; width: 250px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <label style="font-size:12px">Résolution :</label>
            <select id="screen-res" onchange="updateResolution()" style="padding:5px;">
                <option value="16/9">Paysage (16:9)</option>
                <option value="9/16">Portrait (9:16)</option>
                <option value="4/3">Classique (4:3)</option>
            </select>
            <label style="font-size:12px">Fond :</label>
            <select id="global-bg" onchange="updateGlobalBg()" style="padding:4px;"></select>
            <label style="font-size:12px">Couleur :</label>
            <input type="color" id="global-bg-color" oninput="updateGlobalBgColor()" style="padding:0; height:22px; width:40px; border:none; vertical-align: middle; cursor:pointer;">
        </div>
        <label style="font-size:12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
            <input type="checkbox" id="grid-toggle" checked onchange="toggleGrid()" style="width: auto; margin: 0;">
            Aimantation
        </label>
        <button class="secondary" onclick="previewPlaylist()">Aperçu</button>
        <button onclick="savePlaylist()">Enregistrer</button>
    </header>

    <div class="main-container">
        <div class="preview-area" id="drop-zone">
            <div class="screen-mockup" id="preview-screen" 
                 onmousedown="handleMouseDown(event)">
                <!-- Rendu dynamique ici -->
                <div id="template-preview-layer" style="position:absolute; inset:0; z-index:4; display:none; pointer-events:none; background:rgba(0,0,0,0.8); flex-direction:column; justify-content:center; align-items:center; padding:20px; text-align:center;"></div>
            </div>
            <p id="item-info" style="margin-top: 10px; color: #bdc3c7;">Dessinez un cadre sur l'écran pour ajouter une zone</p>
        </div>

        <div class="sidebar">
            <div id="page-editor" style="display: none; border-bottom: 1px solid #34495e; padding-bottom: 15px; margin-bottom: 15px;">
                <h3>Propriétés de la page</h3>
                <label>Durée de la page (ms)</label>
                <input type="number" id="page-duration" oninput="updatePageDuration()">
                
                <label>Couleur de fond de page</label>
                <input type="color" id="page-bg-color" oninput="updatePageBgColor()">

                <button class="danger" onclick="deleteCurrentItem()" style="width: 100%; margin-top: 10px;">Supprimer la page</button>
            </div>

            <div id="template-editor" style="display: none; border-bottom: 1px solid #34495e; padding-bottom: 15px; margin-bottom: 15px;">
                <h3>Contenu du Modèle</h3>
                <div id="template-fields"></div>
            </div>

            <h3>Propriétés de la zone</h3>
            <div id="zone-editor" style="display: none;">
                <label>Type de contenu</label>
                <select id="z-type" onchange="updateZone()">
                    <option value="image">Image</option>
                    <option value="video">Vidéo</option>
                    <option value="web">Web / Sozi (HTML)</option>
                    <option value="clock">Horloge</option>
                    <option value="text">Texte</option>
                </select>

                <label>Média / Texte</label>
                <div id="z-content-container">
                    <select id="z-url" onchange="updateZone()"></select>
                    <input type="text" id="z-text" oninput="updateZone()" style="display:none;" placeholder="Votre texte ici...">
                </div>

                <div class="video-properties" style="display: none;">
                    <label style="display:flex; align-items:center; gap:5px; cursor:pointer; margin-top:10px;">
                        <input type="checkbox" id="z-muted" onchange="updateZone()" style="width:auto; margin:0;">
                        Muet (pas de son)
                    </label>
                </div>

                <div class="text-properties" style="display: none;">
                    <label>Police</label>
                    <select id="z-font-family" onchange="updateZone()">
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="Verdana, sans-serif">Verdana</option>
                        <option value="Helvetica, sans-serif">Helvetica</option>
                        <option value="Georgia, serif">Georgia</option>
                        <option value="Times New Roman, serif">Times New Roman</option>
                        <option value="Courier New, monospace">Courier New</option>
                        <option value="Impact, sans-serif">Impact</option>
                        <option value="sans-serif">Par défaut (sans-serif)</option>
                        <option value="serif">Par défaut (serif)</option>
                        <option value="monospace">Par défaut (monospace)</option>
                    </select>

                    <label>Taille de police (px)</label>
                    <input type="number" id="z-font-size" oninput="updateZone()" value="24">

                    <label>Couleur du texte</label>
                    <input type="color" id="z-color" oninput="updateZone()" value="#ffffff">

                    <label>Alignement du texte</label>
                    <select id="z-text-align" onchange="updateZone()">
                        <option value="left">Gauche</option>
                        <option value="center">Centre</option>
                        <option value="right">Droite</option>
                        <option value="justify">Justifié</option>
                    </select>

                    <label style="display:flex; align-items:center; gap:5px; cursor:pointer; margin-top:10px;">
                        <input type="checkbox" id="z-marquee" onchange="updateZone()" style="width:auto; margin:0;">
                        Texte défilant (Marquee)
                    </label>
                </div>

                <label>Animation d'entrée</label>
                <div style="display: flex; gap: 5px;">
                    <select id="z-anim-in" onchange="updateZone()" style="flex: 2;">
                        <option value="none">Aucune</option>
                        <option value="fade-in">Fondu</option>
                        <option value="slide-top">Haut</option>
                        <option value="slide-bottom">Bas</option>
                        <option value="slide-left">Gauche</option>
                        <option value="slide-right">Droite</option>
                        <option value="zoom-in">Zoom</option>
                    </select>
                    <input type="number" id="z-anim-in-dur" oninput="updateZone()" placeholder="ms" style="flex: 1; margin: 0;" title="Durée (ms)">
                </div>

                <label>Animation de sortie</label>
                <div style="display: flex; gap: 5px;">
                    <select id="z-anim-out" onchange="updateZone()" style="flex: 2;">
                        <option value="none">Aucune</option>
                        <option value="fade-out">Fondu</option>
                        <option value="zoom-out">Zoom Arrière</option>
                    </select>
                    <input type="number" id="z-anim-out-dur" oninput="updateZone()" placeholder="ms" style="flex: 1; margin: 0;" title="Durée (ms)">
                </div>

                    <div id="z-clock-group" style="display: none;">
                        <label>Format de l'horloge (ex: HH:mm:ss, jj/MM/aaaa)</label>
                        <input type="text" id="z-clock-format" oninput="updateZone()" value="HH:mm:ss">
                    </div>
                </div>

                <label>Ordre des couches</label>
                <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                    <button onclick="moveZoneBackward()" style="flex: 1; background: #6c757d;" title="Reculer d'un plan">Reculer</button>
                    <button onclick="moveZoneForward()" style="flex: 1; background: #6c757d;" title="Avancer d'un plan">Avancer</button>
                </div>

                <button onclick="updateZone()" style="width: 100%; margin-top: 10px; background: #28a745; font-weight: bold;">Appliquer les modifications</button>

                <button class="danger" onclick="deleteZone()" style="width: 100%; margin-top: 20px;">Supprimer la zone</button>
            </div>
        </div>
    </div>

    <div class="timeline-area">
        <div id="timeline-controls" style="display: flex; flex-direction: column; gap: 5px; padding-right: 20px; border-right: 1px solid #34495e;">
            <button onclick="addNewItem()" style="min-width: 100px; background: #27ae60;">+ Page Vide</button>
            <button onclick="addTemplate('canteen')" style="min-width: 100px; background: #f39c12; font-size: 11px;">+ Modèle Cantine</button>
            <button onclick="addTemplate('meeting')" style="min-width: 100px; background: #9b59b6; font-size: 11px;">+ Modèle Réunion</button>
            <button onclick="addTemplate('video_fullscreen')" style="min-width: 100px; background: #e67e22; font-size: 11px;">+ Vidéo Plein Écran</button>
            <button onclick="addTemplate('weather')" style="min-width: 100px; background: #3498db; font-size: 11px;">+ Météo</button>
        </div>
        <div id="timeline-list" style="display: flex; align-items: center; gap: 10px; flex: 1; overflow-x: auto; padding-left: 10px;"></div>
        <!-- Items de la frise -->
    </div>

    <script>
        const token = localStorage.getItem('pidyn_token');
        if (!token) window.location.href = '/';
        
        const PREVIEW_AUTH = `?token=${token}`;

        const urlParams = new URLSearchParams(window.location.search);
        let playlistId = urlParams.get('id');
        
        let playlistData = { name: '', backgroundUrl: '', backgroundColor: '#000000', resolution: '16/9', items: [] };
        let selectedIndex = -1;
        let selectedZoneIndex = -1; // Index de la zone dans la page
        let availableMedia = [];
        
        // Variables pour les interactions
        let mode = 'none'; // 'drawing', 'moving', 'resizing'
        let useGrid = true;
        const GRID_SIZE = 2; // Taille de la grille en %

        let undoStack = [];
        let redoStack = [];
        const MAX_UNDO_STATES = 20; // Limite l'historique à 20 états

        let startX, startY, offsetX, offsetY; // Position de la souris au clic (%)
        let initialX, initialY, initialW, initialH; // Géométrie initiale de la zone (%)
        let currentDrawingZone = null;

        async function init() {
            const headers = { 'x-access-token': token };
            
            // Charger la médiathèque
            const mediaRes = await fetch('/api/admin/media', { headers: { 'Authorization': `Bearer ${token}` } });
            availableMedia = await mediaRes.json();
            populateMediaSelects();

            if (playlistId) {
                const res = await fetch('/api/admin/data', { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.playlists[playlistId]) {
                    playlistData = data.playlists[playlistId];
                    document.getElementById('pl-name').value = playlistData.name;
                    document.getElementById('global-bg').value = playlistData.backgroundUrl || '';
                    document.getElementById('screen-res').value = playlistData.resolution || '16/9';
                    document.getElementById('global-bg-color').value = playlistData.backgroundColor || '#000000';
                    toggleGrid();
                }
            }
            updateResolution();
            renderTimeline();
        }

        function populateMediaSelects() {
            // Pour le fond global, on ne garde que les images
            const images = availableMedia.filter(m => m.type === 'image');
            document.getElementById('global-bg').innerHTML = '<option value="">Aucun / Manuel</option>' + 
                images.map(m => `<option value="${m.url}">${m.filename}</option>`).join('');
            
            // Ajouter les polices personnalisées au menu déroulant
            const fontSelect = document.getElementById('z-font-family');
            const customFonts = availableMedia.filter(m => m.type === 'font');
            customFonts.forEach(m => {
                const fontName = `font-${m.id}`; // Nom CSS sécurisé
                const styleId = `font-style-${m.id}`;
                if (!document.getElementById(styleId)) {
                    const style = document.createElement('style');
                    style.id = styleId;
                    style.textContent = `@font-face { font-family: "${fontName}"; src: url("${m.url}${PREVIEW_AUTH}"); }`;
                    document.head.appendChild(style);
                }
                
                if (!Array.from(fontSelect.options).some(opt => opt.value === fontName)) {
                    const opt = document.createElement('option');
                    opt.value = fontName;
                    opt.textContent = m.filename;
                    opt.dataset.url = m.url;
                    fontSelect.appendChild(opt);
                }
            });

            // Initialisation du select de zone (sera filtré dynamiquement par type)
            populateMediaSelectsForZone(null);
        }

        function populateMediaSelectsForZone(type) {
            let filtered = availableMedia;
            if (type === 'image') {
                filtered = availableMedia.filter(m => m.type === 'image');
            } else if (type === 'video') {
                filtered = availableMedia.filter(m => m.type === 'video');
            } else if (type === 'web') {
                // On ne propose que les fichiers HTML (extraits ou directs)
                filtered = availableMedia.filter(m => m.type === 'html');
            }

            const options = '<option value="">Sélectionner un média</option>' + 
                filtered.map(m => {
                    // On affiche le nom du ZIP d'origine pour aider à s'y retrouver
                    const label = m.originalZip ? `[${m.originalZip}] ${m.filename}` : m.filename;
                    return `<option value="${m.url}">${label}</option>`;
                }).join('');
            
            document.getElementById('z-url').innerHTML = options;
        }

        function toggleGrid() {
            useGrid = document.getElementById('grid-toggle').checked;
            document.getElementById('preview-screen').classList.toggle('grid-active', useGrid);
        }

        function applySnap(val) {
            if (!useGrid) return val;
            return Math.round(val / GRID_SIZE) * GRID_SIZE;
        }

        function updateResolution() {
            playlistData.resolution = document.getElementById('screen-res').value;
            const screen = document.getElementById('preview-screen');
            const ratio = (playlistData.resolution || "16/9").split('/');
            const baseHeight = 400; 
            screen.style.height = baseHeight + 'px';
            screen.style.width = (baseHeight * (ratio[0]/ratio[1])) + 'px';
        }

        function updateGlobalBg() {
            playlistData.backgroundUrl = document.getElementById('global-bg').value;
            renderPreview();
        }

        function updateGlobalBgColor() {
            playlistData.backgroundColor = document.getElementById('global-bg-color').value;
            renderPreview();
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-list');
            container.innerHTML = '';

            playlistData.items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = `timeline-item ${selectedIndex === index ? 'active' : ''}`;
                div.draggable = true;
                div.onclick = () => selectItem(index);

                div.ondragstart = (e) => {
                    e.dataTransfer.setData('text/plain', index);
                    div.style.opacity = '0.5';
                    container.classList.add('dragging');
                };
                div.ondragend = () => {
                    div.style.opacity = '1';
                    container.classList.remove('dragging');
                    document.querySelectorAll('.timeline-item').forEach(i => i.classList.remove('drag-over'));
                };
                div.ondragover = (e) => {
                    e.preventDefault();
                    div.classList.add('drag-over');
                };
                div.ondragleave = () => {
                    div.classList.remove('drag-over');
                };
                div.ondrop = (e) => {
                    e.preventDefault();
                    div.classList.remove('drag-over');
                    const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
                    if (fromIndex !== index) {
                        const movedItem = playlistData.items.splice(fromIndex, 1)[0];
                        playlistData.items.splice(index, 0, movedItem);
                        
                        // Ajuster l'index sélectionné pour qu'il suive l'élément ou reste sur le bon
                        if (selectedIndex === fromIndex) {
                            selectedIndex = index;
                        } else if (selectedIndex > fromIndex && selectedIndex <= index) {
                            selectedIndex--;
                        } else if (selectedIndex < fromIndex && selectedIndex >= index) {
                            selectedIndex++;
                        }
                        renderTimeline();
                        renderPreview();
                    }
                };

                // Construire la miniature (canvas ou video/image selon le contenu)
                let thumbHtml = '<div style="height:40px"></div>';
                if (item.template === 'video_fullscreen' && item.data.videoUrl) {
                    thumbHtml = `<video src="${item.data.videoUrl}${PREVIEW_AUTH}" muted style="height:40px; width:60px; object-fit:cover; pointer-events:none;"></video>`;
                } else if (item.zones && item.zones.length > 0) {
                    // Chercher d'abord une zone image ou vidéo
                    const mediaZone = item.zones.find(z => (z.type === 'image' || z.type === 'video') && z.url);
                    if (mediaZone && mediaZone.type === 'video') {
                        thumbHtml = `<video src="${mediaZone.url}${PREVIEW_AUTH}" muted style="height:40px; width:60px; object-fit:cover; pointer-events:none;"></video>`;
                    } else if (mediaZone && mediaZone.type === 'image') {
                        thumbHtml = `<img src="${mediaZone.url}${PREVIEW_AUTH}">`;
                    } else {
                        // Générer un mini canvas avec fond + texte
                        thumbHtml = `<canvas id="thumb-canvas-${index}" width="60" height="40" style="height:40px;width:60px;border-radius:2px;"></canvas>`;
                    }
                } else {
                    // Page sans zones: juste la couleur de fond
                    thumbHtml = `<canvas id="thumb-canvas-${index}" width="60" height="40" style="height:40px;width:60px;border-radius:2px;"></canvas>`;
                }

                div.innerHTML = `
                    <button class="delete-btn" onclick="event.stopPropagation(); deleteCurrentItemByIndex(${index})">×</button>
                    <button class="duplicate-btn" onclick="event.stopPropagation(); duplicateItemByIndex(${index})" title="Dupliquer">⧉</button>
                    ${thumbHtml}
                    <span>${item.duration/1000}s</span>
                `;

                // Dessiner le canvas de miniature si présent
                const canvas = div.querySelector(`#thumb-canvas-${index}`);
                if (canvas) {
                    drawThumbnailCanvas(canvas, item);
                }
                container.appendChild(div);
            });
        }

        function selectItem(index) {
            selectedIndex = index;
            selectedZoneIndex = -1;
            
            const item = playlistData.items[selectedIndex];
            document.getElementById('page-editor').style.display = 'block';
            document.getElementById('page-duration').value = item.duration;
            document.getElementById('page-bg-color').value = item.backgroundColor || '#000000';

            if (item.template) {
                document.getElementById('template-editor').style.display = 'block';
                document.getElementById('zone-editor').style.display = 'none';
                renderTemplateFields(item);
            } else {
                document.getElementById('template-editor').style.display = 'none';
                document.getElementById('zone-editor').style.display = 'none';
            }

            renderPreview();
            renderTimeline();
        }

        function renderTemplateFields(item) {
            const container = document.getElementById('template-fields');
            container.innerHTML = '';
            
            const configs = {
                canteen: [
                    { key: 'useLiveMenu', label: 'Utiliser le menu de la semaine (Auto)', type: 'checkbox' },
                    { key: 'title', label: 'Titre', type: 'text' },
                    { key: 'starter', label: 'Entrée', type: 'text' },
                    { key: 'main', label: 'Plat Principal', type: 'text' },
                    { key: 'dessert', label: 'Dessert', type: 'text' }
                ],
                meeting: [
                    { key: 'room', label: 'Nom de la salle', type: 'text' },
                    { key: 'subject', label: 'Sujet', type: 'text' },
                    { key: 'status', label: 'Statut', type: 'select', options: ['Disponible', 'Occupée'] }
                ],
                video_fullscreen: [
                    { key: 'videoUrl', label: 'Vidéo', type: 'video_select' },
                    { key: 'loop', label: 'Boucler (ignore la fin)', type: 'checkbox' },
                    { key: 'muted', label: 'Muet', type: 'checkbox' },
                    { key: 'fitMode', label: 'Ajustement vidéo', type: 'select', options: ['cover', 'contain'] },
                    { key: 'legend', label: 'Légende', type: 'text' },
                    { key: 'legendFontFamily', label: 'Police légende', type: 'font_select' },
                    { key: 'legendFontSize', label: 'Taille légende (px)', type: 'number' },
                    { key: 'legendColor', label: 'Couleur légende', type: 'color' }
                ],
                weather: [
                    { key: 'city', label: 'Ville (Affichage)', type: 'text' },
                    { key: 'lat', label: 'Latitude', type: 'text' },
                    { key: 'lon', label: 'Longitude', type: 'text' }
                ]
            };

            configs[item.template].forEach(field => {
                const label = document.createElement('label');
                label.innerText = field.label;
                label.style.display = 'block';
                label.style.marginTop = '10px';
                label.style.fontWeight = 'bold';
                
                let input;
                if (field.type === 'select') {
                    input = document.createElement('select');
                    field.options.forEach(opt => {
                        const o = document.createElement('option');
                        o.value = opt; o.text = opt;
                        if ((item.data[field.key] || field.options[0]) === opt) o.selected = true;
                        input.add(o);
                    });
                } else if (field.type === 'video_select') {
                    input = document.createElement('select');
                    const videos = availableMedia.filter(m => m.type === 'video');
                    input.innerHTML = '<option value="">Sélectionner une vidéo</option>' + 
                        videos.map(m => `<option value="${m.url}" ${item.data[field.key] === m.url ? 'selected' : ''}>${m.filename}</option>`).join('');
                } else if (field.type === 'font_select') {
                    input = document.createElement('select');
                    const fonts = availableMedia.filter(m => m.type === 'font');
                    input.innerHTML = '<option value="sans-serif">Sans-serif (Défaut)</option>' + 
                        fonts.map(m => `<option value="font-${m.id}" ${item.data[field.key] === 'font-'+m.id ? 'selected' : ''}>${m.filename}</option>`).join('');
                } else if (field.type === 'number') {
                    input = document.createElement('input');
                    input.type = 'number';
                    input.value = item.data[field.key] || 24;
                } else if (field.type === 'color') {
                    input = document.createElement('input');
                    input.type = 'color';
                    input.value = item.data[field.key] || '#ffffff';
                    input.style.height = '30px';
                    input.style.padding = '0';
                } else if (field.type === 'checkbox') {
                    input = document.createElement('input');
                    input.type = 'checkbox';
                    input.checked = !!item.data[field.key];
                    input.style.width = 'auto';
                } else {
                    input = document.createElement('input');
                    input.type = 'text';
                    input.value = item.data[field.key] || '';
                }
                input.oninput = (e) => { 
                    item.data[field.key] = field.type === 'checkbox' ? e.target.checked : e.target.value; 
                    renderPreview(); 
                };
                container.appendChild(label);
                container.appendChild(input);
            });
        }

        function renderPreview() {
            const screen = document.getElementById('preview-screen');
            
            const item = selectedIndex !== -1 ? playlistData.items[selectedIndex] : null;
            const bgColor = (item && item.backgroundColor) ? item.backgroundColor : (playlistData.backgroundColor || 'black');
            screen.style.backgroundColor = bgColor;
            
            // Gérer le calque de fond sans tout effacer
            let bgLayer = screen.querySelector('.bg-layer');
            if (playlistData.backgroundUrl) {
                if (!bgLayer) {
                    bgLayer = document.createElement('img');
                    bgLayer.className = 'bg-layer';
                    bgLayer.draggable = false;
                    screen.prepend(bgLayer);
                }
                bgLayer.src = playlistData.backgroundUrl + PREVIEW_AUTH;
                bgLayer.style.display = 'block';
            } else if (bgLayer) {
                bgLayer.style.display = 'none';
            }
            
            const tplLayer = document.getElementById('template-preview-layer');
            if (item && item.template) {
                tplLayer.style.display = 'flex';
                tplLayer.style.padding = item.template === 'video_fullscreen' ? '0' : '20px';
                if (item.template === 'canteen') {
                    tplLayer.innerHTML = `
                        <div style="color:#3498db; font-weight:bold; font-size:24px; border-bottom:2px solid #3498db; margin-bottom:15px; padding-bottom:5px;">${item.data.title || 'MENU'}</div>
                        <div style="font-size:16px;">
                            <p><b>Entrée:</b> ${item.data.starter}</p>
                            <p><b>Plat:</b> ${item.data.main}</p>
                            <p><b>Dessert:</b> ${item.data.dessert}</p>
                        </div>`;
                } else if (item.template === 'meeting') {
                    tplLayer.innerHTML = `
                        <div style="font-size:28px; font-weight:bold; margin-bottom:10px;">${item.data.room}</div>
                        <div style="color:#bdc3c7; font-size:18px; margin-bottom:20px;">${item.data.subject}</div>
                        <div style="display:inline-block; padding:8px 25px; border-radius:20px; background:${item.data.status === 'Disponible' ? '#27ae60' : '#e74c3c'}">${item.data.status}</div>`;
                }
                else if (item.template === 'video_fullscreen') {
                    const isMuted = item.data.muted === true;
                    let html = item.data.videoUrl 
                        ? `<video src="${item.data.videoUrl}${PREVIEW_AUTH}" autoplay playsinline muted style="width:100%; height:100%; object-fit:${item.data.fitMode || 'cover'}; pointer-events:none;"></video>`
                        : `<div style="color:#bdc3c7;">Aucune vidéo sélectionnée</div>`;
                  if (item.data.legend) {
                        const legendStyle = `
                            position:absolute; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.6); 
                            color:${item.data.legendColor || 'white'}; 
                            font-size:${(item.data.legendFontSize || 24) / 2}px; 
                            font-family:${item.data.legendFontFamily || 'sans-serif'};
                            padding:5px; text-align:center;
                        `;
                        html += `<div style="${legendStyle}">${item.data.legend}</div>`;
                    }
                    tplLayer.innerHTML = html;

                    // Lance la vidéo : démarre muet (autoplay toujours accepté), puis démute si nécessaire
                    const v = tplLayer.querySelector('video');
                    if (v && item.data.videoUrl) {
                        v.play().then(() => {
                            if (!isMuted) v.muted = false;
                        }).catch(e => console.warn("Lancement aperçu vidéo échoué:", e));
                    }


                    tplLayer.style.padding = '0';
                    tplLayer.style.justifyContent = 'center'; 
                    tplLayer.style.alignItems = 'center'; 
                }
                else if (item.template === 'weather') {
                    tplLayer.innerHTML = `
                        <div style="color:#3498db; font-weight:bold; font-size:24px; margin-bottom:15px;">MÉTÉO - ${item.data.city || 'VILLE'}</div>
                        <div style="display:flex; gap:10px; justify-content:center;">
                            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:5px;">J+0<br>☀️<br>20°/10°</div>
                            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:5px;">J+1<br>☁️<br>18°/12°</div>
                            <div style="background:rgba(255,255,255,0.1); padding:10px; border-radius:5px;">J+2<br>🌧️<br>15°/11°</div>
                        </div>`;
                }
            } else {
                tplLayer.style.display = 'none';
            }

            if (selectedIndex === -1) {
                document.querySelectorAll('.screen-mockup .zone').forEach(z => z.remove());
                return;
            }

            // Supprimer les zones qui ne sont plus dans les données
            const currentZoneIds = (item.zones || []).map((_, i) => `zone-render-${i}`);
            document.querySelectorAll('.screen-mockup .zone').forEach(z => {
                if (!currentZoneIds.includes(z.id)) z.remove();
            });

            if (item.zones) {
                item.zones.forEach((zone, idx) => {
                    const zoneId = `zone-render-${idx}`;
                    let div = document.getElementById(zoneId);
                    
                    const isInteracting = (mode === 'moving' || mode === 'resizing') && selectedZoneIndex === idx;

                    if (!div) {
                        div = document.createElement('div');
                        div.id = zoneId;
                        screen.appendChild(div);
                    }

                    div.className = `zone ${selectedZoneIndex === idx ? 'selected' : ''}`;
                    div.style.left = zone.x + '%';
                    div.style.top = zone.y + '%';
                    div.style.width = zone.w + '%';
                    div.style.height = zone.h + '%';
                    div.onmousedown = (e) => startMoving(e, idx);

                    // Mise à jour du contenu interne
                    if (!isInteracting) {
                        // S'assurer que la règle @font-face est présente pour les polices personnalisées
                        if (zone.fontFamily && zone.fontUrl) {
                            const styleId = `font-${zone.fontFamily.replace(/[^a-z0-9]/gi, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${zone.fontUrl}${PREVIEW_AUTH}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        if (zone.type === 'text') {
                            div.innerHTML = `<div class="inner-content"></div>`;
                            const inner = div.querySelector('.inner-content');
                            inner.innerText = zone.text || '';
                            inner.style.cssText = `width: 100%; height: 100%; display: flex; align-items: center; word-wrap: break-word; padding: 5%; box-sizing: border-box;`;
                            inner.style.color = zone.color || 'white';
                            inner.style.fontSize = (zone.fontSize || 24) + 'px';
                            inner.style.textAlign = zone.textAlign || 'center';
                            inner.style.justifyContent = zone.textAlign === 'justify' ? 'flex-start' : zone.textAlign;
                            // Application propre de la police (le navigateur gère les guillemets automatiquement)
                            inner.style.fontFamily = zone.fontFamily || 'sans-serif';
                        }
                        else if (zone.type === 'video' && zone.url) {
                            if (!div.querySelector('video')) div.innerHTML = `<video src="${zone.url}${PREVIEW_AUTH}" muted loop autoplay style="width:100%;height:100%;object-fit:contain;"></video>`;
                        }
                        else if (zone.type === 'web' && zone.url) {
                            if (!div.querySelector('iframe')) div.innerHTML = `<iframe src="${zone.url}${PREVIEW_AUTH}" style="width:100%;height:100%;border:none;pointer-events:none;background:white;"></iframe>`;
                        }
                        else if (zone.type === 'clock') {
                            div.innerHTML = `<div class="clock-content"></div>`;
                            const inner = div.querySelector('.clock-content');
                            inner.style.cssText = `width:100%; height:100%; display:flex; align-items:center; justify-content:center;`;
                            inner.style.color = zone.color || 'white';
                            inner.style.fontSize = (zone.fontSize || 24) + 'px';
                            inner.style.fontFamily = zone.fontFamily || 'sans-serif';
                            inner.style.textAlign = zone.textAlign || 'center';
                            inner.innerText = formatClock(new Date(), zone.clockFormat || 'HH:mm:ss');
                        }
                        else if (zone.url) {
                            div.innerHTML = `<img src="${zone.url}${PREVIEW_AUTH}">`;
                        }
                    }
                    
                    if (selectedZoneIndex === idx) {
                        if (!div.querySelector('.resizer')) {
                            const resizer = document.createElement('div');
                            resizer.className = 'resizer';
                            div.appendChild(resizer);
                            resizer.onmousedown = (e) => startResizing(e);
                        }
                    } else {
                        const r = div.querySelector('.resizer');
                        if (r) r.remove();
                    }
                    
                    let label = div.querySelector('.zone-label');
                    if (!label) {
                        label = document.createElement('div');
                        label.className = 'zone-label';
                        div.appendChild(label);
                    }
                    label.innerText = `Zone ${idx+1} (${zone.type})`;
                });
            }
        }

        function handleMouseDown(e) {
            if (selectedIndex === -1) return;
            
            // Empêche le drag natif du navigateur sur les images de fond
            if (e.target.tagName === 'IMG') e.preventDefault();

            // On ne commence à dessiner que si on clique sur le fond de l'écran
            // (Le stopPropagation dans startMoving gère déjà les zones existantes)
            if (e.target !== e.currentTarget && !e.target.classList.contains('bg-layer')) return;

            mode = 'drawing';
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);

            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;

            currentDrawingZone = document.createElement('div');
            currentDrawingZone.className = 'zone selected';
            currentDrawingZone.style.left = applySnap(startX) + '%';
            currentDrawingZone.style.top = applySnap(startY) + '%';
            currentDrawingZone.style.width = '0%';
            currentDrawingZone.style.height = '0%';
            currentDrawingZone.style.zIndex = '1000';
            currentDrawingZone.style.pointerEvents = 'none'; // Empêche le drag de la zone en cours de dessin
            document.getElementById('preview-screen').appendChild(currentDrawingZone);
        }

        function handleMouseMove(e) {
            if (mode === 'none') return;
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            let nowX = ((e.clientX - rect.left) / rect.width) * 100;
            let nowY = ((e.clientY - rect.top) / rect.height) * 100;

            if (mode === 'drawing') {
                const sX = applySnap(startX);
                const sY = applySnap(startY);
                const nX = applySnap(nowX);
                const nY = applySnap(nowY);

                currentDrawingZone.style.left = Math.min(sX, nX) + '%';
                currentDrawingZone.style.top = Math.min(sY, nY) + '%';
                currentDrawingZone.style.width = Math.abs(nX - sX) + '%';
                currentDrawingZone.style.height = Math.abs(nY - sY) + '%';
            } else if (mode === 'moving') {
                const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
                zone.x = applySnap(nowX - offsetX);
                zone.y = applySnap(nowY - offsetY);
                
                // Contraintes de bordures (0-100%)
                if (zone.x < 0) zone.x = 0;
                if (zone.y < 0) zone.y = 0;
                if (zone.x + zone.w > 100) zone.x = 100 - zone.w;
                if (zone.y + zone.h > 100) zone.y = 100 - zone.h;
                
                // Pas de saveStateForUndo ici, car c'est un mouvement continu
                renderPreview();
            } else if (mode === 'resizing') {
                const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
                zone.w = Math.max(GRID_SIZE, applySnap(initialW + (nowX - startX)));
                zone.h = Math.max(GRID_SIZE, applySnap(initialH + (nowY - startY)));
                
                // Empêcher de sortir par la droite ou le bas
                if (zone.x + zone.w > 100) zone.w = 100 - zone.x;
                if (zone.y + zone.h > 100) zone.h = 100 - zone.y;
                // Pas de saveStateForUndo ici, car c'est un redimensionnement continu

                renderPreview();
            }
        }

        function handleMouseUp() {
            window.removeEventListener('mousemove', handleMouseMove);
            window.removeEventListener('mouseup', handleMouseUp);

            if (mode === 'drawing' && currentDrawingZone) {
                const rect = {
                    l: parseFloat(currentDrawingZone.style.left),
                    t: parseFloat(currentDrawingZone.style.top),
                    w: parseFloat(currentDrawingZone.style.width),
                    h: parseFloat(currentDrawingZone.style.height)
                };
                currentDrawingZone.remove();

                const zone = {
                    x: rect.l, y: rect.t, w: rect.w, h: rect.h,
                    type: 'text', url: '', text: 'Nouveau Texte' // Default to text for new zones
                };
                if (zone.w >= GRID_SIZE && zone.h >= GRID_SIZE) {
                    saveStateForUndo(); // Sauvegarder l'état AVANT la modification
                    playlistData.items[selectedIndex].zones = playlistData.items[selectedIndex].zones || [];
                    // Initialiser les propriétés de texte par défaut si c'est une zone de texte
                    if (zone.type === 'text') initializeNewTextZone(zone);
                    // Si c'est une horloge, initialiser les propriétés par défaut
                    if (zone.type === 'clock') initializeNewClockZone(zone);
                    playlistData.items[selectedIndex].zones.push(zone);
                    selectZone(playlistData.items[selectedIndex].zones.length - 1);
                }
            }
            mode = 'none';
            currentDrawingZone = null;
        }

        function startMoving(e, idx) {
            // Si on clique sur le resizer, ce n'est pas un déplacement
            if (e.target.classList.contains('resizer')) {
                return;
            }
            e.stopPropagation();
            saveStateForUndo(); // Sauvegarder l'état AVANT le mouvement
            selectZone(idx);
            mode = 'moving';
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            initialX = playlistData.items[selectedIndex].zones[idx].x;
            initialY = playlistData.items[selectedIndex].zones[idx].y;
            offsetX = startX - initialX;
            offsetY = startY - initialY;
        }

        function startResizing(e) {
            e.stopPropagation();
            mode = 'resizing';
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('mouseup', handleMouseUp);
            const rect = document.getElementById('preview-screen').getBoundingClientRect();
            startX = ((e.clientX - rect.left) / rect.width) * 100;
            startY = ((e.clientY - rect.top) / rect.height) * 100;
            initialW = playlistData.items[selectedIndex].zones[selectedZoneIndex].w;
            initialH = playlistData.items[selectedIndex].zones[selectedZoneIndex].h;
            saveStateForUndo(); // Sauvegarder l'état avant de commencer le redimensionnement
        }

        function selectZone(idx) {
            selectedZoneIndex = idx;
            const zone = playlistData.items[selectedIndex].zones[idx];
            document.getElementById('zone-editor').style.display = 'block';
            document.getElementById('z-type').value = zone.type;
            // On met à jour la liste des médias selon le type actuel de la zone
            populateMediaSelectsForZone(zone.type)
            document.getElementById('z-url').value = zone.url || '';
            document.getElementById('z-text').value = zone.text || '';
            document.getElementById('z-font-family').value = zone.fontFamily || 'Arial, sans-serif';
            document.getElementById('z-font-size').value = zone.fontSize || 24;
            document.getElementById('z-color').value = zone.color || '#ffffff';
            document.getElementById('z-text-align').value = zone.textAlign || 'center';
            document.getElementById('z-clock-format').value = zone.clockFormat || 'HH:mm:ss';
            document.getElementById('z-anim-in').value = zone.animationIn || 'none';
            document.getElementById('z-anim-in-dur').value = zone.animationInDuration || 1000;
            document.getElementById('z-anim-out').value = zone.animationOut || 'none';
            document.getElementById('z-anim-out-dur').value = zone.animationOutDuration || 800;
            document.getElementById('z-marquee').checked = !!zone.isMarquee;

            // Afficher le bon champ (Media ou Texte) selon le type
            const isText = zone.type === 'text';
            const isClock = zone.type === 'clock';
            const isMedia = ['image', 'video', 'web'].includes(zone.type);
            const isVideo = zone.type === 'video';

            document.getElementById('z-muted').checked = !!zone.muted;
            document.getElementById('z-url').style.display = isMedia ? 'block' : 'none';
            document.getElementById('z-text').style.display = isText ? 'block' : 'none';
            document.querySelector('.video-properties').style.display = isVideo ? 'block' : 'none';
            document.querySelector('.text-properties').style.display = (isText || isClock) ? 'block' : 'none';
            document.getElementById('z-clock-group').style.display = isClock ? 'block' : 'none';
            document.getElementById('z-marquee').parentElement.style.display = isText ? 'flex' : 'none';
            
            renderPreview();
        }

        function updateZone() {
            if (selectedZoneIndex === -1) return;
            const zone = playlistData.items[selectedIndex].zones[selectedZoneIndex];
            const oldType = zone.type;
            const newType = document.getElementById('z-type').value;

            // Si le type a changé, on rafraîchit la liste des fichiers filtrés
            if (oldType !== newType) {
                populateMediaSelectsForZone(newType);
                zone.type = newType;
            }

            zone.url = document.getElementById('z-url').value;
            zone.text = document.getElementById('z-text').value;

            // Switch d'affichage dynamique
            const isText = zone.type === 'text';
            const isClock = zone.type === 'clock';
            const isMedia = ['image', 'video', 'web'].includes(zone.type);
            const isVideo = zone.type === 'video';

            document.getElementById('z-url').style.display = isMedia ? 'block' : 'none';
            document.getElementById('z-text').style.display = isText ? 'block' : 'none';
            document.querySelector('.video-properties').style.display = isVideo ? 'block' : 'none';
            document.querySelector('.text-properties').style.display = (isText || isClock) ? 'block' : 'none';
            document.getElementById('z-clock-group').style.display = isClock ? 'block' : 'none';
            document.getElementById('z-marquee').parentElement.style.display = isText ? 'flex' : 'none';

            zone.animationIn = document.getElementById('z-anim-in').value;
            zone.animationInDuration = parseInt(document.getElementById('z-anim-in-dur').value) || 1000;
            zone.animationOut = document.getElementById('z-anim-out').value;
            zone.animationOutDuration = parseInt(document.getElementById('z-anim-out-dur').value) || 800;
            zone.isMarquee = document.getElementById('z-marquee').checked;

            // Mettre à jour les propriétés vidéo si le type est "video"
            if (zone.type === 'video') {
                zone.muted = document.getElementById('z-muted').checked;
            }

            // Mettre à jour les propriétés de texte si le type est "text"
            if (zone.type === 'text') {
                const fontOpt = document.getElementById('z-font-family').selectedOptions[0];
                zone.fontFamily = fontOpt.value;
                zone.fontUrl = fontOpt.dataset.url || null;
                zone.fontSize = parseInt(document.getElementById('z-font-size').value);
                zone.color = document.getElementById('z-color').value;
                zone.textAlign = document.getElementById('z-text-align').value;
            } else if (oldType === 'text' && zone.type !== 'clock') { // Nettoyer si on quitte le texte pour autre chose que l'horloge
                // Si on passe d'un type texte à un autre, nettoyer les propriétés de texte
                delete zone.fontFamily;
                delete zone.fontUrl;
                delete zone.fontSize;
                delete zone.color;
                delete zone.textAlign;
            } else if (zone.type === 'clock') {
                const fontOpt = document.getElementById('z-font-family').selectedOptions[0];
                zone.fontFamily = fontOpt.value;
                zone.fontUrl = fontOpt.dataset.url || null;
                zone.fontSize = parseInt(document.getElementById('z-font-size').value);
                zone.color = document.getElementById('z-color').value;
                zone.textAlign = document.getElementById('z-text-align').value;
                zone.clockFormat = document.getElementById('z-clock-format').value;
            } else if (oldType === 'clock' && zone.type !== 'text') { // Nettoyer si on quitte l'horloge pour autre chose que le texte
                // Si on passe d'un type texte à un autre, nettoyer les propriétés de texte
                delete zone.fontFamily;
                delete zone.fontSize;
                delete zone.color;
                delete zone.textAlign;
            }
            
            renderPreview();
        }


        function updatePageDuration() {
            if (selectedIndex === -1) return;
            playlistData.items[selectedIndex].duration = parseInt(document.getElementById('page-duration').value) || 0;
            renderTimeline();
        }

        function updatePageBgColor() {
            if (selectedIndex === -1) return;
            saveStateForUndo();
            playlistData.items[selectedIndex].backgroundColor = document.getElementById('page-bg-color').value;
            renderPreview();
        }

        function moveZoneForward() { moveZone(1); }
        function moveZoneBackward() { moveZone(-1); }

        function moveZone(delta) {
            if (selectedIndex === -1 || selectedZoneIndex === -1) return;
            saveStateForUndo();
            const zones = playlistData.items[selectedIndex].zones;
            const newIndex = selectedZoneIndex + delta;
            if (newIndex >= 0 && newIndex < zones.length) {
                [zones[selectedZoneIndex], zones[newIndex]] = [zones[newIndex], zones[selectedZoneIndex]];
                selectedZoneIndex = newIndex;
                renderPreview();
            }
        }

        function addNewItem() {
            saveStateForUndo();
            playlistData.items.push({ 
                duration: 5000, 
                zones: [] 
            });
            selectItem(playlistData.items.length - 1);
        }

        function addTemplate(type) {
            saveStateForUndo();
            const defaults = {
                canteen: { title: 'Menu du Jour', starter: 'Salade', main: 'Plat', dessert: 'Fruits', useLiveMenu: false },
                meeting: { room: 'Salle A', subject: 'Libre', status: 'Disponible' },
                video_fullscreen: { 
                    videoUrl: '', 
                    loop: false, 
                    muted: false, 
                    fitMode: 'cover', 
                    legend: '', 
                    legendColor: '#ffffff', 
                    legendFontSize: 40, 
                    legendFontFamily: 'sans-serif' 
                },
                weather: { city: 'Paris', lat: '48.8566', lon: '2.3522' }
            };
            playlistData.items.push({ 
                duration: 10000, 
                template: type,
                data: defaults[type],
                zones: [] 
            });
            selectItem(playlistData.items.length - 1);
        }

        function deleteCurrentItem() {
            if (selectedIndex !== -1) deleteCurrentItemByIndex(selectedIndex);
        }

        function deleteCurrentItemByIndex(index) {
            if (!confirm('Voulez-vous vraiment supprimer cette vignette ?')) return;
            saveStateForUndo();
            playlistData.items.splice(index, 1);
            if (selectedIndex === index) {
                selectedIndex = -1;
                selectedZoneIndex = -1;
                document.getElementById('page-editor').style.display = 'none';
                document.getElementById('zone-editor').style.display = 'none';
            } else if (selectedIndex > index) {
                selectedIndex--;
            }
            renderTimeline();
            renderPreview();
        }

        function duplicateItemByIndex(index) {
            saveStateForUndo();
            const originalItem = playlistData.items[index];
            const newItem = JSON.parse(JSON.stringify(originalItem)); // Clone profond (zones incluses)
            playlistData.items.splice(index + 1, 0, newItem);
            selectItem(index + 1); // Sélectionne la nouvelle vignette
        }

        // Initialisation des propriétés de texte par défaut pour une nouvelle zone
        function initializeNewTextZone(zone) {
            zone.fontFamily = 'Arial, sans-serif';
            zone.fontUrl = null; // Pas de police personnalisée par défaut
            zone.fontSize = 24;
            zone.color = '#ffffff';
            zone.textAlign = 'center';
            zone.isMarquee = false;
        }

        // Initialisation des propriétés d'horloge par défaut pour une nouvelle zone
        function initializeNewClockZone(zone) {
            zone.fontFamily = 'Arial, sans-serif';
            zone.fontUrl = null; // Pas de police personnalisée par défaut
            zone.fontSize = 24;
            zone.color = '#ffffff';
            zone.textAlign = 'center';
            zone.clockFormat = 'HH:mm:ss'; // Format par défaut
        }

        function saveStateForUndo() {
            redoStack = []; // Clear redo stack on new action
            undoStack.push(JSON.parse(JSON.stringify(playlistData)));
            if (undoStack.length > MAX_UNDO_STATES) {
                undoStack.shift(); // Remove the oldest state
            }
            // console.log("State saved. Undo stack size:", undoStack.length);
        }


        function deleteZone() {
            if (selectedZoneIndex === -1) return;
            saveStateForUndo();
            playlistData.items[selectedIndex].zones.splice(selectedZoneIndex, 1);
            selectedZoneIndex = -1;
            document.getElementById('zone-editor').style.display = 'none';
            renderPreview();
        }

        function undo() {
            if (undoStack.length > 1) { // Garder au moins un état (l'état initial)
                redoStack.push(JSON.parse(JSON.stringify(playlistData)));
                playlistData = undoStack.pop();

                // Ajuster selectedIndex et selectedZoneIndex après undo
                if (selectedIndex !== -1 && selectedIndex >= playlistData.items.length) {
                    selectedIndex = playlistData.items.length > 0 ? playlistData.items.length - 1 : -1;
                }
                if (selectedIndex !== -1 && selectedZoneIndex !== -1 && selectedIndex < playlistData.items.length && selectedZoneIndex >= playlistData.items[selectedIndex].zones.length) {
                    selectedZoneIndex = playlistData.items[selectedIndex].zones.length > 0 ? playlistData.items[selectedIndex].zones.length - 1 : -1;
                }
                if (selectedIndex === -1) {
                    document.getElementById('page-editor').style.display = 'none';
                    document.getElementById('zone-editor').style.display = 'none';
                } else if (selectedZoneIndex === -1) {
                    document.getElementById('zone-editor').style.display = 'none';
                } else {
                    selectZone(selectedZoneIndex); // Re-populate zone editor if a zone is still selected
                }
                renderTimeline();
                renderPreview();
            }
        }

        function redo() {
            if (redoStack.length > 0) {
                undoStack.push(JSON.parse(JSON.stringify(playlistData)));
                playlistData = redoStack.pop();

                if (selectedIndex !== -1 && selectedIndex >= playlistData.items.length) {
                    selectedIndex = playlistData.items.length > 0 ? playlistData.items.length - 1 : -1;
                }
                if (selectedIndex !== -1 && selectedZoneIndex !== -1 && selectedIndex < playlistData.items.length && selectedZoneIndex >= playlistData.items[selectedIndex].zones.length) {
                    selectedZoneIndex = playlistData.items[selectedIndex].zones.length > 0 ? playlistData.items[selectedIndex].zones.length - 1 : -1;
                }
                renderTimeline();
                renderPreview();
            }
        }

        function previewPlaylist() {
            if (!playlistId) return alert("Veuillez d'abord enregistrer le diaporama.");
            const url = `/player?id=${playlistId}&token=${token}&_debug=1`;
            window.open(url, '_blank');
        }

        async function savePlaylist() {
            const name = document.getElementById('pl-name').value;
            if (!name) return alert("Veuillez donner un nom au diaporama");

            const isNewPlaylist = !playlistId;

            const res = await fetch('/api/admin/playlists', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ 
                    id: playlistId, // Garde le même ID si on modifie
                    name: name, 
                    items: playlistData.items,
                    backgroundUrl: playlistData.backgroundUrl,
                    backgroundColor: playlistData.backgroundColor,
                    resolution: playlistData.resolution
                })
            });
            if (res.ok) {
                const result = await res.json();
                alert('Enregistré !');
                if (isNewPlaylist) {
                    window.history.replaceState({}, '', `/editor?id=${result.playlistId}`);
                    playlistId = result.playlistId;
                }
                renderTimeline(); // Rafraîchir l'affichage pour s'assurer que tout est à jour
            } else {
                alert('Erreur lors de l\'enregistrement.');
                const errorText = await res.text();
                alert('Erreur lors de l\'enregistrement : ' + errorText);
            }
        }

        function formatClock(date, format) {
            const h24 = date.getHours();
            const h12 = h24 % 12 || 12;
            const hours24 = String(h24).padStart(2, '0');
            const hours12 = String(h12).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Month is 0-indexed
            const year = date.getFullYear();
            const yearShort = String(year).slice(-2);

            return format
                .replace(/HH/g, hours24)
                .replace(/hh/g, hours12)
                .replace(/mm/g, minutes)
                .replace(/ss/g, seconds)
                .replace(/DD/g, day)
                .replace(/jj/g, day)
                .replace(/MM/g, month)
                .replace(/YYYY/g, year)
                .replace(/aaaa/g, year)
                .replace(/aa/g, yearShort);
        }

        // Gestion des touches Suppr / Backspace pour supprimer zones ou vignettes
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (selectedZoneIndex !== -1) {
                    deleteZone();
                } else if (selectedIndex !== -1) {
                    deleteCurrentItem();
                }
            }
        });

        // Gestion des raccourcis clavier pour Undo/Redo
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;

            if ((e.ctrlKey || e.metaKey) && e.key === 'z') { // Ctrl+Z ou Cmd+Z
                e.preventDefault();
                undo();
            } else if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'Z'))) { // Ctrl+Y, Cmd+Y, ou Ctrl+Shift+Z, Cmd+Shift+Z
                e.preventDefault();
                redo();
            }
        });

        /**
         * Dessine un aperçu miniature sur un élément <canvas> pour les pages
         * qui ne contiennent que du texte, des horloges ou un fond coloré.
         */
        function drawThumbnailCanvas(canvas, item) {
            const ctx = canvas.getContext('2d');
            const W = canvas.width;
            const H = canvas.height;

            // Fond de la page (couleur ou image globale)
            const bgColor = item.backgroundColor || playlistData.backgroundColor || '#000000';
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, W, H);

            // Si fond image global, essayer de le dessiner
            if (playlistData.backgroundUrl) {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => {
                    ctx.drawImage(img, 0, 0, W, H);
                    _drawTextZonesOnCanvas(ctx, canvas, item);
                };
                img.onerror = () => _drawTextZonesOnCanvas(ctx, canvas, item);
                img.src = playlistData.backgroundUrl + PREVIEW_AUTH;
            } else {
                _drawTextZonesOnCanvas(ctx, canvas, item);
            }
        }

        function _drawTextZonesOnCanvas(ctx, canvas, item) {
            const W = canvas.width;
            const H = canvas.height;
            if (!item.zones) return;

            item.zones.forEach(zone => {
                const x = (zone.x / 100) * W;
                const y = (zone.y / 100) * H;
                const w = (zone.w / 100) * W;
                const h = (zone.h / 100) * H;

                if (zone.type === 'text' || zone.type === 'clock') {
                    // Fond semi-transparent de la zone
                    ctx.fillStyle = 'rgba(52, 152, 219, 0.25)';
                    ctx.fillRect(x, y, w, h);

                    // Texte centré et tronqué
                    const label = zone.type === 'clock'
                        ? (zone.clockFormat || 'HH:mm')
                        : (zone.text || '');
                    if (label) {
                        const fontSize = Math.max(6, Math.min(h * 0.55, 11));
                        ctx.font = `bold ${fontSize}px Arial, sans-serif`;
                        ctx.fillStyle = zone.color || '#ffffff';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        // Tronquer si trop long
                        let displayText = label;
                        while (displayText.length > 1 && ctx.measureText(displayText).width > w - 4) {
                            displayText = displayText.slice(0, -1);
                        }
                        ctx.fillText(displayText, x + w / 2, y + h / 2);
                    }
                }
            });
        }

        init();
    </script>
