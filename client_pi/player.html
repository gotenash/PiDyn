<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }
        #player-screen {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black; /* Fallback background */
        }
        #player-screen .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        #player-screen .zone {
            position: absolute;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        #player-screen .zone img,
        #player-screen .zone video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garde l'aspect ratio, s'adapte à la zone */
        }
        #player-screen .zone iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #player-screen .zone .clock-content {
            width: 100%;
            height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        #player-screen .zone .text-content {
            color: white;
            font-family: sans-serif;
            font-size: 3vw; /* Taille de police responsive */
            text-align: center;
            padding: 1%;
            word-wrap: break-word;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center; /* Centrage vertical par défaut */
            justify-content: center; /* Centrage horizontal par défaut */
        }

        /* Animations d'entrée */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideTop { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideBottom { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .anim-fade-in { animation: fadeIn 1s ease-out forwards; }
        .anim-slide-top { animation: slideTop 0.8s ease-out forwards; }
        .anim-slide-bottom { animation: slideBottom 0.8s ease-out forwards; }
        .anim-slide-left { animation: slideLeft 0.8s ease-out forwards; }
        .anim-slide-right { animation: slideRight 0.8s ease-out forwards; }
        .anim-zoom-in { animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Animations de sortie */
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes zoomOut { from { transform: scale(1); opacity: 1; } to { transform: scale(1.2); opacity: 0; } }
        .anim-fade-out { animation: fadeOut 0.8s ease-in forwards; }
        .anim-zoom-out { animation: zoomOut 0.8s ease-in forwards; }

        /* Texte défilant */
        .marquee-container { overflow: hidden; white-space: nowrap; width: 100%; display: flex; align-items: center; }
        .marquee-content { display: inline-block; padding-left: 100%; animation: marquee 15s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-200%); } }

        /* Styles des Alertes Flash */
        #alert-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 10001; /* Au-dessus de tout le reste */
            pointer-events: none;
        }
        .flash-message {
            padding: 20px;
            color: white;
            font-family: sans-serif;
            font-size: 2.5vw;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            animation: slideDown 0.5s ease-out;
        }
        .flash-info { background: rgba(52, 152, 219, 0.9); }
        .flash-warning { background: rgba(243, 156, 18, 0.9); }
        .flash-danger { background: rgba(231, 76, 60, 0.9); }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* Style pour les infos de debug à l'écran */
        #debug-log {
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); color: #2ecc71; 
            font-family: monospace; font-size: 10px; padding: 5px; 
            z-index: 10000; pointer-events: none; max-width: 80%;
        }
    </style>
</head>
<body>
    <div id="alert-overlay"></div>
    <div id="player-screen">
        <div id="loader" style="color: white; font-family: sans-serif; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            Connexion au serveur...<br>
            <small id="status-extra" style="color: #bdc3c7; font-size: 0.8em;"></small>
        </div>
        <img id="splash-screen" class="bg-layer" src="" style="display:none; z-index: 10;">
        <img id="global-background" class="bg-layer" src="" style="display:none;">
        <div id="current-page-zones">
            <!-- Les zones seront chargées dynamiquement ici -->
        </div>
        <div id="debug-log">Initialisation...</div>
    </div>

    <script>
        // Système de log visuel
        function log(msg, isError = false) {
            console.log(msg);
            const logEl = document.getElementById('debug-log');
            if (logEl) {
                logEl.innerText = msg;
                logEl.style.display = playlistData.disableDebugLogs ? 'none' : 'block';
            }
            if (isError) document.getElementById('status-extra').innerText = msg;
        }

        window.onerror = (m, u, l) => log(`Erreur JS ligne ${l}: ${m}`, true);

        let currentIndex = 0;
        let playlistData = { items: [] };
        let isPlaying = false;
        let playTimeout = null;
        let activeClockIntervals = []; // Pour stocker les intervalles des horloges

        const urlParams = new URLSearchParams(window.location.search);
        const serverUrlParam = urlParams.get('serverUrl');
        const previewId = urlParams.get('id');
        const apiKey = urlParams.get('apiKey');
        
        // Détection de l'URL du serveur
        const serverUrl = serverUrlParam || (window.location.hostname === "" ? "http://localhost:3000" : window.location.origin);

        // Chargement dynamique de Socket.io pour éviter les blocages si l'URL est fausse
        const script = document.createElement('script');
        script.src = `${serverUrl}/socket.io/socket.io.js`;
        document.head.appendChild(script);

        // Initialisation Socket pour les séquences et alertes
        let socket = null;
        script.onload = () => {
            if (!previewId) {
            log(`Tentative de connexion au CMS : ${serverUrl}`);
                 // On prépare une fonction d'initialisation qui sera appelée une fois l'ID connu
                window.initSocketWithId = (dId) => {
                    if (socket) return;
                    socket = io(serverUrl, { 
                        auth: { token: apiKey || 'ma_cle_secrete_123' },
                        query: { deviceId: dId },
                        reconnectionAttempts: 5
                    }); 

                    socket.on('connect', () => {
                        log("Socket.io connecté au serveur.");
                    });
                    socket.on('disconnect', (reason) => {
                        log(`Socket.io déconnecté : ${reason}`, true);
                    });
                    socket.on('connect_error', (error) => {
                        log(`Erreur de connexion Socket.io : ${error.message}`, true);
                    });
                    log("Socket.io initialisé pour l'écran : " + dId);
                    
                    setupSocketListeners();
                };

                // Si les données sont déjà là (cas rare au premier boot)
                if (playlistData && playlistData.deviceId) window.initSocketWithId(playlistData.deviceId);
            }
        };
        script.onerror = () => log("Erreur: Impossible de charger Socket.io depuis le serveur", true);

        async function refreshPlaylist() {
            try {
                let newData = null;
                if (previewId && apiKey) {
                    const res = await fetch('/api/admin/data', { headers: { 'x-api-key': apiKey } });
                    const data = await res.json();
                    newData = data.playlists[previewId];
                } else {
                    log("Chargement de la playlist locale...");
                    // Suppression du nocache pour le protocole file:// (évite les erreurs de fichier non trouvé)
                    const url = window.location.protocol === 'file:' ? 'playlist.json' : 'playlist.json?nocache=' + Date.now();
                    const res = await fetch(url);
                    if (!res.ok && res.status !== 0) throw new Error(`HTTP ${res.status}`);
                    newData = await res.json();
                    log("Playlist locale chargée.");
                    
                    // On initialise le socket avec l'ID trouvé dans le manifest local
                    if (window.initSocketWithId) window.initSocketWithId(newData.deviceId || 'unknown');
                }

                if (newData && newData.items && newData.items.length > 0) {
                    playlistData = newData; // On met à jour les données pour le prochain cycle
                    const splashScreenElement = document.getElementById('splash-screen');
                    const loaderElement = document.getElementById('loader');
                    const authParam = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';
                    const splashUrl = playlistData.localSplashScreenUrl || playlistData.splashScreenUrl;
                    
                    if (splashUrl) {
                        // Si c'est un chemin local (./media/...), on l'utilise tel quel.
                        // Sinon, c'est un chemin distant (/img/...), on ajoute l'URL du serveur.
                        if (splashUrl.startsWith('./')) {
                            splashScreenElement.src = splashUrl;
                        } else {
                            const base = splashUrl.startsWith('http') ? '' : serverUrl;
                            splashScreenElement.src = `${base}${splashUrl}${authParam}`;
                        }
                        splashScreenElement.style.display = 'block';
                        loaderElement.style.display = 'none';
                        log("Affichage du splashscreen.");
                        // Le playNext sera appelé après la durée du splashscreen si nécessaire, ou directement
                        // Pour l'instant, on démarre la playlist après un court délai pour laisser le splashscreen s'afficher
                        if (!isPlaying) {
                            isPlaying = true;
                            setTimeout(playNext, 2000); // Afficher le splashscreen pendant 2 secondes
                        }
                    } else if (!isPlaying) {
                        log("Démarrage de la lecture (sans splashscreen).");
                        isPlaying = true;
                        loaderElement.style.display = 'none';
                        playNext();
                    } else {
                        log("Données mises à jour.");
                    }
                } else {
                    log("Playlist vide, attente de contenu...", true);
                }
            } catch (e) { 
                log("Erreur : " + e.message, true);
                setTimeout(refreshPlaylist, 5000); 
            }
        }

        function playNext() {
            // On nettoie le timeout précédent pour éviter les boucles multiples
            if (playTimeout) clearTimeout(playTimeout);

            // Cacher le splashscreen si visible
            const splashScreenElement = document.getElementById('splash-screen');
            if (splashScreenElement) splashScreenElement.style.display = 'none';

            const page = playlistData.items[currentIndex];
            const globalBgElement = document.getElementById('global-background');
            const pageZonesContainer = document.getElementById('current-page-zones');

            // Enregistrement des statistiques (hors mode prévisualisation)
            if (!previewId && !playlistData.disableClientLogs) {
                const itemUrl = page.url || (page.zones && page.zones[0]?.url) || 'Page composite';
                
                // On utilise les infos provenant du manifest local (playlist.json)
                const targetServerUrl = playlistData.serverUrl || serverUrl;
                const targetApiKey = playlistData.apiKey || apiKey || 'ma_cle_secrete_123';

                fetch(targetServerUrl + '/api/player/log', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': targetApiKey
                    },
                    body: JSON.stringify({
                        deviceId: playlistData.deviceId || 'unknown',
                        playlistId: playlistData.id || 'local',
                        itemUrl: itemUrl,
                        duration: page.duration
                    })
                })
                .then(res => { if(!res.ok) throw new Error(res.status); })
                .catch(err => log("Erreur stats: " + err.message));
            }

            // Nettoyer les intervalles d'horloge de la page précédente
            activeClockIntervals.forEach(clearInterval);
            activeClockIntervals = [];


            // Appliquer la couleur de fond (Page > Globale)
            const bgColor = page.backgroundColor || playlistData.backgroundColor || 'black';
            document.getElementById('player-screen').style.backgroundColor = bgColor;

            // Définir le fond global
            const bgGlobal = playlistData.localBackgroundUrl || playlistData.backgroundUrl;
            if (bgGlobal) {
                const auth = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';
                globalBgElement.src = bgGlobal.startsWith('/media') ? `${bgGlobal}${auth}` : bgGlobal;
                globalBgElement.style.display = 'block';
            } else {
                globalBgElement.style.display = 'none';
            }

            // Effacer les zones précédentes
            pageZonesContainer.innerHTML = '';

            // Rendre les zones pour la page actuelle
            if (page.zones && page.zones.length > 0) {
                page.zones.forEach(zone => {
                    const zoneElement = document.createElement('div');
                    zoneElement.className = 'zone';
                    zoneElement.style.left = zone.x + '%';
                    zoneElement.style.top = zone.y + '%';
                    zoneElement.style.width = zone.w + '%';
                    zoneElement.style.height = zone.h + '%';

                    // Appliquer l'animation d'entrée
                    if (zone.animationIn && zone.animationIn !== 'none') {
                        zoneElement.classList.add(`anim-${zone.animationIn}`);
                        zoneElement.style.animationDuration = (zone.animationInDuration || 1000) + 'ms';
                    }

                    // Appliquer un fond spécifique à la zone si disponible
                    const zoneBg = zone.localBackgroundUrl || zone.backgroundUrl || page.localBackgroundUrl || page.backgroundUrl;
                    const auth = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';

                    if (zoneBg) {
                        const finalBg = zoneBg.startsWith('/media') ? `${zoneBg}${auth}` : zoneBg;
                        zoneElement.style.backgroundImage = `url(${finalBg})`;
                        zoneElement.style.backgroundSize = 'cover';
                        zoneElement.style.backgroundPosition = 'center';
                    }

                    const mediaUrl = zone.localUrl || zone.url;
                    if (zone.type === 'image') {
                        zoneElement.innerHTML = `<img src="${mediaUrl.startsWith('/media') ? mediaUrl + auth : mediaUrl}">`;
                    } else if (zone.type === 'video') {
                        const videoElement = document.createElement('video');
                        videoElement.src = mediaUrl.startsWith('/media') ? mediaUrl + auth : mediaUrl;
                        videoElement.autoplay = true;
                        videoElement.muted = true;
                        videoElement.loop = true;
                        zoneElement.appendChild(videoElement);
                    } else if (zone.type === 'web') {
                        zoneElement.innerHTML = `<iframe src="${mediaUrl.startsWith('/media') ? mediaUrl + auth : mediaUrl}"></iframe>`;
                    } else if (zone.type === 'text') {
                        const content = zone.isMarquee ? 
                            `<div class="marquee-container"><div class="marquee-content text-content">${zone.text || ''}</div></div>` :
                            `<div class="text-content">${zone.text || ''}</div>`;
                        zoneElement.innerHTML = content;
                        
                        const textContentDiv = zoneElement.querySelector('.text-content');

                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        textContentDiv.style.fontFamily = zone.fontFamily || 'sans-serif';
                        textContentDiv.style.fontSize = (zone.fontSize || 24) + 'px';
                        textContentDiv.style.color = zone.color || 'white';
                        textContentDiv.style.textAlign = zone.textAlign || 'center';
                        // Ajuster la justification pour le flexbox
                        textContentDiv.style.justifyContent = zone.textAlign === 'justify' ? 'flex-start' : zone.textAlign;
                    } else if (zone.type === 'clock') {
                        zoneElement.innerHTML = `<div class="clock-content"></div>`;
                        const clockContent = zoneElement.querySelector('.clock-content');

                        // Appliquer la police personnalisée si définie
                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        clockContent.style.fontFamily = zone.fontFamily || 'sans-serif';
                        clockContent.style.fontSize = (zone.fontSize || 24) + 'px';
                        clockContent.style.color = zone.color || 'white';
                        
                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        const updateTime = () => {
                            clockContent.innerText = formatClock(new Date(), zone.clockFormat || 'HH:mm:ss');
                        };
                        updateTime();
                        activeClockIntervals.push(setInterval(updateTime, 1000));
                    }
                    
                    // Programmer l'animation de sortie
                    if (zone.animationOut && zone.animationOut !== 'none') {
                        const outDuration = zone.animationOutDuration || 800;
                        setTimeout(() => {
                            zoneElement.classList.add(`anim-${zone.animationOut}`);
                            zoneElement.style.animationDuration = outDuration + 'ms';
                        }, Math.max(0, page.duration - outDuration));
                    }

                    pageZonesContainer.appendChild(zoneElement);
                });
            }

            // Logique de progression
            if (currentIndex === playlistData.items.length - 1 && playlistData.sequenceContext && socket) {
                playTimeout = setTimeout(() => {
                    socket.emit('request-next-playlist-in-sequence');
                }, page.duration);
            } else {
                currentIndex = (currentIndex + 1) % playlistData.items.length;
                playTimeout = setTimeout(playNext, page.duration);
                log(`Page suivante dans ${page.duration / 1000}s.`);
            }
        }

        function setupSocketListeners() {
            if (!socket) return;
            socket.on('show-alert', (alert) => {
                const overlay = document.getElementById('alert-overlay');
                if (document.getElementById(`alert-${alert.id}`)) return;
                const div = document.createElement('div');
                div.id = `alert-${alert.id}`;
                div.className = `flash-message flash-${alert.type}`;
                div.innerText = alert.text;
                overlay.appendChild(div);
            });
            socket.on('clear-alert', (id) => {
                const el = document.getElementById(`alert-${id}`);
                if (el) el.remove();
            });
        }

        function formatClock(date, format) {
            const h24 = date.getHours();
            const h12 = h24 % 12 || 12;
            const hours24 = String(h24).padStart(2, '0');
            const hours12 = String(h12).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Month is 0-indexed
            const year = date.getFullYear();
            const yearShort = String(year).slice(-2);

            return format
                .replace(/HH/g, hours24)
                .replace(/hh/g, hours12)
                .replace(/mm/g, minutes)
                .replace(/ss/g, seconds)
                .replace(/DD/g, day)
                .replace(/jj/g, day)
                .replace(/MM/g, month)
                .replace(/YYYY/g, year)
                .replace(/aaaa/g, year)
                .replace(/aa/g, yearShort);
        }

        // On vérifie les mises à jour du fichier JSON toutes les 30s
        setInterval(refreshPlaylist, 30000);
        refreshPlaylist();
    </script>
</body>
</html>
