<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        /* Reset de base */
        body, html { margin: 0; padding: 0; background: black; overflow: hidden; height: 100vh; width: 100vw; cursor: none !important; }
        
        /* On cache le curseur sur TOUS les éléments sans casser leur taille */
        * { cursor: none !important; }

        #player-screen {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black; /* Fallback background */
        }
        #player-screen .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        #player-screen .zone {
            position: absolute;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        #player-screen .zone img,
        #player-screen .zone video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Garde l'aspect ratio, s'adapte à la zone */
            will-change: transform; /* Force le GPU à gérer les transformations */
            transform: translate3d(0,0,0); /* Crée un contexte de rendu 3D isolé */
            backface-visibility: hidden; /* Empêche les artefacts 3D indésirables */
        }
        #player-screen .zone iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        #player-screen .zone .clock-content {
            width: 100%;
            height: 100%;
            display: flex; justify-content: center; align-items: center;
        }
        #player-screen .zone .text-content {
            color: white;
            font-family: sans-serif;
            font-size: 3vw; /* Taille de police responsive */
            text-align: center;
            padding: 1%;
            word-wrap: break-word;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center; /* Centrage vertical par défaut */
            justify-content: center; /* Centrage horizontal par défaut */
        }

        /* Animations d'entrée */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideTop { from { transform: translateY(-50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideBottom { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideLeft { from { transform: translateX(-50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slideRight { from { transform: translateX(50px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .anim-fade-in { animation: fadeIn 1s ease-out forwards; }
        .anim-slide-top { animation: slideTop 0.8s ease-out forwards; }
        .anim-slide-bottom { animation: slideBottom 0.8s ease-out forwards; }
        .anim-slide-left { animation: slideLeft 0.8s ease-out forwards; }
        .anim-slide-right { animation: slideRight 0.8s ease-out forwards; }
        .anim-zoom-in { animation: zoomIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* Animations de sortie */
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes zoomOut { from { transform: scale(1); opacity: 1; } to { transform: scale(1.2); opacity: 0; } }
        .anim-fade-out { animation: fadeOut 0.8s ease-in forwards; }
        .anim-zoom-out { animation: zoomOut 0.8s ease-in forwards; }

        /* Texte défilant */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            flex: 1;
            display: block;
            position: relative;
            width: 100%;
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: omniMarquee 15s linear infinite;
            will-change: transform;
        }
        @keyframes omniMarquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Styles des Alertes Flash */
        #alert-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%;
            z-index: 10001; /* Au-dessus de tout le reste */
            pointer-events: none;
        }
        .flash-message {
            padding: 15px 25px;
            color: white;
            font-family: sans-serif;
            font-size: 2.5vw;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            margin-bottom: 5px;
            animation: slideDown 0.5s ease-out;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 20px;
            width: 100%;
            box-sizing: border-box;
        }
        .flash-info { background: rgba(52, 152, 219, 0.9); }
        .flash-warning { background: rgba(243, 156, 18, 0.9); }
        .flash-danger { background: rgba(231, 76, 60, 0.9); }
        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }

        /* Templates Styles */
        .tpl-container { 
            width: 100%; height: 100%; color: white; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 9vh; font-family: sans-serif; z-index: 5; 
            box-sizing: border-box;
            will-change: transform;
            transform: translate3d(0,0,0);
        }
        .tpl-container video {
            will-change: transform;
            transform: translate3d(0,0,0);
            backface-visibility: hidden;
        }
        .tpl-header { font-size: 5vw; margin-bottom: 4vh; border-bottom: 3px solid #3498db; padding-bottom: 10px; font-weight: bold; }
        .tpl-content { display: flex; flex-direction: column; gap: 2vh; width: 80%; }
        .tpl-row { background: rgba(255,255,255,0.1); padding: 2vh; border-radius: 15px; display: flex; align-items: center; }
        .tpl-label { color: #3498db; font-size: 2vw; width: 30%; text-align: left; font-weight: bold; }
        .tpl-value { font-size: 3vw; width: 70%; text-align: right; }
        
        .tpl-meeting-room { font-size: 8vw; font-weight: bold; margin-bottom: 2vh; }
        .tpl-meeting-status { font-size: 4vw; padding: 2vh 5vw; border-radius: 100px; margin-top: 4vh; }
        .status-disponible { background: #27ae60; }
        .status-occupée { background: #e74c3c; }

        /* Style pour les infos de debug à l'écran */
        #debug-log {
            position: absolute; bottom: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); color: #2ecc71; 
            font-family: monospace; font-size: 10px; padding: 5px; 
            z-index: 10000; pointer-events: none; max-width: 80%;
        }

        /* Styles pour l'écran de serveur indisponible */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        #offline-screen {
            display: none;
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 9999;
        }
        #offline-screen .bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .offline-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .offline-box {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(231, 76, 60, 0.3);
            border-radius: 20px;
            padding: 40px 60px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.5s ease-out;
            font-family: sans-serif;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite ease-in-out;
        }
        .offline-title {
            font-size: 32px;
            font-weight: 700;
            color: #e74c3c;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }
        .offline-text {
            font-size: 20px;
            color: #ecf0f1;
            font-weight: 400;
            opacity: 0.9;
        }

        /* Styles pour l'affichage en petit en bas (mini-error) */
        #offline-screen.mini-error {
            pointer-events: none;
            z-index: 10000;
        }
        #offline-screen.mini-error .bg-layer {
            display: none !important;
        }
        #offline-screen.mini-error .offline-container {
            background: transparent !important;
            top: auto;
            bottom: 20px;
            height: auto;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 10px;
        }
        #offline-screen.mini-error .offline-box {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 15px;
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(15, 15, 15, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(231, 76, 60, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            animation: fadeIn 0.3s ease-out;
            pointer-events: auto;
            text-align: left;
        }
        #offline-screen.mini-error .offline-icon {
            font-size: 28px;
            margin-bottom: 0;
            animation: pulse 1.5s infinite ease-in-out;
        }
        #offline-screen.mini-error .offline-details {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        #offline-screen.mini-error .offline-title {
            font-size: 16px;
            margin-bottom: 2px;
            font-weight: 700;
        }
        #offline-screen.mini-error .offline-text {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="alert-overlay"></div>
    <div id="player-screen">
        <!-- Ecran d'erreur hors-ligne -->
        <div id="offline-screen">
            <img class="bg-layer" src="img/splashscreen.png">
            <div class="offline-container">
                <div class="offline-box">
                    <div class="offline-icon">🔌</div>
                    <div class="offline-details">
                        <div class="offline-title">Serveur indisponible</div>
                        <div class="offline-text">Veuillez contacter l'administrateur</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="loader" style="color: white; font-family: sans-serif; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center;">
            Connexion au serveur...<br>
            <small id="status-extra" style="color: #bdc3c7; font-size: 0.8em;"></small>
        </div>
        <img id="splash-screen" class="bg-layer" src="" style="display:none; z-index: 10;">
        <img id="global-background" class="bg-layer" src="" style="display:none;">
        <div id="current-page-zones">
            <!-- Les zones seront chargées dynamiquement ici -->
        </div>
        <div id="debug-log">Initialisation...</div>
    </div>

    <script>
        let isServerOnline = true;
        let offlineTimer = null;
        let offlineCycleInterval = null;
        let offlineCycleTimeout = null;

        function showOfflineOverlay(isMini = false) {
            if (playlistData && (playlistData.showOfflineAlert === false || playlistData.showOfflineAlert === 'false')) {
                return;
            }
            const offlineEl = document.getElementById('offline-screen');
            if (offlineEl) {
                if (isMini) {
                    offlineEl.classList.add('mini-error');
                } else {
                    offlineEl.classList.remove('mini-error');
                }
                offlineEl.style.display = 'block';
            }
            const loaderEl = document.getElementById('loader');
            if (loaderEl) loaderEl.style.display = 'none';
        }

        function hideOfflineOverlay() {
            const offlineEl = document.getElementById('offline-screen');
            if (offlineEl) {
                offlineEl.style.display = 'none';
                offlineEl.classList.remove('mini-error');
            }
        }

        function showOfflineError() {
            if (isServerOnline) {
                isServerOnline = false;
                log("Serveur hors-ligne détecté. Affichage de l'erreur...");
                
                // Essayer de charger la playlist du cache si celle en mémoire est vide
                if (!playlistData.items || playlistData.items.length === 0) {
                    try {
                        const cached = localStorage.getItem('cached_playlist');
                        if (cached) {
                            const parsed = JSON.parse(cached);
                            if (parsed && parsed.items && parsed.items.length > 0) {
                                playlistData = parsed;
                                currentPlaylistId = parsed.id;
                                log("Playlist restaurée depuis le cache local.");
                            }
                        }
                    } catch (e) {
                        console.error("Erreur de restauration cache:", e);
                    }
                }

                // Afficher l'overlay immédiatement
                showOfflineOverlay(false);

                // Lancer le dernier diaporama connu au bout d'une minute
                if (offlineTimer) clearTimeout(offlineTimer);
                offlineTimer = setTimeout(() => {
                    if (playlistData.items && playlistData.items.length > 0) {
                        log("Lancement du dernier diaporama connu...");
                        if (!isPlaying) {
                            isPlaying = true;
                            currentIndex = 0;
                            playNext();
                        }
                        startOfflinePeriodicCycle();
                    } else {
                        log("Aucune playlist en mémoire ou en cache local à lancer.");
                    }
                }, 60000); // 1 minute
            }
        }

        function hideOfflineError() {
            isServerOnline = true;
            if (offlineTimer) {
                clearTimeout(offlineTimer);
                offlineTimer = null;
            }
            stopOfflinePeriodicCycle();
            hideOfflineOverlay();
        }

        function startOfflinePeriodicCycle() {
            stopOfflinePeriodicCycle();
            hideOfflineOverlay(); // Cacher immédiatement l'erreur pour voir le diaporama lancé
            
            offlineCycleInterval = setInterval(() => {
                showOfflineOverlay(true);
                offlineCycleTimeout = setTimeout(() => {
                    hideOfflineOverlay();
                }, 20000); // Affiche le message pendant 20 secondes
            }, 60000); // Répète toutes les minutes (60 secondes)
        }

        function stopOfflinePeriodicCycle() {
            if (offlineCycleInterval) {
                clearInterval(offlineCycleInterval);
                offlineCycleInterval = null;
            }
            if (offlineCycleTimeout) {
                clearTimeout(offlineCycleTimeout);
                offlineCycleTimeout = null;
            }
        }

        // Système de log visuel
        function log(msg, isError = false) {
            console.log(msg);
            const logEl = document.getElementById('debug-log');
            if (logEl) {
                logEl.innerText = msg;
                if (isError) {
                    logEl.style.color = '#e74c3c'; // Rouge pour l'erreur
                    logEl.style.display = 'block';
                } else {
                    const hide = playlistData && playlistData.disableDebugLogs === true;
                    logEl.style.display = hide ? 'none' : 'block';
                    logEl.style.color = '#2ecc71'; // Vert normal
                }
            }
            // Masquer le loader dès qu'une activité de lecture commence ou que la playlist est prête
            if (msg.includes("Démarrage") || msg.includes("suivante") || msg.includes("lecture") || msg.includes("chargée") || msg.includes("Playlist chargée")) {
                document.getElementById('loader').style.display = 'none';
            }
            if (isError && document.getElementById('status-extra')) document.getElementById('status-extra').innerText = msg;
        }

        window.onerror = (m, u, l) => log(`Erreur JS ligne ${l}: ${m}`, true);

        let currentIndex = 0;
        let playlistData = { items: [] };
        let isPlaying = false;
        let playTimeout = null;
        let activeClockIntervals = []; // Pour stocker les intervalles des horloges
        let currentPlaylistId = null;

        // Protection anti-mise en veille au niveau du navigateur (Screen Wake Lock API)
        let wakeLock = null;
        async function requestScreenWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }
        requestScreenWakeLock();
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') requestScreenWakeLock();
        });
        setInterval(requestScreenWakeLock, 30000);

        const urlParams = new URLSearchParams(window.location.search);
        const serverUrlParam = urlParams.get('serverUrl');
        const previewId = urlParams.get('id');
        const apiKey = urlParams.get('apiKey');
        
        let socket = null;
        // Détection de l'URL du serveur
        let serverUrl = serverUrlParam || (window.location.hostname === "" ? "http://localhost:3000" : window.location.origin);
        if (serverUrl.endsWith('/')) serverUrl = serverUrl.slice(0, -1); // Nettoyage slash final

        function loadSocketIO(baseUrl) {
            if (document.getElementById('socket-io-script')) return;
            const script = document.createElement('script');
            script.id = 'socket-io-script';
            script.src = `${baseUrl}/socket.io/socket.io.js`;
            script.async = true;
            script.onload = () => {
                log("Script Socket.io chargé.");
                if (typeof io === 'undefined') {
                    log("Erreur: io non défini", true);
                    script.remove();
                    return;
                }
                if (playlistData && playlistData.deviceId) initSocketWithId(playlistData.deviceId);
            };
            script.onerror = () => {
                log("Note: Client Socket.io direct non chargé (synchro gérée par sync-engine).", false);
                script.remove();
            };
            document.head.appendChild(script);
        }

        function initSocketWithId(dId) {
            if (socket || typeof io === 'undefined' || !dId) return;
            const finalServerUrl = playlistData.serverUrl || serverUrl;
            const targetKey = playlistData.apiKey || apiKey || 'ma_cle_secrete_123';
            
            socket = io(finalServerUrl, { 
                auth: { token: targetKey, apiKey: targetKey },
                query: { deviceId: dId },
                reconnectionAttempts: Infinity
            }); 
            socket.on('connect', () => {
                log("Socket.io connecté.");
                hideOfflineError();
            });
            socket.on('disconnect', (reason) => {
                log("Socket.io déconnecté: " + reason, false);
                if (!playlistData || !playlistData.items || playlistData.items.length === 0) {
                    showOfflineError();
                }
            });
            socket.on('connect_error', (err) => {
                log("Erreur de connexion Socket.io: " + err.message, false);
                if (!playlistData || !playlistData.items || playlistData.items.length === 0) {
                    showOfflineError();
                }
            });
            setupSocketListeners();
        };

        async function refreshPlaylist() {
            // log("Vérification de la playlist..."); // Trop verbeux pour le log écran
            try {
                let newData = null;
                if (previewId && apiKey) {
                    const res = await fetch(`${serverUrl}/api/admin/data`, { headers: { 'X-API-KEY': apiKey } });
                    if (!res.ok) throw new Error(`Erreur Serveur: ${res.status}`);
                    const data = await res.json();
                    newData = data.playlists[previewId];
                } else {
                    const url = window.location.protocol === 'file:' ? 'playlist.json' : 'playlist.json?nocache=' + Date.now();
                    let res;
                    try {
                        res = await fetch(url);
                    } catch (e) {
                        res = { ok: false, status: 0 };
                    }

                    if (!res.ok) {
                        if (res.status === 404 || window.location.protocol === 'file:') {
                            log("En attente de contenu (playlist.json absent)...", false);
                            document.getElementById('loader').innerHTML = "En attente de contenu...<br><small>Veuillez approuver cet écran dans l'administration.</small>";
                            document.getElementById('loader').style.display = 'block';
                            hideOfflineError();
                            return setTimeout(refreshPlaylist, 10000);
                        }
                        throw new Error(`HTTP ${res.status}`);
                    }
                    
                    const textData = await res.text();
                    if (!textData || textData.trim() === "") {
                        log("Fichier playlist vide, synchronisation en cours ?", false);
                        return setTimeout(refreshPlaylist, 2000);
                    }
                    newData = JSON.parse(textData);
                }

                if (newData && newData.items && newData.items.length > 0) {
                    log("Playlist chargée : " + newData.items.length + " éléments.");
                    try {
                        localStorage.setItem('cached_playlist', JSON.stringify(newData));
                    } catch (e) {
                        console.error("Erreur d'écriture dans localStorage:", e);
                    }
                    if (newData.serverOnline === false) {
                        showOfflineError();
                    } else {
                        hideOfflineError();
                    }
                    const isNewPlaylist = newData.id !== currentPlaylistId;
                    const splashUrl = newData.localSplashScreenUrl || newData.splashScreenUrl;
                    
                    // Initialisation du socket uniquement en mode prévisualisation CMS
                    if (previewId && apiKey) {
                        if (typeof io === 'undefined') {
                            loadSocketIO(newData.serverUrl || serverUrl);
                        } else if (newData.deviceId && !socket) {
                            initSocketWithId(newData.deviceId);
                        }
                    }
                    
                    if (isNewPlaylist) {
                        log("Changement de playlist détecté.");
                        playlistData = newData;
                        currentPlaylistId = newData.id;
                        currentIndex = 0;
                        
                        if (splashUrl) {
                            const splashScreenElement = document.getElementById('splash-screen');
                            const authParam = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';
                            const base = splashUrl.startsWith('./') ? '' : serverUrl;
                            splashScreenElement.src = `${base}${splashUrl}${authParam}`;
                            splashScreenElement.style.display = 'block';
                            document.getElementById('loader').style.display = 'none';
                            
                            if (playTimeout) clearTimeout(playTimeout);
                            isPlaying = true;
                            playTimeout = setTimeout(playNext, 3000); 
                        } else {
                            isPlaying = true;
                            playNext();
                        }
                    } else {
                        // Mise à jour simple des données sans couper la lecture
                        playlistData = newData;
                        log("Données de playlist synchronisées.");
                        if (!isPlaying) {
                            isPlaying = true;
                            currentIndex = 0;
                            playNext();
                        }
                    }
                    
                    // Afficher les alertes stockées dans le manifest
                    if (playlistData.activeAlerts) {
                        renderAlertsFromManifest(playlistData.activeAlerts);
                    }
                    // Toujours planifier le prochain rafraîchissement (30s en ligne, 15s hors-ligne)
                    setTimeout(refreshPlaylist, isServerOnline ? 30000 : 15000);
                } else {
                    // Si on a des données mais pas d'items, c'est l'état "en attente" ou une playlist vide
                    if (newData && (newData.status === 'waiting_approval' || newData.items?.length === 0)) {
                        log("Afficheur non configuré.");
                        document.getElementById('loader').innerHTML = "En attente d'approbation ou de contenu...<br><small>ID de l'appareil : <b>" + (newData.deviceId || 'Inconnu') + "</b></small>";
                        document.getElementById('loader').style.display = 'block';
                        hideOfflineError();
                    } else {
                        log("Playlist vide ou invalide.", true);
                    }
                    setTimeout(refreshPlaylist, 10000);
                }
            } catch (e) { 
                log("Attente de synchronisation...", false);
                if (!playlistData || !playlistData.items || playlistData.items.length === 0) {
                    showOfflineError();
                }
                setTimeout(refreshPlaylist, 5000); 
            }
        }

        function playNext() {
            // On nettoie le timeout précédent pour éviter les boucles multiples
            if (playTimeout) clearTimeout(playTimeout);
            // Sécurité : si la playlist est vide ou l'index invalide (changement de playlist)
            if (!playlistData.items || playlistData.items.length === 0) {
                isPlaying = false;
                return;
            }
            if (currentIndex >= playlistData.items.length) currentIndex = 0;

            // Cacher le splashscreen si visible
            const splashScreenElement = document.getElementById('splash-screen');
            if (splashScreenElement) splashScreenElement.style.display = 'none';

            // Sécurité : si l'index est hors limites (playlist raccourcie), on revient au début
            if (!playlistData.items[currentIndex]) {
                currentIndex = 0;
            }

            const page = playlistData.items[currentIndex];
            if (!page) {
                log("Erreur: page indéfinie à l'index " + currentIndex, true);
                isPlaying = false;
                return;
            }
            const globalBgElement = document.getElementById('global-background');
            const pageZonesContainer = document.getElementById('current-page-zones');

            // Enregistrement des statistiques (hors mode prévisualisation)
            if (!previewId && !playlistData.disableClientLogs) {
                // Déterminer un nom de média/page lisible et détaillé (avec décomposition des zones pour les pages composites)
                let itemUrl = page.name || page.title || page.data?.name || page.data?.title;
                if (!itemUrl) {
                    if (page.url) {
                        itemUrl = page.url;
                    } else if (page.data && (page.data.videoUrl || page.data.imageUrl)) {
                        itemUrl = page.data.videoUrl || page.data.imageUrl;
                    } else {
                        const zones = page.zones || page.data?.zones || [];
                        if (zones.length > 0) {
                            const zoneDescs = zones.map(z => {
                                const rawPath = z.mediaUrl || z.url || z.src || '';
                                const cleanName = rawPath ? rawPath.split('/').pop().split('?')[0].replace(/^(yt|img|pptx|zip|pdf|media|file)_\d+_/i, '') : '';
                                const label = z.title || z.name || cleanName || z.type || 'Zone';
                                const typeTag = z.type ? `[${z.type}]` : '';
                                return `${typeTag} ${label}`.trim();
                            }).filter(Boolean);
                            itemUrl = `Page composite (${zones.length} zones: ${zoneDescs.slice(0, 3).join(' + ')})`;
                        } else {
                            itemUrl = 'Page composite (Multi-zones)';
                        }
                    }
                } else {
                    const zones = page.zones || page.data?.zones || [];
                    if (zones.length > 0) {
                        itemUrl = `Composite "${itemUrl}" (${zones.length} zones)`;
                    }
                }
                
                // On utilise les infos provenant du manifest local (playlist.json)
                const targetServerUrl = playlistData.serverUrl || serverUrl;
                const targetApiKey = playlistData.apiKey || apiKey || 'ma_cle_secrete_123';

                log(`Envoi stats vers ${targetServerUrl}...`);

                fetch(targetServerUrl + '/api/player/log', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-API-KEY': targetApiKey
                    },
                    body: JSON.stringify({
                        deviceId: playlistData.deviceId || 'unknown',
                        playlistId: playlistData.id || 'local',
                        itemUrl: itemUrl,
                        duration: page.duration
                    })
                })
                .then(res => { 
                    if(!res.ok) throw new Error(`HTTP ${res.status}`);
                    // console.log("Stats envoyées avec succès");
                })
                .catch(err => {
                    // Log silencieux dans la console du navigateur en cas d'erreur de statistiques hors-ligne
                    console.warn("Erreur stats (hors-ligne ?) :", err.message);
                });
            }

            // Nettoyer les intervalles d'horloge de la page précédente
            activeClockIntervals.forEach(clearInterval);
            activeClockIntervals = [];


            // Appliquer la couleur de fond (Page > Globale)
            const bgColor = page.backgroundColor || playlistData.backgroundColor || 'black';
            document.getElementById('player-screen').style.backgroundColor = bgColor;

            // Définir le fond (Page > Globale)
            const pageBg = page.localBackgroundUrl || page.backgroundUrl;
            const bgGlobal = pageBg || playlistData.localBackgroundUrl || playlistData.backgroundUrl;
            if (bgGlobal) {
                const auth = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';
                globalBgElement.src = bgGlobal.startsWith('/media') ? `${bgGlobal}${auth}` : bgGlobal;
                globalBgElement.style.display = 'block';
            } else {
                globalBgElement.style.display = 'none';
            }

            // Effacer les zones précédentes
            pageZonesContainer.innerHTML = '';

            // Rendu des modèles
            if (page.template) {
                const tpl = document.createElement('div');
                tpl.className = 'tpl-container anim-fade-in';
                const targetServerUrl = playlistData.serverUrl || serverUrl;

                if (page.template === 'canteen') {
                    const dayNames = ['Dimanche', 'Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi', 'Samedi'];
                    const today = dayNames[new Date().getDay()];
                    const isLive = page.data && page.data.useLiveMenu !== false;
                    const dId = (playlistData && playlistData.deviceId) ? playlistData.deviceId : '';
                    const sId = (playlistData && playlistData.siteId) ? playlistData.siteId : '';

                    const renderCanteen = (weekData) => {
                        const menu = (weekData && weekData[today]) ? weekData[today] : { starter: 'Non renseignée', main: 'Non renseigné', dessert: 'Non renseigné' };
                        tpl.innerHTML = `
                            <div class="tpl-header">${page.data.title || 'MENU DU JOUR'} (${today})</div>
                            <div class="tpl-content">
                                <div class="tpl-row"><div class="tpl-label">ENTRÉE</div><div class="tpl-value">${menu.starter || 'Non renseignée'}</div></div>
                                <div class="tpl-row"><div class="tpl-label">PLAT</div><div class="tpl-value">${menu.main || 'Non renseigné'}</div></div>
                                <div class="tpl-row"><div class="tpl-label">DESSERT</div><div class="tpl-value">${menu.dessert || 'Non renseigné'}</div></div>
                            </div>`;
                    };
                    
                    if (isLive) {
                        tpl.innerHTML = `<div class="tpl-header">Chargement du menu...</div>`;
                        fetch(`${targetServerUrl}/api/player/canteen/current?deviceId=${encodeURIComponent(dId)}&siteId=${encodeURIComponent(sId)}`)
                            .then(r => {
                                if (!r.ok) throw new Error("HTTP " + r.status);
                                return r.json();
                            })
                            .then(weekData => {
                                if (weekData && Object.keys(weekData).length > 0) {
                                    try { localStorage.setItem('cached_canteen_menu', JSON.stringify(weekData)); } catch(e){}
                                }
                                renderCanteen(weekData);
                            })
                            .catch(async () => {
                                try {
                                    const rLocal = await fetch('canteen.json?nocache=' + Date.now());
                                    if (rLocal.ok) {
                                        const localWeekData = await rLocal.json();
                                        if (localWeekData && Object.keys(localWeekData).length > 0) return renderCanteen(localWeekData);
                                    }
                                } catch(e) {}
                                try {
                                    const cachedStr = localStorage.getItem('cached_canteen_menu');
                                    if (cachedStr) return renderCanteen(JSON.parse(cachedStr));
                                } catch(e) {}
                                renderCanteen({});
                            });
                    } else {
                        tpl.innerHTML = `
                            <div class="tpl-header">${page.data.title || 'MENU CANTINE'}</div>
                            <div class="tpl-content">
                                <div class="tpl-row"><div class="tpl-label">ENTRÉE</div><div class="tpl-value">${page.data.starter || 'Non renseignée'}</div></div>
                                <div class="tpl-row"><div class="tpl-label">PLAT</div><div class="tpl-value">${page.data.main || 'Non renseigné'}</div></div>
                                <div class="tpl-row"><div class="tpl-label">DESSERT</div><div class="tpl-value">${page.data.dessert || 'Non renseigné'}</div></div>
                            </div>`;
                    }
                } else if (page.template === 'meeting') {
                    const isLive = page.data && page.data.useLiveMeeting !== false;
                    const dId = (playlistData && playlistData.deviceId) ? playlistData.deviceId : '';
                    const sId = (playlistData && playlistData.siteId) ? playlistData.siteId : '';

                    const renderMeetings = (data) => {
                        const allMeetings = (data && data.meetings) ? data.meetings : [];
                        const now = new Date();

                        // Filtrer les réunions dont l'heure de fin est dépassée
                        const activeMeetings = allMeetings.filter(m => {
                            if (!m.endTime) return true;
                            let endIso = m.endTime;
                            if (!endIso.includes('T')) {
                                const todayStr = now.toISOString().split('T')[0];
                                endIso = `${todayStr}T${m.endTime}`;
                            }
                            const endDate = new Date(endIso);
                            return isNaN(endDate.getTime()) || endDate > now;
                        });

                        if (activeMeetings.length === 0) {
                            tpl.innerHTML = `
                                <div class="tpl-meeting-room">${page.data.room || 'SALLE DE RÉUNION'}</div>
                                <div style="font-size: 2.5vw; color: #2ecc71; margin-top: 15px;">🟢 Aucune réunion à venir</div>`;
                        } else {
                            const firstM = activeMeetings[0];
                            const room = (data.rooms || []).find(r => r.id === firstM.roomId) || { name: page.data.room || 'Salle' };
                            
                            let startIso = firstM.startTime;
                            let endIso = firstM.endTime;
                            if (startIso && !startIso.includes('T')) {
                                const todayStr = now.toISOString().split('T')[0];
                                startIso = `${todayStr}T${startIso}`;
                            }
                            if (endIso && !endIso.includes('T')) {
                                const todayStr = now.toISOString().split('T')[0];
                                endIso = `${todayStr}T${endIso}`;
                            }

                            const startDate = new Date(startIso);
                            const endDate = new Date(endIso);
                            const isInProgress = (now >= startDate && now < endDate);

                            const startDisplay = firstM.startTime ? (firstM.startTime.includes('T') ? firstM.startTime.substring(11, 16) : firstM.startTime) : '';
                            const endDisplay = firstM.endTime ? (firstM.endTime.includes('T') ? firstM.endTime.substring(11, 16) : firstM.endTime) : '';

                            const statusHtml = isInProgress
                                ? `<div class="tpl-meeting-status status-occupied" style="background:#e74c3c; color:white;">🔴 EN COURS</div>`
                                : `<div class="tpl-meeting-status status-disponible" style="background:#3498db; color:white;">🔵 PROCHAINE RÉUNION</div>`;

                            tpl.innerHTML = `
                                <div class="tpl-meeting-room">📍 ${room.name}</div>
                                <div style="font-size: 3vw; font-weight: bold; margin: 15px 0;">${firstM.title || 'Réunion'}</div>
                                <div style="font-size: 2vw; color: #3498db; margin-bottom: 15px;">⏰ ${startDisplay} - ${endDisplay} ${firstM.organizer ? '• ' + firstM.organizer : ''}</div>
                                ${statusHtml}`;
                        }
                    };

                    if (isLive) {
                        tpl.innerHTML = `<div class="tpl-header">Chargement des réunions...</div>`;
                        fetch(`${targetServerUrl}/api/player/meetings/today?deviceId=${encodeURIComponent(dId)}&siteId=${encodeURIComponent(sId)}`)
                            .then(r => {
                                if (!r.ok) throw new Error("HTTP " + r.status);
                                return r.json();
                            })
                            .then(data => {
                                if (data && data.meetings) {
                                    try { localStorage.setItem('cached_meetings_data', JSON.stringify(data)); } catch(e){}
                                }
                                renderMeetings(data);
                            })
                            .catch(async () => {
                                try {
                                    const rLocal = await fetch('meetings.json?nocache=' + Date.now());
                                    if (rLocal.ok) {
                                        const localData = await rLocal.json();
                                        if (localData && localData.meetings) return renderMeetings(localData);
                                    }
                                } catch(e) {}
                                try {
                                    const cachedStr = localStorage.getItem('cached_meetings_data');
                                    if (cachedStr) return renderMeetings(JSON.parse(cachedStr));
                                } catch(e) {}
                                renderMeetings({ rooms: [], meetings: [] });
                            });
                    } else {
                        const statusClass = (page.data.status || 'disponible').toLowerCase();
                        tpl.innerHTML = `
                            <div class="tpl-meeting-room">${page.data.room || 'Salle de Réunion'}</div>
                            <div style="font-size: 3vw; opacity: 0.8;">${page.data.subject || 'Objet non renseigné'}</div>
                            <div class="tpl-meeting-status status-${statusClass}">${page.data.status || 'Disponible'}</div>`;
                    }
                }
                else if (page.template === 'video_fullscreen') {
                    const videoUrl = page.data.localVideoUrl || page.data.videoUrl;
                    let finalUrl = videoUrl;
                    if (videoUrl && videoUrl.startsWith('/media') && !page.data.localVideoUrl) {
                        finalUrl = `${targetServerUrl}${videoUrl}${playlistData.apiKey ? '?apiKey=' + playlistData.apiKey : ''}`;
                    }
                    tpl.style.padding = '0';
                    const isMuted = page.data.muted === true;
                    const fitMode = page.data.fitMode || 'cover';
                    tpl.innerHTML = `
                        <video src="${finalUrl}" autoplay playsinline muted ${page.data.loop ? 'loop' : ''} 
                               style="width:100%; height:100%; object-fit:${fitMode}; pointer-events:none;"></video>
                        ${page.data.legend ? `
                            <div style="position:absolute; bottom:0; left:0; width:100%; background:rgba(0,0,0,0.7); 
                                        color:${page.data.legendColor || 'white'}; 
                                        font-family:${page.data.legendFontFamily || 'sans-serif'};
                                        padding:2vh; font-size:${(page.data.legendFontSize || 40) / 10}vw; 
                                        text-align:center; z-index:10;">${page.data.legend}</div>` : ''}
                    `;
                } else if (page.template === 'weather') {
                    const city = page.data.city || 'Paris';
                    const lat = page.data.lat || '48.8566';
                    const lon = page.data.lon || '2.3522';
                    tpl.innerHTML = `<div class="tpl-header">MÉTÉO - ${city.toUpperCase()}</div><div id="weather-loader" style="font-size: 2vw;">Chargement des prévisions...</div>`;
                    
                    fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=weathercode,temperature_2m&timezone=auto`)
                        .then(r => r.json())
                        .then(data => {
                            const loader = tpl.querySelector('#weather-loader');
                            if (loader) loader.remove();
                            
                            const periods = [
                                { label: 'MATIN', timeLabel: '9h', index: 9 },
                                { label: 'MIDI', timeLabel: '12h', index: 12 },
                                { label: 'APRÈS-MIDI', timeLabel: '16h', index: 16 }
                            ];
                            
                            const grid = document.createElement('div');
                            grid.style.cssText = "display:flex; gap:2vw; justify-content:center; width:90%;";
                            
                            periods.forEach(p => {
                                const icon = getWeatherIcon(data.hourly.weathercode[p.index]);
                                const temp = Math.round(data.hourly.temperature_2m[p.index]);
                                grid.innerHTML += `
                                    <div style="background:rgba(255,255,255,0.1); padding:2vh; border-radius:20px; flex:1; text-align:center;">
                                        <div style="font-size:1.5vw; color:#3498db; font-weight:bold; margin-bottom:0.5vh;">${p.label}</div>
                                        <div style="font-size:1.2vw; opacity:0.6; margin-bottom:1vh;">${p.timeLabel}</div>
                                        <div style="font-size:4vw; margin:1vh 0;">${icon}</div>
                                        <div style="font-size:2.2vw; font-weight:bold;">${temp}°</div>
                                    </div>`;
                            });
                            tpl.appendChild(grid);
                        }).catch(() => { tpl.innerHTML = '<div class="tpl-header">Météo indisponible</div>'; });
                }

                pageZonesContainer.appendChild(tpl);

                if (page.template === 'video_fullscreen') {
                    const v = tpl.querySelector('video');
                    const isMuted = page.data.muted === true;
                    // Démarre toujours en muet (contourne la politique autoplay du navigateur)
                    v.muted = true;
                    v.play().then(() => {
                        if (!isMuted) v.muted = false;
                    }).catch(e => {
                        console.warn("Autoplay vidéo échoué:", e);
                    });
                }
            }

            // Rendre les zones pour la page actuelle
            if (page.zones && page.zones.length > 0) {
                page.zones.forEach(zone => {
                    const zoneElement = document.createElement('div');
                    zoneElement.className = 'zone';
                    zoneElement.style.left = zone.x + '%';
                    zoneElement.style.top = zone.y + '%';
                    zoneElement.style.width = zone.w + '%';
                    zoneElement.style.height = zone.h + '%';

                    // Appliquer l'animation d'entrée
                    if (zone.animationIn && zone.animationIn !== 'none') {
                        zoneElement.classList.add(`anim-${zone.animationIn}`);
                        zoneElement.style.animationDuration = (zone.animationInDuration || 1000) + 'ms';
                    }

                    // Appliquer un fond spécifique à la zone si disponible
                    const zoneBg = zone.localBackgroundUrl || zone.backgroundUrl;
                    const authQuery = (previewId && apiKey) ? `?apiKey=${apiKey}` : '';

                    if (zoneBg) {
                        const finalBg = zoneBg.startsWith('/media') ? `${zoneBg}${authQuery}` : zoneBg;
                        zoneElement.style.backgroundImage = `url(${finalBg})`;
                        zoneElement.style.backgroundSize = 'cover';
                        zoneElement.style.backgroundPosition = 'center';
                    }

                    // On utilise le chemin local si disponible, sinon le chemin distant avec l'URL du serveur
                    let mediaUrl = zone.localUrl || zone.url || "";
                    const token = apiKey || (playlistData && playlistData.apiKey);
                    const targetServerUrl = playlistData.serverUrl || serverUrl;
                    if (mediaUrl.startsWith('/') && !mediaUrl.startsWith('./')) {
                        mediaUrl = `${targetServerUrl}${mediaUrl}${token ? (mediaUrl.includes('?') ? '&' : '?') + 'apiKey=' + token : ''}`;
                    }

                    if (zone.type === 'image') {
                        zoneElement.innerHTML = `<img src="${mediaUrl}">`;
                    } else if (zone.type === 'video') {
                        const videoElement = document.createElement('video');
                        videoElement.src = mediaUrl;
                        videoElement.autoplay = true;
                        videoElement.muted = true; // Démarre muet pour contourner la politique autoplay
                        videoElement.loop = true;
                        videoElement.playsInline = true;
                        videoElement.dataset.muted = zone.muted ? 'true' : 'false';
                        zoneElement.appendChild(videoElement);
                        // Dé-muter après lancement si le son est souhaité
                        videoElement.play().then(() => {
                            if (!zone.muted) {
                                videoElement.muted = false;
                                const currentVolume = playlistData.volume !== undefined ? playlistData.volume : 100;
                                videoElement.volume = currentVolume / 100;
                            }
                        }).catch(() => { /* reste muet si lecture impossible */ });
                    } else if (zone.type === 'web') {
                        const zoom = zone.webZoom || 1.0;
                        const panX = zone.webPanX || 0;
                        const panY = zone.webPanY || 0;
                        const iframeUrl = zone.url.startsWith('/') ? mediaUrl : zone.url;
                        zoneElement.innerHTML = `<div style="width:100%;height:100%;overflow:hidden;position:relative;">
                            <iframe src="${iframeUrl}" style="width:${100 / zoom}%;height:${100 / zoom}%;border:none;position:absolute;top:0;left:0;transform:scale(${zoom}) translate(${panX}%,${panY}%);transform-origin:0 0;"></iframe>
                        </div>`;
                    } else if (zone.type === 'qrcode') {
                        const qrText = zone.text || 'https://omnisign.com';
                        const targetServerUrl = playlistData.serverUrl || serverUrl;
                        const remoteQrUrl = `${targetServerUrl}/api/admin/qrcode?text=${encodeURIComponent(qrText)}${token ? '&apiKey=' + token : ''}`;
                        const qrUrl = zone.localUrl ? mediaUrl : remoteQrUrl;
                        zoneElement.innerHTML = `<img src="${qrUrl}" onerror="if(!this.dataset.fallback){this.dataset.fallback=true;this.src='${remoteQrUrl}';}" style="width:100%;height:100%;object-fit:contain;">`;
                    } else if (zone.type === 'text') {
                        const content = zone.isMarquee ? 
                            `<div class="marquee-container"><div class="marquee-content text-content">${zone.text || ''}</div></div>` :
                            `<div class="text-content">${zone.text || ''}</div>`;
                        zoneElement.innerHTML = content;
                        
                        const textContentDiv = zoneElement.querySelector('.text-content');

                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        textContentDiv.style.fontFamily = zone.fontFamily || 'sans-serif';
                        textContentDiv.style.fontSize = (zone.fontSize || 24) + 'px';
                        textContentDiv.style.color = zone.color || 'white';
                        textContentDiv.style.textAlign = zone.textAlign || 'center';
                        // Ajuster la justification pour le flexbox
                        textContentDiv.style.justifyContent = zone.textAlign === 'justify' ? 'flex-start' : zone.textAlign;
                    } else if (zone.type === 'clock') {
                        zoneElement.innerHTML = `<div class="clock-content"></div>`;
                        const clockContent = zoneElement.querySelector('.clock-content');

                        // Appliquer la police personnalisée si définie
                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        clockContent.style.fontFamily = zone.fontFamily || 'sans-serif';
                        clockContent.style.fontSize = (zone.fontSize || 24) + 'px';
                        clockContent.style.color = zone.color || 'white';
                        
                        if (zone.fontFamily && (zone.localFontUrl || zone.fontUrl)) {
                            const fontUrl = zone.localFontUrl || zone.fontUrl;
                            const fontAuth = (previewId && apiKey) ? `&apiKey=${apiKey}` : '';
                            const finalFontUrl = fontUrl.startsWith('/media') ? `${fontUrl}${fontAuth}` : fontUrl;
                            
                            const styleId = `font-${zone.fontFamily.replace(/\s+/g, '-')}`;
                            if (!document.getElementById(styleId)) {
                                const style = document.createElement('style');
                                style.id = styleId;
                                style.textContent = `@font-face { font-family: "${zone.fontFamily}"; src: url("${finalFontUrl}"); }`;
                                document.head.appendChild(style);
                            }
                        }

                        const updateTime = () => {
                            clockContent.innerText = formatClock(new Date(), zone.clockFormat || 'HH:mm:ss');
                        };
                        updateTime();
                        activeClockIntervals.push(setInterval(updateTime, 1000));
                    }
                    // Gestion du timing d'apparition (start) et de disparition (duration)
                    const startMs = zone.start || 0;
                    const durationMs = zone.duration || page.duration || 5000;
                    const endMs = startMs + durationMs;

                    if (startMs > 0) {
                        zoneElement.style.display = 'none';
                        setTimeout(() => {
                            zoneElement.style.display = 'block';
                            const videoElement = zoneElement.querySelector('video');
                            if (videoElement) {
                                videoElement.play().then(() => {
                                    if (!zone.muted) videoElement.muted = false;
                                }).catch(() => {});
                            }
                        }, startMs);
                    }

                    // Programmer l'animation de sortie
                    if (zone.animationOut && zone.animationOut !== 'none') {
                        const outDuration = zone.animationOutDuration || 800;
                        setTimeout(() => {
                            zoneElement.classList.add(`anim-${zone.animationOut}`);
                            zoneElement.style.animationDuration = outDuration + 'ms';
                        }, Math.max(0, endMs - outDuration));
                    }

                    setTimeout(() => {
                        zoneElement.style.display = 'none';
                    }, endMs);

                    pageZonesContainer.appendChild(zoneElement);
                });
            }

            // Logique de progression (Timeout ou Fin de vidéo)
            const moveToNext = () => {
                if (currentIndex === playlistData.items.length - 1 && playlistData.sequenceContext && socket) {
                    socket.emit('request-next-playlist-in-sequence');
                } else {
                    currentIndex = (currentIndex + 1) % playlistData.items.length;
                    playNext();
                }
            };

            const videoTpl = pageZonesContainer.querySelector('video');
            if (page.template === 'video_fullscreen' && videoTpl && !page.data.loop) {
                log(`Attente de la fin de la vidéo pour transition.`);
                videoTpl.onended = moveToNext;
                videoTpl.onerror = () => {
                    log("Erreur de chargement de la vidéo full-screen", true);
                    moveToNext();
                };
            } else {
                playTimeout = setTimeout(moveToNext, page.duration);
                log(`Page suivante dans ${page.duration / 1000}s.`);
            }
        }

        function getAlertIcon(type) {
            if (type === 'danger') return '🚨';
            if (type === 'warning') return '⚠️';
            return 'ℹ️';
        }

        const alertTimers = {};

        function displayAlert(alert) {
            const overlay = document.getElementById('alert-overlay');
            if (document.getElementById(`alert-${alert.id}`)) return;

            const div = document.createElement('div');
            div.id = `alert-${alert.id}`;
            div.className = `flash-message flash-${alert.type}`;
            
            div.innerHTML = `
                <span style="flex-shrink: 0; font-size: 2.5vw;">${getAlertIcon(alert.type)}</span>
                <div class="marquee-wrapper" style="flex: 1; overflow: hidden; white-space: nowrap; position: relative; height: 100%; display: flex; align-items: center;">
                    <div id="marquee-text-${alert.id}" style="display: inline-block; white-space: nowrap; font-size: 2.5vw; font-weight: bold; position: relative; will-change: transform;">${alert.text}</div>
                </div>
            `;
            overlay.appendChild(div);

            const textEl = document.getElementById(`marquee-text-${alert.id}`);
            const wrapperEl = textEl.parentElement;

            let offset = wrapperEl.offsetWidth || window.innerWidth;
            const speed = 2.5; // Vitesse de défilement (pixels par trame à 60 FPS)

            function step() {
                if (!document.getElementById(`alert-${alert.id}`)) return;
                offset -= speed;
                const textWidth = textEl.offsetWidth || 300;
                const containerWidth = wrapperEl.offsetWidth || window.innerWidth;

                if (offset < -textWidth) {
                    offset = containerWidth;
                }
                textEl.style.transform = `translate3d(${offset}px, 0, 0)`;
                alertTimers[alert.id] = requestAnimationFrame(step);
            }

            requestAnimationFrame(() => {
                offset = wrapperEl.offsetWidth || window.innerWidth;
                step();
            });
        }

        function removeAlert(alertId) {
            if (alertTimers[alertId]) {
                cancelAnimationFrame(alertTimers[alertId]);
                delete alertTimers[alertId];
            }
            const el = document.getElementById(`alert-${alertId}`);
            if (el) el.remove();
        }

        function renderAlertsFromManifest(alerts) {
            const overlay = document.getElementById('alert-overlay');
            const currentAlertIds = alerts.map(a => `alert-${a.id}`);
            
            Array.from(overlay.children).forEach(child => {
                if (!currentAlertIds.includes(child.id)) {
                    const rawId = child.id.replace('alert-', '');
                    removeAlert(rawId);
                }
            });

            alerts.forEach(displayAlert);
        }

        function setupSocketListeners() {
            if (!socket) return;
            socket.on('show-alert', (alert) => displayAlert(alert));
            socket.on('clear-alert', (id) => removeAlert(id));
            // Ajout de l'écoute des mises à jour de playlist pour une transition immédiate
            socket.on('playlist-updated', (data) => {
                log("Mise à jour immédiate reçue via Socket.");
                refreshPlaylist();
            });
            socket.on('volume-change', (data) => {
                log(`Volume mis à jour via Socket : ${data.volume}%`);
                playlistData.volume = data.volume;
                document.querySelectorAll('video').forEach(v => {
                    if (v.dataset.muted !== 'true') {
                        v.volume = data.volume / 100;
                    }
                });
            });
        }

        function formatClock(date, format) {
            const h24 = date.getHours();
            const h12 = h24 % 12 || 12;
            const hours24 = String(h24).padStart(2, '0');
            const hours12 = String(h12).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            const seconds = String(date.getSeconds()).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const month = String(date.getMonth() + 1).padStart(2, '0'); // Month is 0-indexed
            const year = date.getFullYear();
            const yearShort = String(year).slice(-2);

            return format
                .replace(/HH/g, hours24)
                .replace(/hh/g, hours12)
                .replace(/mm/g, minutes)
                .replace(/ss/g, seconds)
                .replace(/DD/g, day)
                .replace(/jj/g, day)
                .replace(/MM/g, month)
                .replace(/YYYY/g, year)
                .replace(/aaaa/g, year)
                .replace(/aa/g, yearShort);
        }

        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if (code <= 3) return '☁️';
            if (code <= 48) return '🌫️';
            if (code <= 55) return '🌦️';
            if (code <= 65) return '🌧️';
            if (code <= 77) return '❄️';
            if (code <= 82) return '🌦️';
            if (code <= 99) return '⛈️';
            return '❓';
        }

        // Démarrage de la détection socket
        loadSocketIO(serverUrl);

        // On vérifie les mises à jour du fichier JSON toutes les 30s
        // setInterval(refreshPlaylist, 30000);
        refreshPlaylist();
    </script>
</body>
