version: '3.8'

services:
  omnisign-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: omnisign-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persistent volume for the SQLite database and uploaded media files
      - omnisign-data:/usr/src/app/data
    environment:
      - PORT=3000
      - DATABASE_PATH=/usr/src/app/data/pidyn.sqlite
      - MEDIA_DIR=/usr/src/app/data/media

volumes:
  omnisign-data:
